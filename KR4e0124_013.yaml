body:
  text: 一峯文集卷十三明羅倫撰七言八句詩和林緝熙訪六一公于西陽宫宫有瀧岡阡表秋日微涼草樹悲此情堪與故山離蘇黃人物從頭數周邵風流雅未知野老自能償伏臘東風無計奈糠粃憑君莫唱滄洲曲一淚斜陽灑卧獅又西傾一極論今雨潁上方歸思欲離古樹碧圓山欲斷小窗虛白月先知滄江已老三秋鬢太古風清萬國粃暮雨無言翁仲泣淡烟芳草對殘獅和林緝熙書梁德莊雲菴壁面面春光送草廬自堪蹤跡混樵漁即看風絮終無定却愛閒雲得自如禹甸有緣憑造物楚天無夢在仙裾人間晴雨渾間事嬴得花前到小車逰霜崖洞天并序文昌西山麓曰霜崖洞天洞有石船古今無知者宋陳橫齊張習甫瀘濵張養直諸老標異洞乃以名逮我文明少師楊士竒寺丞張宗璉侍講彭敷五繼跡墨於戲山川自宇宙昔晦而今顯也不以人乎成化戊戌張君兼素信次豫逰用瀘濵韻各一首兼美將磨崖刻之後之觀者亦將有感于斯乎野人疏散便成仙自在吾心自在天紅葉為誰流水去白雲留我碧山前烟傳桑海三生石月抱袈裟九月船風物不殊諸老異露華無語對潺湲贈劉善叙往湖南并引劉友善叙將見都憲劉侯孚于湖南也其友羅倫執盞祝曰傳不云乎國家之敗由官邪也官之失德寵賂章也致敗之由豈有外于此乎寵賂之章其有甚于此乎昔和斯哈瑪爾平章斯土黜陟惟允盛德交孚逺邇洽和交廣欵服况聞周公孔子之道者乎吾子于侯為同姓居廬陵為同郡賔西孰為同道非浚恆之初者吾見其相與以有成也贈以詩曰愛汝今日湖南逰長風萬里無清秋江山有待亦吾土兄弟相看是故侯直道每增知已重老夫端為大家憂天台舊有延生藥轉手疲癃信爾瘳逰蕭瀧瑞賢亭次侍講彭敷五東風清晝洗浮隂十二䦨干帝汝臨一代文明元有數二儀清濁到而今好山苦戀間雲住秋水生欺病眼深試問卧龍何日起禹門消息是天心張東白往西山夏正夫訪不遇録其作見寄豫亦約東白重逰口占元韻金牛病客老摧隤也學山翁芋栗煨東白先生非我輩西山佳候是良媒使君月下敲門去半夜山隂棹雪回聞道安峯無限好春風還許綈袍陪復廖行儉并引行儉任金華時荷佳句見貽及是罷歸過一峯山中倫執易集要就正于飛輿道傍一夕夢曰三才既展却奔四稚之家千古有人大畫文王之易行儉言還依韻酬之癸巳十月晦登瀛道人羅浮過排風馭氣來無何千里萬里海天逺五峯十峯春色多本相了無塵劫礙浮生虛被身名魔大明千古曙長夜中天共指回揚戈復新昌王直菴樂志風騷回首盡臺輿野老烟花興未除萬壑秋聲和鳯律一蓑春色上牛車貞元自古天難老麟鳯中原網易疏茅屋蕭然湖上榻青山流水夢何如送何廷秀按察河南西風秋意滿陶園采采黃花泛此樽醒醉百年消日月行藏今日任乾坤中原藩鎮諸公在北極朝廷萬世尊老病多君戀明主夢回欹枕釣蓑溫陳夢祥歸南海內翰張廷祥憲使陳文曜憲副夏正夫憲僉徐明德陳粹之㑹餞于洞陽觀聫句寫别倫聞次其韻長江一色楚天南别緒無端夢與參百嵗逢君能有幾兩儀添我便成三洞陽日暮誰辭醉陋巷風光只自甘極目湖山秋萬里錦衣何處覔歸帆僉憲徐迂齊陳冷菴㑹于泰和觀臨别言懷泰和觀裡秋光滿共對寒香進此杯病骨可曽緣客醉好懷今日為君開碧山白髮定誰老黃鶴青霄何處來十二天章還老手明朝歸取五雲裁題徐迂齊匡廬秋霽圖用前韻東南秀色甲天下無限秋光落酒杯紫蓋黃旗山色見光風霽月草堂開羣雄已散浮雲夢此老猶尋白鹿來欲剗匡廬塞彭蠡中原萬里入平裁題徐節婦卷用張方伯韻懶拈鸞鏡掃蛾眉羞見楊花别故枝芳草有情還夜合貞松無夢與春移婦人自我如男子造化從他似小兒一片鐡心編不盡直從刪後更無詩西隱張氏㑹英圖宇內春光領欲完名園今得萬花看幾回清夜宴桃李九老東風入肺肝病客且扶藜杖去勸君莫放酒杯乾不知牆外春深淺醉把花鬚仔細看聚英堂用蕭宜沖韻呼童連夜報青山海內衣冠此㑹難别段鶯花休問主自家風月不曽閒蒼天慣我長為客野老看君亦解顔莫學山隂便歸去短篷殘雪五更寒答夏憲副止菴見贈二首久病寒衾易覺秋老懷珍重為東周𤣥天有意緣誰在紫綬何人為國謀月桂夜長迷玉兔銀河秋盡隔牽牛雲山十二窩頭路多謝先生夢寐求又髙堂明鏡萬莖秋屋上西風撼不周鑿沼且留明月住買山初為白雲謀誰呼鐡笛先招鶴自著蓑衣早放牛道在莫須同出處此心還向止菴求和緝熙過毛英懋西園隱居肝肺贏餘五畝春草堂雲暖小山貧塵中物色元無我林下心情見此人鶴伴野翁梳白髮蝶隨春色上烏巾褰衣細問西園老怕有人家可並鄰和緝熙留别甲子流年又幾春東風初散馬蹄頻自憐白髮添明鏡悵望青天入暮雲寒日卧龍遲逺夢冷花幽鶴伴芳辰相逢且盡樽前酒無那滄波欲送人唐曲江公張九齡志徐孺子碣陳獻章公甫題憲副夏寅正夫邀倫同和憲使陳煒文曜刻石東湖亭上聘君子季登及陳蕃禮宜侑享故及古往來今成代謝青山流水費興亡流連木榻堪何事慘淡炎精遂不光文獻銘章秋月白杜陵烟艇落花香林居細問𤣥冥子人道天心合有常又垂白西山欲滿顛漢家不遇中興年巢由事業非吾願陳竇功名到耳邉蓑笠獨堪惟飽飯衣冠他自上仙船平生只愛申屠子老去相看落照前又黨錮諸君宿草寒西山南浦謝盤桓莫煩使者室懸榻懶逐羣兒學掛冠未有烟花嶠我老只餘風月倩人看生芻一酹東湖水幾許清光入肺肝又聞道東都萬古悲可堪人事與天時羣雄睥睨嗟何及一代人才信有禆黨籍儘教諸子與天機惟許此翁知解嘲莫笑揚雄論誰畫陳蕃入此祠和夏正夫題陳粹之家藏南陽卧龍圖三分天下羽書馳龍卧南陽未起時海內風塵皆羿莽眼中魚水是湯伊未除漢賊身先死便絶江流恨不移曉霧一綃巾幗在青山千古笑曹丕和夏正夫題陳粹之家藏藍關擁馬圖金剛未破羚羊角西極流風大夏薰自分疏狂投瘴海敢將衰朽負明君藍關馬瘦堪寒雪嶽頂天低識暮雲却笑元和無眼孔鰐魚猶解畏斯文和答涪守張兼素昨夜清風度碧山蓑衣初振水雲間流年信我添華髮世路逢君祗厚顔深樹黃鸝閒自語落花飛燕傍誰還柴門已與山童約明月今宵不用關又春光容易落花輕世路山河算幾程芳草可憐諸老去好風偏為故人清也知蝴蝶渾閒夢却笑獮猴亦世情老子婆娑眠不著五更寒極弊裘橫林緝熙歸㑹于薌城梁宅和洪城見寄雲水千峯更萬峯此心期與故人同蒼茫世路浮生在淡泊春杯野興濃鄉夢幾回茅店月蓑衣無恙栁花風明年唤取陳公甫皂帽青天信一蓬奉寄大韶謝先生癸未南省火先生出豫于厄曽同丙子看鄉榜丙戌登科更在門南省再生真父母西湖歸老任乾坤十年不見先生面多病難忘聖主恩獨立蒼茫回白首滿蹊桃李竟何言慰敷五失子聞君失子勿深悲猶似從前無子時造物戲人聊爾耳男兒到此不須疑東坡緣業無它纍尼父前知後汝期獨對紫薇過半夜一燈風雨讀昌黎題張氏水村小景逢著間人只㸃頭海邉今我是沙鷗多情芳草舊知已如意好山都上樓白髮已前渾是夢黃花相與又逢秋年來解得濠梁意却笑逰魚誤中鈎和緝熙同春書臺萬玉峯頭自在春暖雲晴雨為誰貧誰知别樣風花手只屬粗衣淡蕩人芳草漫同康樂夢野花羞傍紫陽巾即呼猿鶴留君住莫問東家更買鄰和緝熙謁文信公富田祠杖屨春光滿一峯文山猿鶴若為容乾坤卧榻還他主伏臘謳歌信野翁夷夏有情回白日興亡無計奈西風簷花落盡燈前雨懶聽南禪半夜鐘題薌城梁德剛書屋用林緝熙韻乳燕鳴鳩甲水濵小軒幽徑足聽聞坐忘芳草翻疑夢寒盡梅花剩得春世事暗隨燈燼落年華偏戀老翁新芒鞋竹杖身長健頻上金牛醉野人送張兼素北上并寄大韶明仲敷五諸君文昌人物張兼素來謝涪州太守回無數青山容我有幾多黔首待君來朝廷今日真無事草野它年愧不才傳語諸君憐老病餘生留取付春杯答陳石齊二首海上歸來卧一丘烟霞萬頃勝封侯青山未老我長樂明月不來心獨憂雲谷耦耕添此老華胥髙枕是吾州蒼天鼎鼎憑誰在笑倚東風自㸃頭又帝與華胥作睡侯天厨無分飽珍羞友朋愛我垂髙誼妻子耘春不解憂十載驅馳歸故里兩年漂泊落它州草亭風雨瀟瀟處却為蒼生白滿頭寄謝元吉曽見西湖柱史歌長歌三日遏雲和雷霆白晝果在地牛女清秋無渡河淮西草木色不改衡陽花栁春何多幾時攜取陳夫子淡月疏烟醉碧蘿􅚱頭次容彥昭先祖妣葬地處􅚱上三峯髙倚天斜傾北斗飛寒泉野鳥啼吟古蜀帝寒花的皪羅浮仙龍山自落烏紗帽馬鬛新封翠玉鈿萬古清明風木在淚河東注下伊川次陳公甫九日韻三千里外傳佳句兒稚爭歌九日詩黃菊有知催我病蒼天無定使人疑烟霞落夢還多日月露回秋候此時獨倚柴門搔白首南山佳氣接東籬瀧槎吟為彭汝正萬里瀧源天上來乘槎仙子幾時回客星午夜犯牛女烟雨一竿歸釣臺白髮未消湖海氣清風半入雲濤堆蓑衣醉卧黃昏後一枕江聲鼻息雷一橫亭一篷烟雨待君來憑席風濤日幾回尼父已虛浮海夢傅巗初用濟川材一亭真意留芳草兩岸春光付野梅老子羊裘方卧穩棹歌休傍釣魚臺又孤舟端為濟川開載滿東風傍釣臺魚飯情懷渾落魄雲天光影共裴佪浪拋栁絮春無定醉卧蘆花夢未回玉漏不知催幾許早行人已待君來和彭敷五二首聞道東瀧居士來湖山寂歷湖光漼破除塵海夢一覺消得羅浮春幾杯今雨城南驚老樹東風竹外見全梅青山莫笑空回首紫錦囊中萬玉堆又五栁先生歸去來芰荷衣上露漼漼不由天地不由我無盡烟花無盡杯别樣家風幽澗竹一般春意隔牆梅老來只怕風濤險懶下瞿塘灧澦堆謁草廬先生祠道契山中訪有初草廬祠下掃寒蕪六經日月渾無夜萬古真元自此符黃閣夢回空北極紫𤣥雲淨小東吳補天功課誰能就密鍊𤣥精倚太虛送曽郎中約義歸致解印悠然歸故林南山佳氣忽千尋浮雲世事從今古芳草人間自淺深萬壑清風𤣥鶴夢一天秋水白鷗心憑渠領得東周意莫和山前楚鳯吟復陳公懋年年九日登髙處野老悲歌可奈何籬落秋香簮後少關河春草望中多浮雲萬里天慳雨明月千川水漫波間得百年懷抱在白頭林下看蹉跎戲贈明仲弟明仲天庭中鶴頂紅一㸃嘗云須學明道看君即欲看明道無那蒼生福未緣鶴頂漸紅朝日表蠅頭初黑退花前官間儘爾還詩債老去堪誰送酒錢莫道府中無職事閉門猶自抱風眠次易德元青天飛下青山蒼山光無盡天茫茫赤腳仙人九節杖一日拄盡青山長物外逍遙混沌老空中語笑雲霞香黃鶴髙飛在何處蜻蜓猶逐東風狂成化丙戌夏五月豫得罪謫泉南提舉道經金鼇門生彭宜鑑夢中有作意若為豫者時九月二十一日也牆角寒梅昨夜開誰知春在雪中回松筠到處為貞友桃李漫山總俗材清影不隨流水去暗香時逐好風來冰肌玉骨無人識先占千紅萬紫魁逰紫霄觀兩袖西風上紫霄古碑磨蘚認前朝黃塵滿地孤雲在紫極中天萬國標不為丹砂逃日月且緣薪火問漁樵何人更結華山屋泉石中分正道寮復江浦張都憲二首聖主憂勤稼穡難大臣忠奮亮天官日邉紅杏春前種海上黃茅夢裡觀玉殿薰風清社稷冰壺秋月照心肝東籬無限秋光好留與淵明晚節看又萬鼎橫天玉鉉扛堯波導海息舂撞秋飛野草青千里春遞鶯花滿萬邦雲外鳯毛真有侣海邉鷗鳥信無雙功成南紀標銅柱自見聞風萬壁降復且齊朔風鶴氅來湖濵雪中草樹生陽春浩歌一曲泣神鬼浮漚萬古同天人雲霞拂袖海嶽動花月在戶乾坤貧鹿門回首忽千里蒼茫獨立傷吾神迂齊為徐僉憲題對人長笑野夫狂未到東周氣不降閒夢苦疑天未穩緩行猶恐地無綱滿園春意無羊到一枕風清為蝶忙露冕若逢當道虎幾回車上臂先攘正密堂一片靈臺莫自欺此機才動山翁知秋毫不染銘盤日夜半無人秉燭時香燼上薰𤣥宇動冰壺清沁玉淵輝紫陽心印傳千古笑指南山未許移一峯草亭病來久謝乾坤勞白板霜飛安所遭千峯不管甲子老萬竅一任天風號麋鹿過門看箇箇野翁餽藥來忉忉百年有意堪誰道檢書日夜燒松膏來賢堂曉天光霽動千山回首英靈見二難鐡鶴夜留𤣥露飲金童朝煮白雲餐筆頭瀾湧文翻水鏡裏春回酒上顔誰在青霄望牛斗可教長劒倚虛寒張元惠藥酒藥和雲液效方神日日山妻泣四鄰食㫖自知非宰我獨醒誰信是靈均誰將鷀杓分餘滴欲脫鸘裘换一巡忽報白衣人送至玉壺持送曲江春洪峩閣百雉𤣥城架寥玉華仙宇鬱岧嶤丹書北斗𤣥光合黃道中天紫氣饒泮水載陽秋月皓清風歸洞野雲消梅花閣上春如海鐡鶴仙人放玉簫二十六日夢寄饒雯峯太守好雲乘雨到雯峯一片閒雲度大空故國有懷天角白小窗分睡日頭紅秋拋兩鬢蓬髫外春在三生落魄中此老胸懷無畫手杏花庭院栁花風夢和人慶先考初度宇宙千年老八荒不知更變幾滄桑黃花三徑秋風早白髮一簮生意長雲母屏前歌皓齒牡丹亭畔試沈香浮雲一任閒舒卷嬴得青山望渺茫足隱五栁先生歸去來陶然獨對菊花杯巢由不識君人面伊吕徒勞王佐才蓑笠每披烟雨去牛羊幾放夕陽回錦袍公子莫來此門對南山日懶開初八日附黃圭夢兩儀㑹得真鉛汞勘破隂陽妙物機明月滿天秋似水東風一樹栁如絲萬家赤子庭中泣半夜青雲枕畔飛雷電若驚龍便起大施霖雨洗瘡痍十八日夢海上歸來十五秋西風無計白人頭丸中化主先生在物外年華甲子流丹竈一方仙客護玉階方寸昊天留南山佳氣無邉在天夀蒼生樂未休又和同春書臺翠錦雲山信手栽光風消息自天來人間好事傳千古海內長春此一杯河漢昭回傾北極寒泉膏潤麗東萊丹霞百尺虹光動昨夜奎星落上台一峯文集卷十三
