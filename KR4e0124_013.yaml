body:
  text: 一峯文集巻十三明羅倫撰七言八句詩和林緝熈訪六一公于西陽宫宫有瀧岡阡表秋日微涼草樹悲此情堪與故山離蘇黄人物從頭數周邵風流雅未知野老自能償伏臘東風無計奈糠粃憑君莫唱滄洲曲一淚斜陽灑卧獅又西傾一極論今雨潁上方歸思欲離古樹碧圓山欲斷小窓虚白月先知滄江已老三秋鬢太古風清萬國粃暮雨無言翁仲泣淡烟芳草對殘獅和林緝熈書梁徳莊雲菴壁面面春光送草廬自堪蹤跡混樵漁即㸔風絮終無定却愛閒雲得自如禹甸有縁憑造物楚天無夢在仙裾人間晴雨渾閑事嬴得花前到小車逰霜崖洞天并序文昌西山麓曰霜崖洞天洞有石船古今無知者宋陳横齊張習甫瀘濵張養直諸老標異洞乃以名迨我文明少師楊士竒寺丞張宗璉侍講彭敷五繼跡墨於戲山川自宇宙昔晦而今顯也不以人乎成化戊戌張君兼素信次予逰用瀘濵韻各一首兼美將磨崖刻之後之觀者亦將有感扵斯乎野人疎散便成仙自在吾心自在天紅葉為誰流水去白雲留我碧山前烟傳桑海三生石月抱袈裟九月船風物不殊諸老異露華無語對潺湲贈劉善叙往湖南并引劉友善叙將見都憲劉侯孚于湖南也其友羅倫執盞祝曰傳不云乎國家之敗由官邪也官之失徳寵賂章也致敗之由豈有外扵此乎寵賂之章其有甚扵此乎昔和斯哈瑪爾平章斯土黜陟惟允盛徳交孚逺邇洽和交廣欵服况聞周公孔子之道者乎吾子扵侯為同姓居廬陵為同郡賔西塾為同道非浚恒之初者吾見其相與以有成也贈以詩曰愛汝今日湖南逰長風萬里無清秋江山有待亦吾土兄弟相㸔是故侯直道毎増知已重老夫端為大家憂天台舊有延生藥轉手疲癃信爾瘳逰蕭瀧瑞賢亭次侍講彭敷五東風清晝洗浮隂十二䦨干帝汝臨一代文明元有數二儀清濁到而今好山苦戀閑雲住秋水生欺病眼深試問卧龍何日起禹門消息是天心張東白往西山夏正夫訪不遇録其作見寄予亦約東白重逰口占元韻金牛病客老摧隤也學山翁芋栗煨東白先生非我輩西山佳候是良媒使君月下敲門去半夜山隂棹雪回聞道安峯無限好春風還許綈袍陪復廖行儉并引行儉任金華時荷佳句見貽及是罷歸過一峯山中倫執易集要就正于飛轝道傍一夕夢曰三才既展却奔四稚之家千古有人大畫文王之易行儉言還依韻酬之癸巳十月晦登瀛道人羅浮過排風馭氣來無何千里萬里海天逺五峯十峯春色多本相了無塵刼礙浮生虚被身名魔大明千古曙長夜中天共指回揚戈復新昌王直菴樂志風騷回首盡臺輿野老烟花興未除萬壑秋聲和鳯律一蓑春色上牛車貞元自古天難老麟鳯中原網易疎茅屋蕭然湖上榻青山流水夢何如送何廷秀按察河南西風秋意滿陶園采采黄花泛此樽醒醉百年消日月行蔵今日任乾坤中原藩鎮諸公在北極朝廷萬世尊老病多君戀明主夢回欹枕釣蓑温陳夢祥歸南海内翰張廷祥憲使陳文曜憲副夏正夫憲僉徐明徳陳粹之㑹餞于洞陽觀聫句寫别倫聞次其韻長江一色楚天南别緒無端夢與參百嵗逢君能有幾兩儀添我便成三洞陽日暮誰辭醉陋巷風光只自甘極目湖山秋萬里錦衣何處覔歸㠶僉憲徐迂齋陳冷菴㑹于泰和觀臨别言懐泰和觀裡秋光滿共對寒香進此盃病骨可曽縁客醉好懐今日為君開碧山白髪定誰老黄鶴青霄何處來十二天章還老手明朝歸取五雲裁題徐迂齋匡廬秋霽圖用前韻東南秀色甲天下無限秋光落酒盃紫盖黄旗山色見光風霽月草堂開羣雄已散浮雲夢此老猶尋白鹿來欲剗匡廬塞彭蠡中原萬里入平裁題徐節婦巻用張方伯韻懶拈鸞鏡掃蛾眉羞見楊花别故枝芳草有情還夜合貞松無夢與春移婦人自我如男子造化從他似小兒一片鐡心編不盡直從刪後更無詩西隠張氏㑹英圖宇内春光領欲完名園今得萬花㸔幾回清夜宴桃李九老東風入肺肝病客且扶藜杖去勸君莫放酒盃乾不知牆外春深淺醉把花鬚仔細㸔聚英堂用蕭宜沖韻呼童連夜報青山海内衣冠此㑹難别段鸎花休問主自家風月不曽閒蒼天慣我長為客野老㸔君亦解顔莫學山隂便歸去短篷殘雪五更寒答夏憲副止菴見贈二首乆病寒衾易覺秋老懐珍重為東周𤣥天有意縁誰在紫綬何人為國謀月桂夜長迷玉兔銀河秋盡隔牽牛雲山十二窩頭路多謝先生夢寐求又髙堂明鏡萬莖秋屋上西風撼不周鑿沼且留明月住買山初為白雲謀誰呼鐡笛先招鶴自著蓑衣早放牛道在莫須同出處此心還向止菴求和緝熈過毛英懋西園隠居肝肺贏餘五畝春草堂雲暖小山貧塵中物色元無我林下心情見此人鶴伴野翁梳白髪蝶随春色上烏巾褰衣細問西園老怕有人家可並隣和緝熈留别甲子流年又幾春東風初散馬蹄頻自憐白髪添明鏡悵望青天入暮雲寒日卧龍遲逺夢冷花幽鶴伴芳辰相逢且盡樽前酒無那滄波欲送人唐曲江公張九齡志徐孺子碣陳獻章公甫題憲副夏寅正夫邀倫同和憲使陳煒文曜刻石東湖亭上聘君子季登及陳蕃禮宜侑享故及古往來今成代謝青山流水費興亡流連木榻堪何事慘淡炎精遂不光文獻銘章秋月白杜陵烟艇落花香林居細問𤣥㝠子人道天心合有常又垂白西山欲滿顛漢家不遇中興年巢由事業非吾願陳竇功名到耳邉蓑笠獨堪惟飽飯衣冠他自上仙船平生只愛申屠子老去相㸔落照前又黨錮諸君宿草寒西山南浦謝盤桓莫煩使者室懸榻懶逐羣兒學掛冠未有烟花嶠我老只餘風月倩人㸔生芻一酹東湖水幾許清光入肺肝又聞道東都萬古悲可堪人事與天時羣雄睥睨嗟何及一代人才信有禆黨籍儘教諸子與天機惟許此翁知解嘲莫笑揚雄論誰畫陳蕃入此祠和夏正夫題陳粹之家蔵南陽卧龍圖三分天下羽書馳龍卧南陽未起時海内風塵皆羿莽眼中魚水是湯伊未除漢賊身先死便絶江流恨不移曉霧一綃巾幗在青山千古笑曹丕和夏正夫題陳粹之家蔵藍闗擁馬圖金剛未破羚羊角西極流風大夏薫自分疎狂投瘴海敢將衰朽負明君藍闗馬瘦堪寒雪岳頂天低識暮雲却笑元和無眼孔鰐魚猶解畏斯文和答涪守張兼素昨夜清風度碧山蓑衣初振水雲間流年信我添華髪世路逢君祗厚顔深樹黄鸝閒自語落花飛燕傍誰還柴門已與山童約明月今宵不用闗又春光容易落花輕世路山河算幾程芳草可憐諸老去好風偏為故人清也知蝴蝶渾閒夢却笑獮猴亦世情老子婆娑眠不著五更寒極弊裘横林緝熈歸㑹于薌城梁宅和洪城見寄雲水千峯更萬峯此心期與故人同蒼茫世路浮生在澹泊春杯野興濃鄉夢幾回茅店月蓑衣無恙栁花風明年唤取陳公甫皂帽青天信一蓬奉寄大韶謝先生癸未南省火先生出予于厄曽同丙子㸔鄉榜丙戌登科更在門南省再生真父母西湖歸老任乾坤十年不見先生面多病難忘聖主恩獨立蒼茫回白首滿蹊桃李竟何言慰敷五失子聞君失子勿深悲猶似從前無子時造物戲人聊爾耳男兒到此不須疑東坡縁業無它累尼父前知後汝期獨對紫薇過半夜一燈風雨讀昌黎題張氏水村小景逢著閑人只㸃頭海邉今我是沙鷗多情芳草舊知已如意好山都上樓白髪已前渾是夢黄花相與又逢秋年來解得濠梁意却笑逰魚誤中鈎和緝熈同春書臺萬玉峯頭自在春暖雲晴雨為誰貧誰知别樣風花手只屬麄衣淡蕩人芳草漫同康樂夢野花羞傍紫陽巾即呼猿鶴留君住莫問東家更買隣和緝熈謁文信公富田祠杖屨春光滿一峯文山猿鶴若為容乾坤卧榻還他主伏臘謳歌信野翁夷夏有情回白日興亡無計奈西風簷花落盡燈前雨懶聴南禪半夜鐘題薌城梁徳剛書屋用林緝熈韻乳燕鳴鳩甲水濵小軒幽逕足聴聞坐忘芳草翻疑夢寒盡梅花剰得春世事暗隨燈燼落年華偏戀老翁新芒鞋竹杖身長健頻上金牛醉野人送張兼素北上并寄大韶明仲敷五諸君文昌人物張兼素來謝涪州太守回無數青山容我有幾多黔首待君來朝廷今日真無事草野它年愧不才傳語諸君憐老病餘生留取付春杯答陳石齋二首海上歸來卧一丘烟霞萬頃勝封侯青山未老我長樂明月不來心獨憂雲谷耦耕添此老華胥髙枕是吾州蒼天鼎鼎憑誰在笑倚東風自㸃頭又帝與華胥作睡侯天厨無分飽珍羞友朋愛我垂髙誼妻子耘春不解憂十載驅馳歸故里兩年漂泊落它州草亭風雨瀟瀟處却為蒼生白滿頭寄謝元吉曽見西湖柱史歌長歌三日遏雲和雷霆白晝果在地牛女清秋無渡河淮西草木色不改衡陽花栁春何多幾時攜取陳夫子淡月疎烟醉碧蘿􅚱頭次容彦昭先祖妣𦵏地處􅚱上三峯髙倚天斜傾北斗飛寒泉野鳥啼吟古蜀帝寒花的皪羅浮仙龍山自落烏紗帽馬鬛新封翠玉鈿萬古清明風木在淚河東注下伊川次陳公甫九日韻三千里外傳佳句兒稚爭歌九日詩黄菊有知催我病蒼天無定使人疑烟霞落夢還多日月露回秋候此時獨倚柴門搔白首南山佳氣接東籬瀧槎吟為彭汝正萬里瀧源天上來乘槎仙子幾時回客星午夜犯牛女烟雨一竿歸釣臺白髪未消湖海氣清風半入雲濤堆蓑衣醉卧黄昬後一枕江聲鼻息雷一横亭一篷烟雨待君來憑席風濤日幾回尼父已虚浮海夢傅巗初用濟川材一亭真意留芳草兩岸春光付野梅老子羊裘方卧穏棹歌休傍釣魚臺又孤舟端為濟川開載滿東風傍釣臺魚飯情懐渾落魄雲天光影共裴佪浪抛栁絮春無定醉卧蘆花夢未回玉漏不知催幾許早行人已待君來和彭敷五二首聞道東瀧居士來湖山寂歴湖光漼破除塵海夢一覺消得羅浮春幾杯今雨城南驚老樹東風竹外見全梅青山莫笑空回首紫錦囊中萬玉堆又五栁先生歸去來芰荷衣上露漼漼不由天地不由我無盡烟花無盡杯别樣家風幽澗竹一般春意隔牆梅老來只怕風濤險懶下瞿塘灧澦堆謁草廬先生祠道契山中訪有初草廬祠下掃寒蕪六經日月渾無夜萬古真元自此符黄閤夢回空北極紫𤣥雲凈小東吳補天功課誰能就密鍊𤣥精倚太虚送曽郎中約義歸致解印悠然歸故林南山佳氣忽千尋浮雲世事從今古芳草人間自淺深萬壑清風𤣥鶴夢一天秋水白鷗心憑渠領得東周意莫和山前楚鳯吟復陳公懋年年九日登髙處野老悲歌可奈何籬落秋香簮後少闗河春草望中多浮雲萬里天慳雨明月千川水漫波閑得百年懐抱在白頭林下㸔蹉跎戲贈明仲弟明仲天庭中鶴頂紅一㸃嘗云須學明道㸔君即欲㸔明道無那蒼生福未縁鶴頂漸紅朝日表蠅頭初黒退花前官閑儘爾還詩債老去堪誰送酒錢莫道府中無職事閉門猶自抱風眠次易徳元青天飛下青山蒼山光無盡天茫茫赤脚仙人九節杖一日拄盡青山長物外逍遙混沌老空中語笑雲霞香黄鶴髙飛在何處蜻蜓猶逐東風狂成化丙戌夏五月予得罪謫泉南提舉道經金鼇門生彭宜鑑夢中有作意若為予者時九月二十一日也牆角寒梅昨夜開誰知春在雪中回松筠到處為貞友桃李漫山總俗材清影不隨流水去暗香時逐好風來冰肌玉骨無人識先占千紅萬紫魁逰紫霄觀兩袖西風上紫霄古碑磨蘚認前朝黄塵滿地孤雲在紫極中天萬國標不為丹砂逃日月且縁薪火問漁樵何人更結華山屋泉石中分正道寮復江浦張都憲二首聖主憂勤稼穡難大臣忠奮亮天官日邉紅杏春前種海上黄茅夢裡觀玉殿薫風清社稷冰壺秋月照心肝東籬無限秋光好留與淵明晩節㸔又萬鼎横天玉鉉扛堯波導海息舂撞秋飛野草青千里春遞鸎花滿萬邦雲外鳯毛真有侣海邉鷗鳥信無雙功成南紀標銅柱自見聞風萬壁䧏復且齋朔風鶴氅來湖濵雪中草樹生陽春浩歌一曲泣神鬼浮漚萬古同天人雲霞拂袖海岳動花月在戸乾坤貧鹿門回首忽千里蒼茫獨立傷吾神迂齋為徐僉憲題對人長笑野夫狂未到東周氣不䧏閒夢苦疑天未穏緩行猶恐地無綱滿園春意無羊到一枕風清為蝶忙露冕若逢當道虎幾回車上臂先攘正密堂一片靈臺莫自欺此機纔動山翁知秋毫不染銘盤日夜半無人秉燭時香燼上薫𤣥宇動冰壺清沁玉淵輝紫陽心印傳千古笑指南山未許移一峯草亭病來乆謝乾坤勞白板霜飛安所遭千峯不管甲子老萬竅一任天風號麋鹿過門㸔箇箇野翁餽藥來忉忉百年有意堪誰道檢書日夜燒松膏來賢堂曉天光霽動千山回首英靈見二難鐡鶴夜留𤣥露飲金童朝煮白雲飡筆頭瀾湧文翻水鏡裏春回酒上顔誰在青霄望牛斗可教長劒倚虚寒張元恵藥酒藥和雲液效方神日日山妻泣四隣食㫖自知非宰我獨醒誰信是靈均誰將鷀杓分餘滴欲脱鸘裘换一巡忽報白衣人送至玉壺持送曲江春洪峩閤百雉𤣥城架寥玉華仙宇欝岧嶤丹書北斗𤣥光合黄道中天紫氣饒泮水載陽秋月皜清風歸洞野雲消梅花閤上春如海鐡鶴仙人放玉簫二十六日夢寄饒雯峯太守好雲乘雨到雯峯一片閒雲度大空故國有懐天角白小窓分睡日頭紅秋抛兩鬢蓬髫外春在三生落魄中此老胷懐無畫手杏花庭院栁花風夢和人慶先考初度宇宙千年老八荒不知更變幾滄桑黄花三徑秋風早白髪一簮生意長雲母屏前歌皓齒牡丹亭畔試沈香浮雲一任閒舒巻嬴得青山望渺茫足隠五栁先生歸去來陶然獨對菊花盃巢由不識君人面伊吕徒勞王佐才蓑笠毎披烟雨去牛羊幾放夕陽回錦袍公子莫來此門對南山日懶開初八日附黄圭夢兩儀㑹得真鉛汞勘破隂陽妙物機明月滿天秋似水東風一樹栁如絲萬家赤子庭中泣半夜青雲枕畔飛雷電若驚龍便起大施霖雨洗瘡痍十八日夢海上歸來十五秋西風無計白人頭丸中化主先生在物外年華甲子流丹竈一方仙客䕶玉階方寸昊天留南山佳氣無邉在天夀蒼生樂未休又和同春書臺翠錦雲山信手栽光風消息自天來人間好事傳千古海内長春此一盃河漢昭回傾北極寒泉膏潤麗東萊丹霞百尺虹光動昨夜奎星落上台一峯文集巻十三
