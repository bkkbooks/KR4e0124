body:
  text: 一峯文集巻十四明羅倫撰歌湖山萬里歌并引益菴陳夢祥僉江西憲事考滿歸南海冷菴陳粹之同寮而厚别送攸鎮驛益菴寫湖山萬里圖以寄情予為之題光霽湖天月滿舷棹歌聲裡鐡腸仙棹歌聲禋日如年歌聲一透鴻濛堅歌停雲散山依然歌韻初傳滿大千渭城三疊流空烟湖山一曲江天連潁川老子歸田園桑麻萬頃東風妍蓑衣篛笠犁鋤邉芒鞋竹杖風花前麻衣草座南陽阡石頭玉板東坡禪人間官不直一錢四時青紫西風蟬至今薄俗違髙賢夢祥骨鯁知誰憐我獨擊節非諛便粹之瀟灑輕肥鮮益菴冷暖寒無氊手持鐡杖來扶顛兩公脊硬當皇天金蘭氣味同心言海天夢落烟霞先西江忽上番禺船乾坤瘡痍誰當痊天河莫寫中幽悁冷菴回首别袂褰益菴落筆驚龍眠湖山萬里離情牽湖山萬里一幅箋㝠鴻天濶鳯孤騫靜棲巖歌并序静棲巖舊名聖棲巖盖佛子之居也去廣昌十五里在吉祥里北石山壁立如翠玉屏風下有洞穴深廣圓瑩可容百數十人竒山秀水環繞左右邑人掲黻氏闢荆棘造廬舍延叔父蘭窓先生主之叔父曰非静無以成學易其名為静棲命留題刻石遂斐然成章使後之髙人大隠知静棲之名發乎蘭窓叔父也叔父名曰修益混沌神工劈天斧鑿破鴻濛開太古青天碧玉一萬仭玉宇玲瓏紫虚府緑雲繞梁丹霞繡柱明月掛簷清風入戸琪樹扶疎瑶草緑白鶴回翔紫鸞舞王喬來逰傅説築堵左手撫蓬壺右手挾天姥貝闕珠宫等是閑洞天福地羞與伍掲陽有佳人好事過謝五邀請羅浮仙來作静修主饑餐紫芝渇飲玉乳春陽融融液肝腑天葩燁燁竒芬吐日錬五色石萬杵𤣥霜苦借問爾何為欲把青天補仙人本是好閑居却憶蒼生思下土君不見山前婦人哭啾啾為道淫雨無時休節婦歌并序節婦姓某氏父某年二十配某氏三載其夫卒子一人甫五嵗亦卒或勸其改配者節婦哭曰此言何至吾耳乎吾聞婦之事人從一無二吾生為某氏婦死為某氏鬼矣聞者惻惻毛竪扵戲婦貞其夫子孝其父臣忠其君是皆出扵秉彛之性天柱賴以立地維賴以固者節婦比有之忠臣孝子鮮聞焉豈婦人能之而丈夫反不能哉欲動乎中而所守變乎外丈夫有愧扵婦人多矣若節婦者惡可無聞哉予故傳其事而播諸聲歌使觀風者有所采也泉流不歸山雨落不上天妾心死不回金石無全堅白日經中街飄忽沈西海妾心日不如長夜瞳瞳光不改明月懸清輝三五二八圓又虧妾心月不如一圓耿耿無虧時妾心一寸鐡不與洪爐滅妾心萬鈞石不觸洪濤裂妾髪可剪妾頭可截妾心之白不可涅憶妾二十春結髪事良人焉知三載皇天傾羅幃繡幕生素塵懐中五嵗兒水上浮漚淪白髪蕭蕭垂老親綵衣零落空悲辛吾聞陳孝婦夫死養姑心愈固朱幡入奏丹書來黄金北斗髙門户又聞杞梁妻一哭梁山傾精誠變天地黄土非無情君不見章臺女傾城華去年嫁東隣今年歸西家顔色皎皎如桃花如桃花貪結子紅顔不惜汙泥沙回首天漢上雙鳯縹縹凌紫霞蓬蒿仰面空咨嗟竹溪歌為南雄陳壁先考賦大庾嶺頭梅花所出氣壓羅浮名動月窟潁川遺老冰雪風骨嗚呼梅花花中之儒先天下之春胡為不友而友此君此君虚直是此老之心術此君標格是此老之精神婆娑鸞鳯影變化蛟龍身睿聖與齊徳俗士不敢親翠雲一萬丈白日搖蒼旻蒼雪灑六合祝融回朱輪姑射仙人冷偷眼廣平學士冰生唇晉七賢唐六逸一年三百六十日日日來傾三百盃脱帽露頂此君側玉山自倒非人推竹溪處士今何在半夜還騎綵鳯回和夏憲副止菴賦陳粹之冷菴赤壁圖歌赤壁一萬丈不為浮雲裘崢嶸蘇長公豪氣盖九州東華塵土涴汗脚摩㺯雲海浮虚舟山髙月小自今古小人䖝蛆君子龍虎東風赤壁一炬紅千載曹劉兩丘土我耳不欲聞何客吹洞簫山林杳㝠鳥獸悲號風塵澒洞欲拔腰間倚天劍陸剸蛇豕水斬鮫鯨手挾南溟鵬足躡飛雲履仰天發長咲自把太虚擬轉眼五百年冷菴好畫止菴賦江西二妙世間無倒腔翻作蘇仙圖横江孤鶴夢若醒人間軒冕真泥塗挽張方伯嚴霜殺碧草白露晞青苔美人一去不復來秋風白帝孤猿哀為君一掛劍枯樹生春華斗間紫氣芒寒斜隆君萬夀天無涯定王樂用冷菴歌君不見淮陽城君不戀曲江景君不味羅珍羞君不皦衣裳錦君居冰一壺君出雪一艇千山寂鶚聲萬境絶塵影道有凍餓人冷菴無此冷我寒待君衣我饑待君省民瘼不問問牛喘莫學漢家丞相丙冷菴冷冷如鐡萬國如在紅爐中江南六月寒風雪恥菴好向冷菴逰冷菴好傍恥菴結菴外諸君知不知兩菴裡事乾坤歇集成蘭衆當路我空谷無人而自芳無風而自馥上師魯叟下友靈均隨分山林吾亦足蕭艾如不知栽傾自培覆靜觀堂靜觀堂上本無我九曲𤣥中更有天隻眼已抛桑海外萬象忽落鴻濛前秋横古月鶴初定春枕白雲山欲眠鳯棲丹穴栖栖坐斷梧桐枝雲衢文翰光陸離朝陽聲動羣鴻悲髙崗影落寒山輝八月霜飛秋氣凄秋巖雨滴空垂垂鳯兮鳯兮今來儀滄江白髪歌明時龍卧滄濵白雲飛盡寒潭清空山草木流芳馨秋日雷霆震復驚春風頭角深潜形蛟人夜泣清湘碧驪珠曉吐滄波明瀧濵瀧濵明發靈八荒净洗天瓢傾冷菴嵗寒幽趣圖君心虚君節剛君性直君色蒼可深山可巖廊可春陽可秋霜此君所以為三友之一流萬世之芳夢送張萬禎寒蟾影落光天中巨艦艨衝野水東桂溪隠者禎菴翁草鞋路逺朱門通雲天悠悠光景融裴佪杖屨酣東風桃李無言朝露滿五雲沾路春光濃題邑史艾方師存機軒艾宣昔日丹青學寫遍朝家及臺閤孤標雅操自天成敢與諸黄較强弱雲孫自少心孔開挾藝過我羅浮來一峯山人忽驚訝筆奪造化非常才緬思今代老吟伯詩載牛腰富能得展圖示我雲錦章盡是功名天上客金牛野老誰與論窮經棲雲鎖洞門云胡索我寫長句安得好手如右軍諸公衮衮難趾美空唱巴人汙君耳思君此去名愈香何異彩鳯鳴朝陽㑹當上國寫御容天子穆穆侯皇皇贈畫史艾方師有客貌古鬚眉蒼靈臺倒湛秋天光運筆通神超頋鄭潑墨無迹齊黄王為予揮灑一峯亭雅懐一段何可當金牛洞府𤣥雲間分明移來静觀堂觀之無厭愛無足此人此畫今無雙變化無窮杳難測妙無言兮紙一張行㸔應詔賔上國麒麟閤寫鴻鴈行一峯文集巻十四
