body:
  text: 一峯文集卷十二明羅倫撰七言絶句詩和林緝熙題宣和殿臨韓幹馬夢入黃鸝紫殿隂天津空費杜鵑心宣和玉輦君休問老在西風五國林示學者碧天如水浩無窮萬劫消沈晝夜同獨步鴻濛誰不死一丸光動紫薇中題梅窗四好凍合山河骨未摧老幹凌寒重隂先透一陽回孤根得暖東風獨與春光首疏花綴玉商鼎調羹俟子來佳實垂金題李氏懷恩堂東風何事欲沾巾猶未全歸七尺身一片昊天頭上立此生長照此心真題朋江朱望震成趣園忽聞屐齒驚蒼苔可是淵明歸去來平生此老用不盡黃金無數寒香開答廣德太守周梁石以近體見規兼遺古琴欲以養中和之德者湖西風月吳江舊廣德煙花越錦新不是五絃傳太古夢中誰與出天真寄胡梅川金精山下漏春光雪裏春回一線陽謝得梅花清到骨東風長夀萬年香題漢宫圖白蛇中斷赤旗開四百年中夢兩回惟有終南舊山色雨餘猶自送青來題五雲蕭氏三公五爵圖漢苑唐宫世已空莫將興廢語東風人間萬事皆塵土一段繁華又夢中中秋日代修篤四叔作送馬生歸南海青天拾得中秋月照破閻浮萬劫塵昨夜長風吹不斷清光隨著海南人蕭宜沖見陳公甫于白沙胡憲副希仁隆禮下之海天空濶風日和暢招霞外布衣林緝熙何時矩李德孚輩更酬互答律倡吕和綽有雩下風致宜沖袖謁一峯山中因題其首曰海天吟㺯并續貂焉以俟于諸君太虛雲去天無衣洞門兩斷山開扉山人莫袖東風手指點梅花無是非又海天袖得蓬萊回眼裏衡廬安在哉三十六峯吟不盡朱張還向雪中來題新喻袁孝子方泰草亭風花髙下草煙青春滿袁家孝子亭阿母瑤池香夢杳綵衣猶隔翠雲屛贈隱士此翁行坐一壺天甲子流年大撓先却笑君平生計拙自家風月不須錢送施生歸新喻南海清風宇宙流林何分得白沙秋西湖一尺先天雪辜負寒光六月浮林緝熙何時矩皆公甫門人示萬載彭用中陳鑘二首倉黃紙上間言語寂寞玄天獨此心桐樹未秋明月古山童沈睡草堂深又淡煙疏雨野人家獨立蒼茫眼欲花籬落晝長雞犬靜春光恰好到桑麻挽同年劉顯仁丙戌同年三百五泥塗甲子是君先黃鸝莫説瀛洲夢山下春花正可憐贈陳壁蔡玹二首聞道東華老秀才自將雙腳涴黃埃知君不是尋常客解取棲雲嶂上來又柴門流水稻花初城市心塵肯到無篛笠蓑衣煙雨去老夫依舊是農夫題春夜宴桃李園圖贈陳粹之春宵花月為誰明羅綺筵中欲二更東老倉皇眠不著夜深還聽管絃聲寄廬陵梁德剛歸自楚天上人間第一家善聲今已著中華元龍湖海歸來日洞裡東風醉紫霞丙戌同年吕廷揚出令新城豫尋醫旴江視之同逰天峯老僧乞題因書于壁淡淡間雲野日黃城南春服紫霞香絃歌聲裡天峯寺緑樹重隂午夢長登新城令陳君員韜遺愛亭棠樹隂隂手自栽年年春日領春來道傍芳草無人問一度東風一度灰遊福山寺二首并序福山舊名覆船山唐懿宗易覆為福宋祥符去船名福山紫陽朱文公蓋嘗遊焉寺僧像而祀之同年吕廷揚來令新城約豫同遊因正其位號祀于大雄氏之後室名曰崇正時成化十年甲午五月晦日也雲和草樹拂天香無盡光中見紫陽萬籟一空天似水滿船風月武夷堂又洗天雷雨過南山佳氣無邉紫翠間長笑一聲空浩劫白雲飛盡老僧間别廷揚釀得新城萬頃春碧桃扶醉不辭頻羅浮山下梅花屋夢裡逢君恐未真題旴守仲仁玩易軒白髮蕭蕭思滿巾爐香不動閉關心等間欲問春消息梅樹枝頭看淺深題吕豸讀書處好山端為此君來竹徑茅堂次第開曽向讀書臺上望西風吹盡陌中埃題饒雯峯梅二首萬古清香橫宇宙幾枝疏影照寒暉玉堂不識孤山趣長日無言對紫薇又六合空無一點埃暗香多在雪中來柴門長日無人到強半詩懷為汝開送梅宰入覲千樹東風滿上林九重春意待君深孤舟一片梅花月照見離明萬里心送楊慶陳偉歸安慶二首羅浮春色自君來萬疊雲山紫翠開無限風光皆落手袖中歸去有蓬萊又浮雲殘雨總瀟然留得羲皇太古天明月滿船湖上路棹歌光霽杳無邉送張興和歸貴溪明月春光滿釣磯西湖今夜棹歌歸南軒莫入東窗夢童冠于今解浴沂和林緝熙題瀧崖之作流水何心苦未休白雲依舊思悠悠山人莫被間花惱只恐天翁亦白頭與黃時憲忽驚清露濕芙蓉灺盡燈花月正中欲把行藏話端的請君還拜石齋翁寄閩中馬孝子惟一莆人云姓髙三年蔬水如君少一片天然孝子心昨夜三山明月滿不知甘露灑幽林逰武夷偶成棹歌聲動幔亭春風景依然漢與秦流水三三山六六古今逰盡幾多人送蕭主事廷珍回南塵逐西風散馬蹄江南歸思朔雲迷耳邉聞得田夫語昨夜前村雨一犁送人還鄉江漢西風吹客衣滄波浩浩一舟微柴桑若問陶彭澤不為黃花解印歸偶書聞道蒼生淚滿衣病多偶與素心違羊裘不著寒江雪只裹春風卧釣磯寄容彥昭聞兄弟欲異居尋春何必問誰家春事無端落暮霞海上東風休自老容家庭院有荆花題陳粹之丙吉問牛圖遺黎橫道劒橫天太武猶煩問一元二百年終多事在漢家丞相本無言贈宜黃席瑄何處滄浪此濯纓金牛明月棹歌亭請君試問東流水曽共黃河幾度清題守村南畝東風萬種肥花邉煙雨上蓑衣燈前細與兒孫約老子生涯汝自知寄邵武盛太守時望亂山髙下晝冥冥樵水東頭數點青聞道山間明月上幾回風雨只從星送梅太尹鼎考最行一川楊栁萬金絲祗與人間管别離天上别留芳桂在廣寒秋長最髙枝送費瑞帶得東風萬里歸東風無地不相隨小窗若問春深淺窗外桃花易滿枝活人堂吟藥裹匡牀白日貧敝裘寒擁洞雲春聞君屋外黃金杏顆顆東風顆顆仁風梅調元消息在花魁昨夜東風特地來湖上數枝看結實蒼生休道渴心埃挽郁樂山一函夜閉空山前浮雲散盡山依然山中猿鶴亦解語明月長戀山人眠夀王徑翁碧雲門榻南山秋紅塵兩腳東門羞世上間忙縳不得先生已入無何逰太極池太極池邉草一亭水光山色上疏櫺西堂風月如相問為道南州卧不醒慕椿堂黃髮嬰兒百嵗憂八千辜負漆園秋西風夢落無何有香葉浮天玉露流雲菴靜坐吟獨向空山靜坐時白雲提構若為誰夜深只遣山童數月到梧桐第幾枝丹鳯朝陽綘闕雲霄散紫霞丹山碧海曉光華喚回一枕周公夢自倚東風送落花送苻瑞還金田一片長天一片秋吳江分入楚江流自來浮海無人健莫作尋常看仲由春融門無端杖屨倚玄通瑞入丹霞霽景融海月春光收不盡碧筒和露咽東風秋卓門百仭玄雲風一槖吹動萬山秋更卓蒼溟涼雲洗空青鐡鶴夜眠猶未覺洗心亭一片靈臺百染汙天將明月與君孤源頭活水依然在洗得湯銘一字無洞虛池洞天落落洞池虛天自如如水自如浮象只教行不盡祗于間處看鳶魚雲山第一窩風光天下已無雙萬里雲山盡樹降一笑出門天廣大不知塵外有滄桑鐡鶴亭一笛西風夢不驚碧天如水大多情月明依舊南飛去萬里玄雲片羽輕萬花春谷二首紫幹亭亭麗玉華紫陽光景上袈裟憑誰出此擎天手剪破東風散綵霞又萬花庭院各春風春在金牛繡谷中一味東皇心事好韶光流遍紫霞宫半畝方塘開破雲山第一窩秋光無底鏡天羅雲根一脈陽和動添得靈源水氣和遊龍亭金鱗玉甲青雲衣秋聲已破東風圍須臾變化雨天下浮光萬古驚清輝鳴蚪亭青山一幅鳴天機丹崖萬壑飛虹霓青山莫管間雲非間雲猶裹青蓑衣橫月亭梧桐枝上橫天飛天空雲淨秋遲遲書臺萬古生清暉人心萬古圓明時玉華峯一柱東風戀紫霞數聲雞犬野仙家東風自此無分破添得碧桃無數花鑑湖書屋湖上秋光碧萬尋吾伊聲裡日千金莫教平地風波起一鏡秋毫坐古今題梅南枝漏泄東君信點破江南一片春鐡笛一聲山月冷半空飛下縞衣人夢題王許三峯六月霜飛萬井寒江南煙雨此峯看剡溪若解先生意日日茅亭住得安二十三日夢歸城兒女候秋光采采黃花泛酒觴霜後有霜花更好東籬留得萬年香太極丸春萬山蒼玉一丸春太極先生是此君無限風光看不盡山河全露素王身金鼇霽雪金鼇海上際天來凍合雲樓霽不開無限清光皆落手草堂明月棹歌回玉冕晴雲變化無端古又今卷舒由我此機深時來慰滿三農望箇裡無心是有心翠玄幽玩一壺光景浩無邉妙絶中和大有天自古洞門無俗客至今留與濟川仙大旒垂玉一泒銀河夜不收碧山無礙此天流紫雲芳草春無際却界長天一色秋飛輿橫翠碧雲芳樹與天齊回首湖山萬皺低莫遣桃花逐流水恐人疑是武陵溪三峽回清三峽盤回百里通洞天深鎖水雲中無邉光霽誰為主一泒銀河萬折東一峯來秀倚天髙樹遏雲流只見長春不見秋曉月瞳瞳光四海無邉佳氣擁羅浮初四日夢海棠流月過蘇牆照見茅堂是玉堂堂上真元無别主劉郎依舊與劉郎十一月一日將至瀧濵夕毛氏西園太極西皇是我家碧雲長樹醉流霞玉華仙子歸來日笑指東風第一花初二日至瀧濵夕車溪張氏勸君莫向青山家勸君莫向東風夸面前自有好田地菊花開後開梅花十二月一日夢送望振北上鐡鶴亭前醉碧隂金牛洞裏睡雲深明年袖裹東風去唤得天邉杏滿林丹霞室瑞入春風醉紫霞東華光景賸西華金墩不似仙墩好玉鏡閻浮次第花玄雲崖百仭玄雲片玉清園林風致似虞廷只緣解得髙山意指下無音太古情六合玄雲東華光景儼南華六合風花屬我家試上雲樓足清賞與君長醉赤城霞浴月亭無奈清都道氣何金波萬頃浴嫦娥廣寒秋色深無底一片虛雲照大羅金牛亭不耳牛亭夜載煙好緣長不受春鞭自從脫却金籠後多在青山玉樹邉金牛洞天洞天風景碧虛中九曲雲根一線通誰向紫陽山下路梅花三弄倚東風二十一日夢野仙才割白雲房夜靜梅花試玉香一段春風無限力幾翻推倒紫霞觴二月初二日夢次第開花次第花隔牆何必問誰家也應無奈春光好長對東風醉紫霞又四海明年宇宙香萬花庭院各春光綱常擔上挑三統萬古綱常上脊梁玉柱峯玉柱峯頭紫氣回清明時節逼峯來只今間却擎天手南部煙花總自裁五月初二日夢隂陽管束璣衡外宇宙呼噓槖籥中嵗事化權今在手人間何樹不東風三月初七日夢髙卑一曲動玄青春日春風拜考亭不是昊天無處著潔魂應送水成清九月海天吹雨未曽收曽上雲樓努力休收斂此心歸寂寞一方明月爛沙頭十一月初三夕于杏林天機才動玉壺春海內初看白日頻頭上葛巾猶在此與君同是葛天民又庭燎春和萬國香小橋虹路倚天長明年去借仙翁手指點雲章對玉皇十六日夢倣佛雲霄玉萬竿依稀王母駕青鸞來時不識歸時路共向瑤臺月下看二十五日夢月色花香掌上看分明春事滿闌干憑誰説與林和靖雪樹枝頭雪未乾閏二月二十六日夢紫閣春隂倍草堂玉蓑金笠戴春光從今收拾乾坤後自對青山借一觴十六日夢送安成醫士劉敷烈野客歸來野興狂水雲樓閣水雲香鏡湖十里春如畫一樣荷花一樣香十月初三日夢酒畔逢春手莫停耳邉鶯語大分明間花野草春全賴遇著東風一樣生夢聖賢為學在求心為學心求古自今回首羅浮山下屋梅花春意一枝新無題二首留得一瓢收野興忽然雙鶴水之清秋風不敢吹茅屋只恐先生夢裡驚又沈醉東風未得醒落花飛絮日冥冥門前有個長松樹莫遣黃鸝來上鳴初三日夢黃花隨處隱天流萬壑清風一夜秋可是謫仙緣未滿不妨還作此山囚七月初九日夢秋風無恙布袍輕十里西湖格樣清一片鐡心聽不盡天津長短杜鵑聲一峯文集卷十二
