body:
  text: 一峯文集巻十二明羅倫撰七言絶句詩和林緝熈題宣和殿臨韓幹馬夢入黄鸝紫殿隂天津空費杜鵑心宣和玉輦君休問老在西風五國林示學者碧天如水浩無窮萬刼消沈晝夜同獨步鴻濛誰不死一丸光動紫薇中題梅窓四好凍合山河骨未摧老幹凌寒重隂先透一陽回孤根得暖東風獨與春光首疎花綴玉商鼎調羹俟子來佳實垂金題李氏懐恩堂東風何事欲沾巾猶未全歸七尺身一片昊天頭上立此生長照此心真題朋江朱望震成趣園忽聞屐齒驚蒼苔可是淵明歸去來平生此老用不盡黄金無數寒香開答廣徳太守周梁石以近體見規兼遺古琴欲以養中和之徳者湖西風月吳江舊廣徳煙花越錦新不是五絃傳太古夢中誰與出天真寄胡梅川金精山下漏春光雪裏春回一線陽謝得梅花清到骨東風長夀萬年香題漢宫圖白蛇中斷赤旂開四百年中夢兩迴惟有終南舊山色雨餘猶自送青來題五雲蕭氏三公五爵圖漢苑唐宫世已空莫將興廢語東風人間萬事皆塵土一段繁華又夢中中秋日代修篤四叔作送馬生歸南海青天拾得中秋月照破閻浮萬刼塵昨夜長風吹不斷清光隨著海南人蕭宜沖見陳公甫于白沙胡憲副希仁隆禮下之海天空濶風日和暢招霞外布衣林緝熈何時矩李徳孚輩更酬互答律倡吕和綽有雩下風致宜沖袖謁一峯山中因題其首曰海天吟㺯并續貂焉以俟于諸君太虚雲去天無衣洞門兩斷山開扉山人莫袖東風手指㸃梅花無是非又海天袖得蓬萊回眼裏衡廬安在哉三十六峯吟不盡朱張還向雪中來題新喻袁孝子方泰草亭風花髙下草烟青春滿袁家孝子亭阿母瑤池香夢杳綵衣猶隔翠雲屛贈隠士此翁行坐一壺天甲子流年大撓先却笑君平生計拙自家風月不須錢送施生歸新喻南海清風宇宙流林何分得白沙秋西湖一尺先天雪辜負寒光六月浮林緝熈何時矩皆公甫門人示萬載彭用中陳鑘二首倉黄紙上閑言語寂寞𤣥天獨此心桐樹未秋明月古山童沈睡草堂深又淡烟疎雨野人家獨立蒼茫眼欲花籬落晝長鷄犬靜春光恰好到桑麻挽同年劉顯仁丙戌同年三百五泥塗甲子是君先黄鸝莫説瀛洲夢山下春花正可憐贈陳壁蔡玹二首聞道東華老秀才自將雙脚涴黄埃知君不是尋常客解取棲雲嶂上來又柴門流水稻花初城市心塵肯到無篛笠蓑衣烟雨去老夫依舊是農夫題春夜宴桃李園圖贈陳粹之春宵花月為誰明羅綺筵中欲二更東老倉皇眠不著夜深還聴管絃聲寄廬陵梁徳剛歸自楚天上人間第一家善聲今已著中華元龍湖海歸來日洞裡東風醉紫霞丙戌同年吕廷揚出令新城予尋醫旴江視之同逰天峯老僧乞題因書扵壁淡淡閑雲野日黄城南春服紫霞香絃歌聲裡天峯寺緑樹重隂午夢長登新城令陳君員韜遺愛亭棠樹隂隂手自栽年年春日領春來道傍芳草無人問一度東風一度灰㳺福山寺二首并序福山舊名覆船山唐懿宗易覆為福宋祥符去船名福山紫陽朱文公盖嘗㳺焉寺僧像而祀之同年吕廷揚來令新城約予同㳺因正其位號祀扵大雄氏之後室名曰崇正時成化十年甲午五月晦日也雲和草樹拂天香無盡光中見紫陽萬籟一空天似水滿船風月武夷堂又洗天雷雨過南山佳氣無邉紫翠間長笑一聲空浩刼白雲飛盡老僧閒别廷揚釀得新城萬頃春碧桃扶醉不辭頻羅浮山下梅花屋夢裡逢君恐未真題旴守仲仁玩易軒白髪蕭蕭思滿巾爐香不動閉闗心等閒欲問春消息梅樹枝頭㸔淺深題吕豸讀書處好山端為此君來竹逕茅堂次第開曽向讀書臺上望西風吹盡陌中埃題饒雯峯梅二首萬古清香横宇宙幾枝疎影照寒暉玉堂不識孤山趣長日無言對紫薇又六合空無一㸃埃暗香多在雪中來柴門長日無人到强半詩懐為汝開送梅宰入覲千樹東風滿上林九重春意待君深孤舟一片梅花月照見離明萬里心送楊慶陳偉歸安慶二首羅浮春色自君來萬疊雲山紫翠開無限風光皆落手袖中歸去有蓬萊又浮雲殘雨總瀟然留得羲皇太古天明月滿船湖上路棹歌光霽杳無邉送張興和歸貴溪明月春光滿釣磯西湖今夜棹歌歸南軒莫入東窓夢童冠于今解浴沂和林緝熈題瀧崖之作流水何心苦未休白雲依舊思悠悠山人莫被閑花惱只恐天翁亦白頭與黄時憲忽驚清露濕芙蓉灺盡燈花月正中欲把行蔵話端的請君還拜石齋翁寄閩中馬孝子惟一莆人云姓髙三年蔬水如君少一片天然孝子心昨夜三山明月滿不知甘露洒幽林逰武夷偶成櫂歌聲動幔亭春風景依然漢與秦流水三三山六六古今逰盡幾多人送蕭主事廷珍回南塵逐西風散馬蹄江南歸思朔雲迷耳邉聞得田夫語昨夜前村雨一犁送人還鄉江漢西風吹客衣滄波浩浩一舟微柴桑若問陶彭澤不為黄花解印歸偶書聞道蒼生淚滿衣病多偶與素心違羊裘不著寒江雪只裹春風卧釣磯寄容彦昭聞兄弟欲異居尋春何必問誰家春事無端落暮霞海上東風休自老容家庭院有荆花題陳粹之丙吉問牛圖遺黎横道劒横天太武猶煩問一元二百年終多事在漢家丞相本無言贈宜黄席瑄何處滄浪此濯纓金牛明月棹歌亭請君試問東流水曽共黄河幾度清題守村南畝東風萬種肥花邉烟雨上蓑衣燈前細與兒孫約老子生涯汝自知寄邵武盛太守時望亂山髙下晝㝠㝠樵水東頭數㸃青聞道山間明月上幾回風雨只從星送梅太尹鼎考最行一川楊栁萬金絲祗與人間管别離天上别留芳桂在廣寒秋長最髙枝送費瑞帶得東風萬里歸東風無地不相隨小窓若問春深淺窓外桃花易滿枝活人堂吟藥裹匡牀白日貧敝裘寒擁洞雲春聞君屋外黄金杏顆顆東風顆顆仁風梅調元消息在花魁昨夜東風特地來湖上數枝㸔結實蒼生休道渴心埃挽郁樂山一函夜閉空山前浮雲散盡山依然山中猿鶴亦解語明月長戀山人眠夀王勁翁碧雲門榻南山秋紅塵兩脚東門羞世上閑忙縳不得先生已入無何逰太極池太極池邉草一亭水光山色上疎欞西堂風月如相問為道南州卧不醒慕椿堂黄髪嬰兒百嵗憂八千辜負漆園秋西風夢落無何有香葉浮天玉露流雲菴靜坐吟獨向空山靜坐時白雲提構若為誰夜深只遣山童數月到梧桐第幾枝丹鳯朝陽綘闕雲霄散紫霞丹山碧海曉光華喚回一枕周公夢自倚東風送落花送苻瑞還金田一片長天一片秋吳江分入楚江流自來浮海無人健莫作尋常㸔仲由春融門無端杖屨倚𤣥通瑞入丹霞霽景融海月春光收不盡碧筒和露嚥東風秋卓門百仭𤣥雲風一槖吹動萬山秋更卓蒼溟涼雲洗空青鐡鶴夜眠猶未覺洗心亭一片靈臺百染汙天將明月與君孤源頭活水依然在洗得湯銘一字無洞虚池洞天落落洞池虚天自如如水自如浮象只教行不盡祗扵閑處㸔鳶魚雲山第一窩風光天下已無雙萬里雲山盡樹降一咲出門天廣大不知塵外有滄桑鐡鶴亭一笛西風夢不驚碧天如水大多情月明依舊南飛去萬里𤣥雲片羽輕萬花春谷二首紫幹亭亭麗玉華紫陽光景上袈裟憑誰出此擎天手剪破東風散綵霞又萬花庭院各春風春在金牛繡谷中一味東皇心事好韶光流徧紫霞宫半畝方塘開破雲山第一窩秋光無底鏡天羅雲根一脈陽和動添得靈源水氣和㳺龍亭金鱗玉甲青雲衣秋聲已破東風圍須臾變化雨天下浮光萬古驚清輝鳴蚪亭青山一幅鳴天機丹崖萬壑飛虹霓青山莫管閑雲非閑雲猶裹青蓑衣横月亭梧桐枝上横天飛天空雲净秋遲遲書臺萬古生清暉人心萬古圓明時玉華峯一柱東風戀紫霞數聲鷄犬野仙家東風自此無分破添得碧桃無數花鑑湖書屋湖上秋光碧萬尋吾伊聲裡日千金莫教平地風波起一鏡秋毫坐古今題梅南枝漏洩東君信㸃破江南一片春鐡笛一聲山月冷半空飛下縞衣人夢題王許三峯六月霜飛萬井寒江南烟雨此峯㸔剡溪若解先生意日日茅亭住得安二十三日夢歸城兒女候秋光采采黄花泛酒觴霜後有霜花更好東籬留得萬年香太極丸春萬山蒼玉一丸春太極先生是此君無限風光㸔不盡山河全露素王身金鼇霽雪金鼇海上際天來凍合雲樓霽不開無限清光皆落手草堂明月棹歌回玉冕晴雲變化無端古又今巻舒由我此機深時來慰滿三農望箇裡無心是有心翠𤣥幽玩一壺光景浩無邉妙絶中和大有天自古洞門無俗客至今留與濟川仙大旒垂玉一泒銀河夜不收碧山無碍此天流紫雲芳草春無際却界長天一色秋飛轝横翠碧雲芳樹與天齊回首湖山萬皺低莫遣桃花逐流水恐人疑是武陵溪三峽迴清三峽盤迴百里通洞天深鎖水雲中無邉光霽誰為主一泒銀河萬折東一峯來秀倚天髙樹遏雲流只見長春不見秋曉月瞳瞳光四海無邉佳氣擁羅浮初四日夢海棠流月過蘓牆照見茅堂是玉堂堂上真元無别主劉郎依舊與劉郎十一月一日將至瀧濵夕毛氏西園太極西皇是我家碧雲長樹醉流霞玉華仙子歸來日咲指東風第一花初二日至瀧濵夕車溪張氏勸君莫向青山家勸君莫向東風夸面前自有好田地菊花開後開梅花十二月一日夢送望振北上鐡鶴亭前醉碧隂金牛洞裏睡雲深明年袖裹東風去唤得天邉杏滿林丹霞室瑞入春風醉紫霞東華光景賸西華金墩不似仙墩好玉鏡閻浮次第花𤣥雲崖百仭𤣥雲片玉清園林風致似虞廷只縁解得髙山意指下無音太古情六合𤣥雲東華光景儼南華六合風花屬我家試上雲樓足清賞與君長醉赤城霞浴月亭無奈清都道氣何金波萬頃浴嫦娥廣寒秋色深無底一片虚雲照大羅金牛亭不耳牛亭夜載烟好縁長不受春鞭自從脱却金籠後多在青山玉樹邉金牛洞天洞天風景碧虚中九曲雲根一線通誰向紫陽山下路梅花三弄倚東風二十一日夢野仙纔割白雲房夜靜梅花試玉香一段春風無限力幾翻推倒紫霞觴二月初二日夢次第開花次第花隔牆何必問誰家也應無奈春光好長對東風醉紫霞又四海明年宇宙香萬花庭院各春光綱常擔上挑三統萬古綱常上脊梁玉柱峯玉柱峯頭紫氣迴清明時節逼峯來只今閑却擎天手南部烟花總自裁五月初二日夢隂陽管束璣衡外宇宙呼嘘槖籥中嵗事化權今在手人間何樹不東風三月初七日夢髙卑一曲動𤣥青春日春風拜考亭不是昊天無處著潔魂應送水成清九月海天吹雨未曽收曽上雲樓努力休收歛此心歸寂寞一方明月爛沙頭十一月初三夕于杏林天機纔動玉壺春海内初㸔白日頻頭上葛巾猶在此與君同是葛天民又庭燎春和萬國香小橋虹路倚天長明年去借仙翁手指㸃雲章對玉皇十六日夢彷彿雲霄玉萬竿依稀王母駕青鸞來時不識歸時路共向瑤臺月下㸔二十五日夢月色花香掌上㸔分明春事滿䦨干憑誰説與林和靖雪樹枝頭雪未乾閏二月二十六日夢紫閤春隂倍草堂玉蓑金笠戴春光從今收拾乾坤後自對青山借一觴十六日夢送安成醫士劉敷烈野客歸來野興狂水雲樓閤水雲香鏡湖十里春如畫一樣荷花一樣香十月初三日夢酒畔逢春手莫停耳邉鸎語大分明閑花野草春全賴遇著東風一樣生夢聖賢為學在求心為學心求古自今回首羅浮山下屋梅花春意一枝新無題二首留得一瓢収野興忽然雙鶴水之清秋風不敢吹茅屋只恐先生夢裡驚又沈醉東風未得醒落花飛絮日㝠㝠門前有个長松樹莫遣黄鸝來上鳴初三日夢黄花隨處隠天流萬壑清風一夜秋可是謫仙縁未滿不妨還作此山囚七月初九日夢秋風無恙布袍輕十里西湖格樣清一片鐡心聽不盡天津長短杜鵑聲一峯文集巻十二
