body:
  text: 一峯文集卷三明羅倫撰序秋江劉氏族譜序孔子仕不媚君祭不媚鬼然則有所媚乎媚其所當媚不媚其所不當媚也父子兄弟宗族之懿天性也以恩而全其天非所當媚者乎是故聖人之教在父子則相隱在兄弟則怡怡在鄉黨則恂恂似不能言者媚之至也今夫一族千萬人其初兄弟也兄弟其初一人也自一人而視千萬人固以千萬人之心為心自千萬人視之能以一人之心為心乎自千萬人者不以一人之心為心而各以其心為心此譜之所以作也秋江劉氏望族也將譜其族一心以媚于族人素彬曰子可無言乎豫未暇也明年譜告成于祠堂長老呼其少者前來曰自吾先人之有斯圡也以儒世其家者五百年于此矣儒者之道何謂也汝知吾譜之所以作乎凡為吾族者子以孝媚其父弟以敬媚其兄少者以順媚其長貧而無歸也富者收之愚而無能也才者教之貴且富者不以加其父兄宗族生相慶而死相弔也千萬人惟一心以媚于一人如斯而已矣倫聞之喜曰此固吾之所以為言也昔蘇文忠公曰吾鄉之俗大家顯人以門族相尚推次甲乙皆有定品謂之江鄉非此族也雖富且貴不通㛰姻羅劉世㛰姻家其長者吾視之猶父兄少者吾視之猶子弟其老長教其子弟固吾之所以為教吾所以為教固孔子之所以為教也洛陽送别圖詩序河南胡公之官泉南也二年矣材敏四聞憲臣特簡于羣有司中命拜表詣闕下瀕行太守嶧陽李公同守松江髙公通守姑蘇張公暨賔從之賢者俎殽觴酒飲餞于洛陽橋東畀小子倫與離觴之餘滴時暑雨初霽海空一碧倫執盞言于胡公曰君知夫海乎上沃乾樞下溷地軸環中國以為池帶四夷以為島其涯也渺乎其淵也窅乎海之大非自大也百川之積也方百川之朝宗于海也澎湃洞踏騰踔駛駃萬折而必東川不自知其勞也川之達非自達也畎澮之積也川海之于畎澮泰山之于丘垤也孰大而孰小也小也大之朔大也小之望小不小其小大以大其大也故禹之同四海決九州必盡力于畎澮也不大大而小小也不大大而小小禹所以智于水也舶司一雨水暴溢豫疑其海也皂人曰此溝澮之淤也海無與也命疏之自是雨之水不能患也益然禹之知于水也君子之導民猶禹之導水也海靜而善容君乎川動而善勞臣乎畎澮微而善從民乎知于導民者不小之斯已不小之不淤之斯已夫水之在地氣之在人也水淤則浲氣淤則病情之在民也亦然有虞之時詢于四嶽以闢四門以明四目以達四聰所以疏吾民之淤而不小其小也水之淤也疏之禹民之淤也疏之四嶽非小小而大大者也此有虞之治所以溟渤冠古溝澮屢世而大莫之大者也今聖皇堯舜宰輔嶽姒善容乎為海善勞乎為川而畎澮之善從者猶未淤免也君嘗于此乎盡力矣不大大而小小矣今之朝宗于海有小小而大大者乎與君讐者乎此知于導民者也其以吾言告之君曰諾太守諸公為五韻詩成命倫以言于君者序之命畫史圖之命書史書之談節婦詩序宋談節婦趙氏永新人歸談氏年二十七元師下江南丞相文天祥檄女弟彭震龍復永新降將劉槃誘元兵陷城婦抱嬰兒匿禮殿中兵執欲汙之屠兒瞰于梁見婦罵曰賊死吾舅死吾姑吾從舅姑死耳犬彘敢吾汙哉母子遂遇害血漬禮殿入磚宛為婦抱嬰兒狀或磨煆之狀益顯先是元兵入浙東臨海王貞婦者主將欲納之婦齧指血書石投崖而死血漬入石天隂雨墳起若始書時于戲二婦者何天異之表人極于萬世也後未百年紅巾冦禾川省元陳允中辟彭九萬行軍鎮撫其妻李氏躬爨犒軍戰屢捷明年苖獠入城李氏及其子友諒女秀英俱被執以刃脅之問所求罵曰吾死耳吾何求賊輒連殺之於戲永新未百年得二烈婦與文文山余豳公耿光相上下夫豈偶然哉建文壬午靖難師起永豐峒民變夏克紹妻黎氏奴欲屈之黎不屈瞋曰我死後賊奴不出三日後三日奴果戰敗死此猶慷慨亂離耳若遭世承平從容就義猶未易乎吾見其人矣丘咨疇妻熊氏年二十三從夫死談洪季妻張氏從夫死年二十五丁達常妻聶氏未嫁聞夫死從之年二十吳恆鑑妻曽氏夫死從之年二十三黃宣德女年三十一其夫丘病以身代死之於戲由是觀之婦持節義淪草莽者可勝道耶是豈有待而然哉所欲有甚于生所惡有甚于死固于心而不可解也為人臣子不背君父若此婦焉則國家喪亡之禍何自至哉夫何平居穹官厚祿秉鉞執衡髙自標譽或目以婦人則艴然怒一旦變故竄伏忍恥棄人家國而不顧視此婦寧不愧死耶陳君粹之僉江西憲事按節永新嘆曰節義者天地鬼神之所相也而况人與乃合古今詠歌刻石于祠戒知縣事李某屬叙于倫乃連書之以愧為人臣子而棄君父者於戲枋世道者盍亦知所先務哉瑤田梁氏族譜序梁之先河陽人周平王以秦仲功爵其少子康伯于梁後以國氏佺仕唐節度河陽為河陽人佺後六世實從李克用擒黃巢瑕丘子均玉任子得兵馬指揮使中原驛騷避地于瑤田土曰澦塘徙水北姜坊姜後滅為梁坊奕葉重英子濟領方州舉于宋民則秉彛舉江西于元國朝益大洪武辛亥起下第士與計偕梁氏起者五人伯興仕河南布政使先丞應天祿取口外還太倉上以老實稱之幕佐縣令鄉校師一世蟬聫里閈嘻歆夫自宗法廢門第盛而譜牒興譜牒興禮義修而門第盛盛以富貴外也內則可久矣禮義之盛內也江州之陳麟溪之鄭非五世珥貂七葉列㦸而風奮天下光峥百世禮義之澤深哉夫一人之身為千萬人之身以千萬人而視一人若疏逺矣以一人而視千萬人疏逺可乎古之人親吾親以及人之親四海之內好焉不忘也况初一人也疏逺可乎蓋嘗觀于螻蚍一臺共居一糈共食况吾人也胥戕胥虐罔念其初一人也而可哉倫梁氏壻也明道壻彭氏晦翁壻劉氏二氏以著焉倫愧無以著梁氏也梁氏其務于內者以自著焉毋徒務乎其外也雯峯饒氏族譜序饒氏世家甘竹太守秉鑑甫易甘竹為雯峯雯峯泒自東山東山自宜黃東原東原自南城白干白干則番陽徙也饒本堯後後世避秦南遷番陽益食為饒唐德宗時番陽之饒有元亮者安撫浙西歸寓南城今南城則白干疊石歷山上湖新城則象岸宜黃則東原濯江神岡崇仁彭原智原廣昌則東山甘竹遷善南豐則白舍堯方皆其後也元亮二十六世聞孫曰希明克敦義睦合諸侯之譜修之冡嗣秉鑑偕其弟某夀梓以惠諸族屬倫叙之叙曰善世其族者先禮義而後富貴禮義人心之固有富貴天命之或然求之不可必得得之不可必守若夫禮義人不求耳求之斯得守之斯久人不知出乎此何也所以貽其子孫者田園惟恐其不闢宫室惟恐其不壯金玉貨貝惟恐其不積科名爵位惟恐其不隆且瞻也不思以淑其心其福之者適所以禍而促之也保一族者無禮義且不可况保天下者乎先王之時鄉黨閭巷非有宗族之親骨肉之愛貧窮相收患難相救死亡相助慶弔相交自夫政衰教弛同宗共出之親涣散乖離患難則乘之貧賤則凌之死亡則棄之凡見其可欲者皆奪之以為己有而不恤綱常之道大壞而不振矣於戲教之行也異類為膠漆其廢也同氣為仇讐禮義之關于教化豈細故哉先王之法不見于今大觀君子可遂已乎萃之以祠聨之以譜合之以義聚均之以義田教之以義學周之以義莊葬之以義塜濡乎耳而染乎目者皆足以化其心若蘇州之范氏江州之陳氏浦江之鄭氏今番昜之虞氏亦庶乎其可矣天下之大雖非一家一族之可化然天下者家族之積也使天下之人各愛其身各睦其族亦庶乎先王之化矣豫欲修是法以行于吾之族德未孚而力不逮饒氏有可為之勢有欲為之志在為之而已豫所望于饒氏者固以望于天下也豐城涂氏族譜序盛衰消息天道然也公卿起自犁鋤世家降為輿皂無恆尚矣以人回天顯微隆替祖考之所以望我後人也在自立而已立之道奈何立德也立功也立言也立德本也德也天之與我者明善以開于始復初以宅于終德有諸已矣是故用則行其道于當時安社稷澤生民不用則行其言于後世繼往聖開來學古之君子所以保姓受氏也今之君子或異于是焉崇髙富貴卑抑貧賤齊梁之遊士陋巷之匹夫非有趙孟之貴韓魏之富也而終隨乎天地焉自立而已爾豐城涂氏豫章著望系出塗山南唐時􅛫尉洪都去土姓涂洪撫間涂姓多其後也元世祖時􅛫後曰桂芳仕至孔目自金溪徙豐城憲副君伯輔六世祖也伯輔為御史時長老詔修其家譜伯輔奉命唯謹譜其所可知闕其所不可知以傳信也天下譜其族者多矣蘇譜以明允聞歐譜以永叔聞二公之言立故也况超此而上乎繼今涂後師顔孟以立德師大召以立功師近代之歐蘇以立言涂後其有聞乎朂哉伯輔以昌爾後也若託他人之言以圖不朽亦末也伯輔勗哉南溪髙氏族譜序欲大其族者人之同心也有立德而大者有立功而大者有立言而大者孔氏之族有仲尼焉德配天地名並日月言滿天下功在萬世孔氏以之大也簟瓢陋巷不改其樂顔氏以之大也間先聖之道正人心息邪說孟氏以之大也立德而大者也蜀之諸葛亮宋之范希文立功而大者也漢之董仲舒唐之韓昌黎立言而大者也欲大其族者人之同心也濓溪之周氏河南之程氏考亭之朱氏繼孔孟而立者也其大同焉江南世族尚矣吾邦其最也立言而大者其歐陽氏與立功而大者其文山氏歟若胡忠簡氏若周文忠氏若楊文節氏或以功立或以言立皆能大其族者也繼孔孟而立者吾未之見也是故古之立也大上立德其次立功其次立言今之立者或異是焉其上焉者位列公卿名魁科甲曰吾立也其下焉者宫室之美田疇之良子姓之强有力曰吾立也人亦曰彼立也者其族之大不亦宜乎坎井之蛙醯甕之雞不自知其立之小也井外之海甕外之天不知其大何如也廬陵之髙溪有昌氏焉文山之里也其彥曰大倫大雅之弟也大雅冡嗣曰廷相先生以科第立門户豫幼師事焉大倫修譜以系族立祠以祀祖左欲起義倉周凡族之貧者其亦志于立者乎固將以大昌氏之族也大倫之立其斯已乎固將以望昌氏之後也言之立也以文功之立也以位德之立也斯立矣德立本也有德者必有位德立而功成矣有德者必有言德立而言顯矣昌氏之後立功由文山氏立言由歐陽氏立德由程朱氏窮理以致其知立誠以達其本孔孟之立可待也顔子曰有為者亦若是孟子曰乃所願則學孔子聖人與我同類者亦為之而已矣周子曰士希賢賢希聖聖希天勗哉昌氏之後也吾見其大也建昌楊義官挽歌詩序門人楊玘有父之喪羅子未弔焉玘環絰衰杖血泣踵門曰玘聞之曰先子有善而弗聞不仁也聞而不以其人不知也吾痛夫聞之無從也敢告于君子立言以聞焉三君子以告翰林王先生大韶志其壙張先生廷祥銘其墓莊先生孔昜表其道若夫挽者之歌先生其首之無辭四君子者先君子將賴以聞也羅子曰噫末乎哉吾聞諸孔子人子之聞其親也其惟孝乎三年之喪孝之達也玘也有三年之哀于其父母乎禮曰喪則致其哀斬衰服苴容體之哀也號泣無時聲音之哀也唯而不對言語之哀也蔬食水飲不茹醯鹽飲食之哀也寢苫枕塊不御內室居處之哀也此三年之孝也喪終三年孝子之心終其身也是故見雨露則悽愴焉見霜雪則怵惕焉見桑梓則恭敬焉見犬馬則愛存焉見手澤則不能讀焉此終身之孝也孝子哀痛之至創巨之深是故思終身弗辱也居處則思莊動作則思正長老則思恭兄弟則思友交友則思信事君則思忠蒞官則思敬見得則思義思終身弗辱也一力不敢輕用一獸不敢輕斷一草一木不敢輕剪思所以廣孝也孝之至也塞乎天地溥乎四海昭乎日月括乎鬼神施諸後世而凖人皆曰某幸哉有子如此某幸哉若是以聞可乎玘覽涕而謝曰聞矣請服之終身用書之冠于羣言之首送沃御史序饑易為食渴易為飲人之至情也苛政之害非饑渴所能喻也昔泰山婦人三世死于虎以無苛政而不去孔子以為苛政猛于虎永州之民業捕蛇者其祖父死之其身幾死者數然不毒蛇而毒于役賦栁子以為賦斂之害毒于蛇夫生人之害未有毒于蛇與虎也而苛政過之豫故曰苛政之害非饑渴所能喻也丙戌進士沃君文淵以監察御史按治江西歷臨瑞袁吉察苛政之毒吾民者盡解而去之貪墨震懾聞氣遁逃軺車所至父老舉手加額曰不圖今日見真御史誰從天子復借一年庶若等少蘇須臾哉信乎饑渴之易為飲食也及期代去藩垣羣公速言于行夫天子天也宰相元氣也御史雷霆也驚山破石驅魑魅魍魎而走之雖雷霆之能事而非其至方羣隂閟伏震奮出地雷雨滿盈草木甲拆元氣和暢以收天功至矣子歸哉拾遺補闕翊贊王度熙庶績而康萬民使天下之人欲象其德而不可名百世之下君子無譏焉斯可矣毋自至羅倫序薌城梁氏族譜序抗義而舉之不可以有加也取之非取也取其急于義也急于義者君子也急于利者小人也所好乎君子者非好其名也好其急于義也所惡夫小人者非惡其名也惡其急于利也吾嘗試觀之凡免人于難者必君子困人于厄者必小人以是知君子之必可好小人之必可惡也若吾友梁德剛者其君子之可好者與始吾遊郡庠時衆方笑之以為迂或欲黜之以貧為辱于學德剛獨有取焉有司有憐其寒饑者德剛曰非其義也一介不以取諸人于是推其有以同之豫之困而能成者德剛之賜也昔子路願車馬輕裘與朋友共敝之而無憾夫子許其升堂朋友義廢久矣德剛獨抗而舉之不可以有加矣使如子路之遇聖人其取之當何如乎德剛修梁氏譜成屬豫叙之豫謂德剛曰朋友之義君抗而舉之庶乎古人矣君子推恩親而近者易疏而逺者難君能于其難獨不能于其易乎反是心而克之無所往而不為義矣求之古人若蘇州之范氏象山之陸氏江州之陳氏浦江之鄭氏皆以義而大其族者也四族之大俟梁氏而五焉叙于譜以俟豐嶺羅氏族譜序仁其所不當仁義其所不當義無適而非仁義也有所不當乎齊堂過牛而不忍仁所不當仁也夏乘貢金而不信義所不當義也仁所當仁義所當義可得聞乎仁莫大于愛親愛親者必尊祖義莫大于愛兄愛兄者必敬宗斯二道也孝子慈孫不用其心惡乎用其心孝子用其心于斯也蔬水不知食之淡衣絅不知衣之惡井朴不知居之陋日月邁血氣衰不知老之至凡祖之所出宗之所别無所不用其愛且敬焉合敬同愛不思以繼之敬愛止于吾身矣為之法焉緦麻無服之親同爨也謂之義聚分井以給之謂之義田儲蓄以備其急也謂之義莊列屋以居之謂之義宅羣族人之子弟廩而教之謂之義學斂棺衾葬之于族也謂之義塜合而名之若江州之陳浦江之鄭謂之義門無所往而不為義仁在其中矣是道也豈特吾羅氏之所當知哉天下之保姓受氏者皆所當知也羅有三祝融後國于羅楚滅羅子孫散居楚蜀漢惠帝時珠為大農令自長沙遷豫章後以豫章為望甘羅仕秦秦亡去甘姓羅羅鬼國外夷也入中國因氏羅羅望豫章者非出于彼也明矣峯嶺羅氏亦出豫章其先自泰和徙也居斯土也其十有七世矣宋季輝卿者官來安路通判世纍資富敦厚而向儒術三十年前倫與峻極同學郡庠成化乙未倫來金牛洞峻極及叔父季傑開正密堂以居來學不辭焉以崇義也擴是心而充之義無不可為矣浦江之鄭江州之陳亦人也彼以門閥大其族者惡知所謂禮義乎送王宗源歸閩序并詩一峯山人主金牛洞天閩人王宗源將往見焉饒雯峯曰宗源達人固山人之所好也宗源至山人方卧翠微𤣥房乃攬衣出户則張拱于九曲飛雲頭矣鬚眉鶴鶴儀觀偉然于是披清風割丹霞燕于萬花春谷晝則棲雲夜則浴月摩挲金牛招呼鐡鶴旬有五日而後返援之而弗能止也山人笑曰子將為雲乎將為水乎將雲行水流而無窮乎固將窮于六合也乃命邑史艾方師圖之金牛洞主題之雲水道人歌之以壯斯逰歌曰青山皂帽誰家子行盡天頭與天尾一朝飛上小蓬萊鐡鶴金牛夜能語山中不住雲溪上無停水雲行水湧杳無邉與君為終又為始清塘姚氏族譜序外物不知其髙深反諸內焉髙深者在我矣此保族之道也顔子于聖人之道仰之彌髙非髙而何鑽之彌堅非深而何王侯之門髙視天而深視海七十子之徒達如子貢勇如子路藝如冉求非不知聖道之髙深也外駕未能稅焉獨顔氏子頽然陋巷以終其身簟瓢世家配闕里于無窮故曰髙深在我者保族之道也昔夏侯𤣥何晏之徒妄作名字自相標榜以深與神卒陷于曹爽之黨陸淳栁宗元八司馬者揚揚然自以伊吕復生堯舜之理可致卒辱于叔文君子羞稱焉之數子也大者覆宗小者衊祀故曰髙深在我者保族之道也清塘姚氏先世有諱堪者宋紹聖丁丑自峽江徙里之闕芳洲又六世卿大徙清塘又十二世兩岐析居戰平世系明白以右江鄉君子有取焉夫子之于顔氏博之以文者大學之格物致知也約之以禮者大學之誠意正心修身也是果髙深而不可及哉天下之保其族者無過于顔氏姚氏欲保其族如顔氏而已矣天下之保其族者果無過于顔氏彼徒騖乎其外者是舍大椿而暮朝菌也姚氏之偉者曰衮辨曰節勵帥族人修其譜請豫序之豫故樂為之言遇原熊氏族譜序應感虛明之地虛明之至君子之極也君子之心無欲則虛虛則明明則誠誠于此則動于彼未有至誠而不動者也誠之動物也不疾而速不行而至孚于豚魚化于夷狄格于草木而况我族類乎夫一族之中尊于我者祖父行也為伯為叔同于我者伯仲行也為兄為弟卑于我者子孫行也為姪為從姪為無服姪其初一人之氣所為也譬諸一身焉為目為耳為口為鼻為手為足為頭項背為五臟內而為骨髓外而為皮膚百體具焉一人之氣所為也一體有疾手為之劈足為之踊口為之呻吟其自刃自戕蹈水赴火非病心風狂或有所憤激誰不欲保其身乎至于視其疾則不若視其身非惑之甚與遇原熊氏其先仕唐有至太傅者由洪家于豐衣冠相望科第相繼號為名族夫所以為名族者獨在于富且貴乎金張許史韋杜崔盧春花秋夢幻滅無遺安在其顯于今也在于子孫之賢耳子孫之賢在于以禮義淑其心禮義足以淑心則視一族猶一身百世猶一世貧富相收患難相恤仇忿相忘慶弔相交孝慈相勸友讓相尚進而不已至于明明而不已至于誠鄒魯顔孟之風伊洛程朱之化萃于一族矣若舍禮義而以富貴焉吾末如之何也矣某修其譜屬其序于豫熊羅通家也故序不以頌而規上固劉氏族譜序本乎天者本乎人也本乎人者本乎天也吾可為盜跖吾可為孔丘在吾而已矣祖父子孫生本乎天成本乎人孝敬慈讓成本乎人生本乎天生乎天而成乎人者器也成乎人而生乎天者道也以器而載道者孔子徒也離道而虛器者跖之徒也孔跖之分夫豈逺哉幾而已矣夫見父母而孝心生焉見兄長而敬心生焉見子孫而慈心生焉人之同情也自是而推之親其親以及人之親長其長以及人之長幼其幼以及人之幼天下可運于掌况于吾族乎上固劉氏先世有諱滿者唐太和中自寧都木湖徙吉水明善里今上固是也宋至和中割屬永豐為永豐人劉氏世祀漢神先君餘頑先生士從題其祠曰劉公廟前百尋木鏜鎝無窮人籟竹乃公自是赤龍種何用留矦黃石穀劉啓于唐盛于宋唐登武宗朝榜者曰僎曰倩宋登徽宗朝榜者曰澥澥二子長朝宗居東臯次希顔居環西繼第世美者曰鋒曰泌曰桂曰杞東臯派也曰鍨曰應科曰觡環西派也環西彥曰某煥奎道通屬叙其譜夫江鄉定品以科第門閥世其家若豫之見異于是矣科第名爵得于人求之有不得者矣得之而猶夫人是固跖之徒也孝敬慈讓得于天求之無不得者得之而困于窮以死是固孔之徒也孔跖之相去何啻天淵劉氏其亦知所擇夫層山郭氏族譜序事其所當事不事其所不當事人道之常也正倫理篤恩義敬所尊愛所親事死如生事亡如存事其所當事也惑異端黷淫祀不為善以去惡冀徼福以免禍事其所不當事也修祠以尊祖修譜以叙宗非當事之先務乎事其所當事修之至于無所壞事其所不當事不修之而至于壞不修之久而至于大壞天下皆是也事其所當事不事其所不當事修之至于無所壞者若層山郭氏是已郭之先諱伯宜仕南唐監軍恩江鎮子二安功侍父從後主入汴定功贅吳氏其後徙層山蕃衍碩大超諸姓之上郭得姓自周虢叔林宗振漢子儀鳴唐太原汾陽著望天下上下數千年由二人而郭氏大焉塞天地而明日月何事于修而後無所壞哉孫叔豹謂保姓受氏不若立德立功立言之不朽郭氏之後立德其法曽閔立言其法歐蘇立功其法君家之子儀則其大豈有既乎將亦無事于修而後無所壞也雖然功之立以時言之立以學德之立也斯立矣立德有要乎事其所當事不事其所不當事也郭氏之譜懼其壞而修之者某也屬豫叙其譜者某也嘉其修之至于無所壞從而叙之者某也於戲郭氏之後人其亦修之至于無所壞哉敬菴詩集序莫論其髙深莫論其淺近通乎性情止乎禮義而已夫竒髙深而卑淺近論詩之通病也以性情禮義為主而不論其髙深淺近焉達于論詩者也三百篇之為詩國風淺近雅頌髙深然本之性情止乎禮義風雅無異也聖人皆録而不棄焉後世之為詩若李太白黃山谷非不髙深也陶淵明白樂天非不涉于淺近也然君子皆録而不棄焉何也夫性情猶水也禮義猶防也水止于防性情止于禮義則不流而淫不流而淫則其為詩也固風雅之遺意矣然則髙深者吾取之非取其髙深也取其禮義也淺近者吾取之非取其淺近也取其禮義也故曰論詩以禮義為主者達于論詩者也髙深而過于嵬刻淺近而流于鄙俚君子無取焉若敬菴先生之詩其禮義之發于性情者乎吾固未暇論其深淺也倫自弱冠則聞先生之名以為卓然長者之風欲一見而不可得也後二十年得與先生之子遊故家遺俗猶有在者故為叙先生之詩而傳之使知先生之可傳者不獨其詩也先生諱某字常悅姓丘氏鼇溪人送劉敷烈歸安成復姓序敷烈劉氏以醫而冒姓羅于是蓋九世矣醫遂以羅鳴毛英懋得竒疾致敷烈氏療輒愈聫佩以君見一峯山人于金牛洞山人曰君望出豫章何泒君吐實山人曰有是乎哉是二本也禽獸之賤草木之微且一本焉而况于人乎古之人有墨台氏者辟患而改為墨又改為怡怡氏名寬者不能復姓其初君子譏焉牛金之子因逃患而改為牢又改為尞尞氏名㸃者乃能請于朝復氏于牛君子與焉君子譏寬而與㸃者以其能復與不能復而已君不畏君子之譏乃畏鄉人之口亦獨何哉君鄉之前輩若李忠文劉忠愍之忠太守劉嘉秀之亷皆豫之所敬仰者也君能樂道之蓋達于理者已理茍是天下吾毁萬世吾異于吾乎何損理茍非天下吾同萬世吾譽于吾乎何加而况匹夫之口乎君之鄉號多士君歸以是解鄉人之惑以豫言為何如英懋乞言于君不忘其功豫立言欲君不忘其祖持此以報不亦厚乎家禮要録叙守寶慶府黃巖謝氏世修去苛裕民乃録家禮之要者以教其民成禮俗也湖西羅倫叙曰冠婚喪祭禮之大者也冠以成人婚以正始喪以送死祭以追逺人道之大經政事之根本文公先生之定此禮也考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也禮之不行也其吾民之罪乎養之無道教之無素耳是故耕者無百畝之田蠶者無五畝之桑仰不足事俯不足育奚暇治禮哉儀章升降揖讓不習乎體雖欲治禮也其如禮何夷鄙野習佛老異言塗生民之耳目溺天下于汙濁禮之不行也其吾民之罪乎於戲民者邦之本也養而教之善固其本者也今夫兩家之子其生也同其養也同而教不同焉異日傲其長上而背其父母必昔之不教者也為國而不以禮可乎違上所命從厥攸好詩曰民之秉彛好是懿德寶慶之民其從太守之好也如水之就下也天下之守令皆寶慶焉化成而俗美矣治天下也何有一峯文集卷三
