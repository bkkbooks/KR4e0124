body:
  text: 一峯文集巻七明羅倫撰傳吳孝子傳吳孝子代父死者四十餘年矣湖西羅倫聞之迺為之傳曰孝子名駒字彦驤南豐石油里人石油之吳稱自唐始至孝子而著孝子孝友天至讀書通大義頗工詩日侍父母左右飲膳必躬視之昬定然後就寢諸弟則之幼稚狎侮者必訶之或曰幼也孝子曰其幼乎吾聞曽氏之家幼者不詈人其天性然乎有鬻田于從兄彦質者兄辭以窶孝子代鬻之歸其田于兄初孝子父湖宗以茂材授政和令改海陽令歸宣徳丁未傭里人孫住給力其家一日孝子出外里胥彭文杰曰孫一吾籍甲也誘而縳之潮宗覺率諸子拒之門毆文杰致死法坐潮宗孝子曰吾父老矣吾弟幼且無後自詣告曰死文杰者彦驤也令難之孝子曰以子代父何不可乎况殺人者實彦驤也非吾父與弟也令憫而代之孝子日侍父獄中朝夕起居猶荷校以立父出獄人曰孝哉吳氏之子乎或有感而泣下者居二載㑹有詔讞疑獄行在所孝子在行中行至淮安病卒年且六十一矣時辛亥六月日也余至廣昌太守饒公秉鑑曰孝子之事吾猶及也掲紳曰彦驤純孝人也可使其無傳乎時長樂謝公士元守建昌聞曰是可風吾民矣乃表其閭而復其家史官曰世以孝聞者或刲肉一臠廬墓三載􅉨􅉨精變天地誠動鬼神况以身代死若彦驤者乎其與日月爭光也宜矣嗚呼為臣死忠為子死孝若吾彦驤者天綱人紀頼以立也世可少斯人哉跋跋文昌朱義士墓碑後右墓碣一通翰林博士張君伯頴為有元義士朱公英發作也公諱士華字英發别號溪南居士甞師宜黄文學頴老劉先生授書學成而亂作至正壬辰紅巾四起公議辟地㑹監郡丁中憲舉兵復吉州檄蒼筤劉朝列鎮瀘江西臺椽劉子永守白沙府長史陽承事守沙溪公仗義保障為官兵聲援賊襲執公暨涉江公紿賊赴水死於戲人誰無死公得死其所矣倫聞長老言元綱既頽賊起淮頴蔓于江漢韓林兒據中原陳友諒據潯陽朝廷遣尚書董銓黄釗㢘使吳當平冦江西中用間棄功竟弗就羣盜蜂起鄧克明據桃溪陳普據新淦普姪陳海據永豐孫本立據廬陵新安陳闗據苦富髙以介據永豐明徳折桂三鄉立砦太平圍士夫多庇砦主以生陳宗舜禾川名士尚附陳闗茍旦夕活諸何責乎其臨難仗義可考見者吉州則蕭彛翁一再赴學宫井死戴大賔扼賊龍泉衆寡不敵死章立賢盡室投江死永新則姚正叔捍賊三世死樂安丘甲擊勍賊黄留戰死永豐則羅明逺賊穴其腰三日死貢士唐景行罵賊死於戲士遭亂離死腐野草多矣獨數公之死有聞焉天理之在人心固不泯也傳曰國家之敗由官邪也官之失徳寵賂彰也當承平時貪冒尸位玉帛充盈子女靚麗縱欲怙侈僭用咸極致國危敗納妻獻女忍恥乞憐五性斁而三綱淪矣扶天理立人極乃發見扵草茅之士使國家得斯人而用之夫豈有敗亡之禍乎謀人之國者可以永監矣望振公五世孫倫同學友予欲廣其事于左方使來者有所考也跋錢文肅公與張繹貴書錢文肅公習禮致政時閔里人饑饉稱貸于姻家張繹貴甫以周之予友張廷祥樂道之重題其紙尾其冡嗣褒兼美及其弟涪守黻兼素屬予載之倫聞昔先王理天下正井牧比什伍崇本出末九年耕積三年食雖有水旱民無菜色民心膠而天命固後王所以有天下而不已也阡陌既裂兼并俗起時之君臣僅致小康未𢎞大猷凶饑相仍餓殍盈野民心涣然國亦随之人之配極造化以無私也王者無私扵國臣民無私扵家天下不治未之有矣今天下固先王天下也有可行扵古而不可行扵今哉公登永樂壬辰進士由學士貳宗伯踐清要者三十有六年納誨沃心曽以斯道乎此倫之所未喻也雖然貪冒成風公獨脱然無少緇玷歸榮故鄉惓惓扵里人如此其潔已之義及物之仁有可言矣繹貴亦慨然副之非樂善好施者不能也然救荒良法社倉最善朱子創于建陽四方從者衆公以是告張氏其有不從與惜當時未及也自甲申至今六亡十年廬陵大官最多獨李文毅公以節義公以清狷有聞于世洪熈改元文毅充講席奮忠讜動天地而格鬼神繼司成均諸生愛之如父母二公晩路權璫執命文毅見辱石冒代死諸生號救闕下者數千人公獨以病免歸二公去位先後不一年公年已七十五文毅登甲申科計其年亦不下七十後二年為正統乙巳權璫禍敗二公猶及見之出處去就君子大節屯之初磐桓利居貞明夷之初不食而行二公其有與倫申廷祥之論忽爾覼縷李公初謚文毅更謚忠文所謂文節廷祥筆誤云墓誌南園公墓誌南園公卒于是六年矣孫壻倫始得誌其墓誌曰公姓梁氏諱旺字儀象其先汴人辟黄巢亂徙里之姜坊居之姜氏絶不知何時梁氏盛為梁坊梁世有聞人民則秉彛著科第于元國朝伯興仕至河南布政使初丞應天禄口給外辭太祖以老實稱之公大父玉和父東啟世不仕公幼孤立有聞大父善耕先生與之里中髙㑹㑹必公在則往倫時杖履左右公見竒之命歌風雅古詩以為樂公乆而益莊動止有則里子弟樂傲放者見公必自檢退私語曰老成典刑具在此翁初公冡嗣有女公竒之曰必配良士正統辛酉大父卒家亦落莫媒氏以名聞公曰得矣吾固竒此子也家人愕眙相頋間因長老厚公者竊謂公曰嫁女須勝吾家公輕與寒士奈何公曰非爾知竟歸羅氏己巳倫游郡庠公曰止丈夫有立何秀才為乎既而勅諸子給其費丙子倫貢于鄉今上二年丙戌倫登大廷入翰林為修撰其年夏五月黜為泉州提舉道鄉謁公公已病瞠目視曰為子孝為臣必忠汝就道毋我頋翌日病革家人𦵏公扵峽上之仙人巖亥山已向倫臨穴哭即行公雖不樂仕好以前輩仕者風後進甞謂倫曰吾幼時布政公已致仕坐郭桓累籍其家惟書數帙公懼不免中道經死太祖聞而哀之命復其家比長見羅愽士致仕歸望鄉足履以前曰吾父老宗族所也婣族盛供悵御者峻却之歸以書一帙易一羊祭告家廟二公者吾猶及也今亡矣俗好鬬公教子以尚容里中語梁氏之樹惇者必曰公家公配李氏先公卒子五人長與仁以女配倫者次與言次與亷先卒次與莊次與爵亦卒孫男十某某孫女某某曽孫某某於戲公其有後乎公居南園人號曰南園公銘曰已乎南園公雲山蒼蒼水溶溶為公宫乎其中已乎南園公蘭畹先生墓誌銘於戲此處士姚公墓也湖西羅倫志焉羅姚世連交大父静菴先生永濟大父善耕先生永仁二父令善唯公倫甫髫髠公來眡二父長身玉立鬚眉鶴鶴儀觀偉然觀者驚異公退倫私曰翁何許人大父曰戚里自樹蘭畹先生童子容識之踰年辛酉大父卒踰七年丁夘公卒踰二十一年丁亥倫乃銘公墓或曰子不銘墓胡然而銘公墓聞諸人曰公弱喪考俗疫喪者不喪公曰疫鬼祟喪子其有知乎卒喪之無恙人咸曰異哉姚氏子他豪有力者同胞越貊公視父母子視已子鞠誨克之異他豪有力者公學琴于後軒謝利用乆之曰吾得其人矣琴亦可無也獨旡絃乎哉喜賔客雅歌投壺終于大耋舍傍學山晩營夀蔵其陽疾棘召諸子曰死生有命吾聞諸夫子淫祀能生死人哉毋辱我于地下我地下何以見先人修然而逝時正統某年月日距生洪武某年月日得年七十有一祖仲陽父一䕫世嘉遯取胡氏前左軍都督經歴尚迪孫女子三人衮紱衮繡衮弁克惇公樹女一人適某孫男十人某某孫女一人某適羅某曽孫十九人某某公諱珏字介圭人稱蘭畹先生清塘里人孤子弁來乞銘咸曰公樹者子宜銘曰樹于一鄉風聞四方其聲揚揚曷不樹國天柱特特萬有其宅御風以逰御氣以周寥廓以休厥樹我取樹元何有樹千萬夀謡為張主事時達荒政代民謠張君時達荒政也丙戌饑民相食君主漕運吕梁活民命數千有誣君因民以自利者君曰辟謗而視民死孰與䝉謗而致民生為益力余南遷道吕梁諗之民民曰然君寔吾父母也余憩真州徐君大華君同年也同道也劇談之且曰先生益白其心扵人人用是因民辭效風體以歌之使觀民風者采焉使司民命者勉焉吁嗟危兮餐糠糜兮仁我侯兮視我兒兮恵我饑兮吁嗟苦兮草木茹兮仁我侯兮視我子兮活我死兮吁嗟極兮自相食兮仁我侯兮視我子兮起我斃兮吁嗟我侯兮展我父母兮胡為之人兮而不我頋兮曷告天子兮文諭屬文代寳慶守謝世修作聖主治天下守令是重焉以其親民也夫親民莫如令其次莫如守令父母于一邑守父母于一郡所以父母云者以愛民如子民亦愛之如父母也所以愛民如子者知其饑而食之焉知其寒而衣之焉知其勞苦而逸之焉知其利而與之興焉知其害而與之去焉知其賢而優之焉知其不肖而教之焉四境之内吾民之好惡無不知而從之焉然後可謂愛民如子也吾愛之如子分之當然也初何心扵彼之復也而為吾民者生則愛而戴之死則尸而祝之流芳竹帛垂範百世如古之龔黄卓魯者真民之父母也今人之心豈異扵古人哉方其含餔畎畝鼓箧庠序見貪墨賊民者輙攘臂切齒而憤之髙談擊節真可翺翔古人而犬彘若輩也及一旦綰銅章佩墨綬以臨民上則勢利之薫炙妻子之浸灌淫朋比友之慫􅀢附和則前日之良心死而貪心生矣如倚門之妖如負嵎之虎如驅羊之狼吮膏㗖髓肆然不知其可恥且惡也囊帛匱金居則連屋水則連舟陸則連車以買官則連爵以買田則連阡以買居則大厦連雲以買肥甘則方丈連味以買姬妾則粉黛連室以買服用玩好則珠玉錦繡連箱如此而已矣殊不思之七尺之軀一日之享米不過一升肉不過一豆酒不過一瓢冬不過一裘夏不過一葛為吾身則身外皆長物也為子孫則子孫不能保而有也為昆弟㛰友則刑辟戮辱昆弟㛰友不能免也噫所以求仕者以其尊且榮也不知所以尊且榮者不在富與貴而在功與徳也金張許史視龔黄卓魯何如哉迺計不出此而出彼何也卒使正士羞與同朝正人羞與同鄉正朋羞與同門族人羞與同宗至其逺裔子孫亦羞以為祖快欲扵一朝而流穢扵千載何其愚之甚也為吾屬者尚監于兹以誠存心以㢘律己以儉制用以公照物以恕待人以勤厲事以敬事上以嚴肅下以和睦僚以仁䘏民以寛容衆則庶乎矣詩曰靖共爾位正直是與國有明憲予罔攸貸其毋悔哀辭山隂居蘭陳先生哀辭成化五年春陳公居蘭卒居蘭生扵東越長扵東越戍扵南郊徙扵北燕卒扵金陵子三人御史直夫其季良也居蘭卒命曰蘭東西南北人也死其歸我先人之兆直夫以之子友羅倫哀之代執紼辭曰居蘭生山之隂潁川澤沃靈根深居蘭長嶺之表山荒荒谷窅窅瘴雨蠻烟飽經了居蘭老老燕山功名寂寞毛髪班繡衣春當霄漢立老父終日開懽顔居蘭化金陵道東家西家白頭翁百年埋沒同秋草居蘭有餘馨不逐秋風老靈旐翩翩歸故丘歸故丘死即休説靜軒説人之生也静感而後動生焉性静也天下之大本也情動也天下之達道也心統性情妙動静之主也敬以居之養其静而制其動也子思子曰戒謹不睹恐懼不聞養其静也莫見乎隠莫顯乎微制其動以養其静也能制其動動亦静静亦静動静一矣是故敬而後能静静而後能明明而後能誠誠則動静一而幾扵聖矣故聖賢非性生由養静以至之不觀扵水乎聖人之心猶止水也沓至而不亂善應而不蔵主扵静以一其動也衆人之心猶潢汙也澄之乆則止止則湛一而照萬夫豈由外而得哉制扵動以養其静也程子曰静然後見萬物皆有春意此之謂夫愚坦説不通之謂愚無險之謂坦古之愚也直直斯坦矣今之愚也詐詐斯險矣愚而坦者得扵天者不移扵人也愚而險者天移扵人矣易曰履道坦坦幽人貞吉坦其君子之道與來之坎坎入于坎窞凶險其小人之道與處士蕭某以愚坦自命諗之曰顔氏子終日不違如愚睿而為愚也甯武子邦無道則愚知而為愚也斯二子也陋巷不改其樂患難不干其身無往而不吉矣若栁子厚之阿附匪人戮辱其身而不悔乃以愚自文無往而不凶矣子厚之愚人皆知笑之矣夫學不聞道恃知以自私而卒歸扵愚者皆是也使其闋然自省如寐之得醒將自愧之不暇何暇子厚之笑哉愚坦其知所擇與魯之大賢衛之名卿亦自勉而已矣廷瑗欲世其道乎為此而不為彼也何以愚言為善人説善者性之源惡者習而後移者也習扵善則善習扵惡則惡生而惡者移扵氣者也移扵氣與習惡由是生焉善非其初乎曷為明其初見善則好焉見不善則惡焉天下之至情也善非其初乎大學之教在止扵至善教人以復其初也神發扵知幾防扵意致其可欲大而化則聖矣聖則止扵至善矣不入扵室者吾止也化而聖者吾進也止未至也可乎文江上㳺有善人焉問之李其姓儀佑其名果善人乎許良楫曰某事善某事善問之里人里人曰善人也問之鄉人鄉人曰善人也孔子曰善人吾不得而見之矣吾乃見善人乎難扵古而易扵今者何也善人其進而未止將終扵善人而已哉萬里説天下莫險扵水鵬之徙南溟也水撃三千里險之至也鵬能忘其險焉摶扶搖而上者九萬里髙之至也鵬能忘其髙焉鵬能㤀其髙與險也夫豈無所待而然哉風之積也不厚則其負大翼也無力九萬里則風斯下風之積也厚矣予聞天之髙十九萬里九萬里天之半也鵬之飛也半扵天而不能至有所待也有所待者不能至其至也無至而無不至者無所待也乘天地之正御六氣之變以逰無窮者無所待者也世有斯人乎若未之遇也蜩鳩斥鷃惡知九萬里之上有大鵬者哉大鵬惡知其上有天者哉天台有風鵬焉號萬里作是説以貽之澹軒説淡者天下之至徳也泰伯讓天下夷齊讓國孔子疏水樂在其中顔子簟瓢不改其樂淡之所成也故曰淡者天下之至徳也春秋戰國臣弑其君子弑其父積骸為山流血成川敗國亡家者相踵也不淡之所成也故曰淡者天下之至徳也天下之物莫淡扵水水初非有醎也至海而後醎之味成焉水源扵山疏為溝澮溢為江河滲漉浸潤五穀繁滋草木暢茂淡之所成也海濵之地彌望斥鹵草木不生五穀不茂不淡之所成也海居之人汲水以自隨或掬海水飲之則顛倒眩瞀終日不寧淡則宜扵物與人不淡者反是故曰淡者天下之至徳也孟子曰養心莫善扵寡欲寡之又寡以至扵無則目不盲扵五色口不爽扵五味耳不聾扵五聲天下之物無一足動其中而淡之徳成矣水者天一之所生人心之天亦天之一也淡有要乎曰有一為要立齋説忠孝劉氏瀧岡仕族予表叔行也務學有年矣屬予名其齋予名之曰立或曰立之義如何予攷之傳其立義有四有立定之立三十而立可與立立扵禮之類是也有豎立之立立愛惟親立敬惟長本立道生之類是也有卓立之立顔子所謂如有所立卓之類也有竪起之立孝經所謂立身揚名名立扵後之類也叔孫豹所云又有立徳之立有立功之立有立言之立皆竪起之謂也立雖不同而三者之立可概之矣三十而立聖人教學者以立也有所立卓顔子見聖人之立也立扵禮可與立本立道生學者之立功效次第也立愛立敬立身揚名治天下者之立也曽閔立徳者也能立學者之立見聖人之立則立徳者可言矣葛狄立功者也能立身行道則立功者可幾矣賈董韓歐立言者也能立徳立功則立言者乃其餘事子之所務者立言也立徳其法扵曽閔立功其法扵葛狄而鄉先正歐陽子輩則立言之法云表叔其有志扵斯乎寳墨説君子之寳吾聞以善未聞以墨也夫善者人之心天之命太極之本然也人寳之而仁家寳之而慶國寳之而榮天下寳之而和平惟墨之寳也珪其聖乎粤方册既廢紙道乃成墨功攸著聖賢精微之藴古今監戒之跡備矣天地位而易行陽善隂惡陽剛隂柔陽君子而隂小人君子觀之體陽剛之中正去隂柔之邪佞則太極之全體在我矣寳有大扵此乎彼役役焉朝秦暮燕求之身外而不已者豈吾之所謂寳哉皓歸而求之請質扵無極翁銘婁岡梁氏鐘銘大道何象𤣥黄精英大者何聲虚空雷霆警百氓之憒憒振萬古之㝠㝠乾坤示則麟鳯呈靈寂感生于方寸中和洽于閨庭礪磨南岳塵擁東溟天畀夫子全此徳真端硯銘去觕樸之質妙中和之精金聲玉色地緯天經舍之則居然而貞用之則天下文明祭文祭外祖安和文倫聞先夫人有言曰吾姓李氏系西平之宦裔世清賽之儒紳吾父安和寛夷篤實吾母曽氏柔静貞純吾弟集淵俊民茂異粤惟大父聫吾邦鄒魏之姻而黨事方興在永樂丁亥之春弟年十一侍父母于南郡吾年十三歸嬪于汝之嚴君父母憂憤卒殞其身吾弟自鬻極于艱屯成童來歸徙于常徳有子二人而李氏之不絶一燼燃于寒灰一髪引于千鈞於戲人誰無父人誰無母吾父母之死獨含寃扵九泉善者得禍惡者得福何顛倒乎彼天豈懵懵在上都不知聞而下民之禍福夀夭任其自然滄海有涸泰山有頽而終天之痛無騫春雲慘慘秋月娟娟吾父母之逰魂想戀戀于故阡青山可墳蒼崖可鐫汝異日少長成吾父母首丘之志是亦百世之良縁也先夫人沒十有六年倫乃得官仕未三月南竄海堧暫回翰苑道病歸田卧雲霞而枕泉石竟成痼而莫痊尚有待于它日酧先夫人之遺言望行雲而一奠不知涕泗之漣漣祭外祖南園公文嗚呼天乎碩人其喪乎嗚呼天乎碩人其不我留乎嗚呼天乎天乎莫我知也夫方余挹欝未濟特紛紛總總兮誰知顑頷兮侘傺不吠山犬兮定嘯鴟夷公獨畦留夷與掲車滋杜衡與江離索芳草扵蕃叢兮搴胡繩之纚纚指幽蘭之猗猗搜嘉禾扵蔚林兮盻中椒之清芬指菌桂之幽枝留一鯨扵衆族遲孤鳯扵羣飛釋驥車大行之坂乘我龍兮雲衢嗚呼公之此見其誰及之將髙霄漢駕日月兮齊輝嗚呼公若兮天何不我留兮大昭于時嗚呼已而已而吾之徳報兮將何施謂將為之發潛兮公之馨徳芳菲謂將為之厚歛兮公之重衾雲依依吾為蕉黄兮空薦香茘丹兮徒羞觴繐掩淚兮空浪浪嗚呼心傷兮心傷日崦嵫兮尚朝陽月朦朧兮尚朔光公何乘雲兮終帝鄉地邈邈兮天茫茫水悠悠兮山蒼蒼令人懐感兮何時忘嗚呼哀哉兮伏惟尚享一峯文集巻七
