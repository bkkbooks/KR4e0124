body:
  text: 一峯文集巻八明羅倫撰書在告與三閤老起居常禮不敢瀆陳輒有悃誠上干鈞聴倫自往年勞傷作業心血紊經吐咯不已醫者謬庸誤為積熱大寒諸藥經服累年前證暫除病根尚在勞重復萌虚耗日甚轉成痼冷遺漏不禁百計求醫畧無收效形貌猶人精華已竭元氣既耗六淫七情觸處成病去年被命力疾就道縁途服藥到都茍安暨秋之任少冒熱邪輒發痎瘧自到任後諸證駸加頭目昬暈渾身痺痛院事雖簡而外務沓來乞言問候門無虚日愚性踈直尤恐忤物酬答倦勤稽諸古方詢于明哲僉謂投閒凝神内觀病乃可療積乆不瘳後報無期因告吏部移諮定奪候報延乆病轉危篤今春加左股骨節濕痛跬步難移日者傳聞行移南部徑自奏請審如所聞則遞道迂滯動經年嵗爰自在告俸給皂𨽻已行辭遣非惟病勢加深而朝不謀夕勢難乆留是用輒露血誠上干天聴若䝉䧏出欲望台慈深察情悃暫賜投閒醫調痊可隨即赴朝鞠躬盡瘁以備任使若叨䝉榮寵而竊名髙蹈則臣子之大罪也倫豈敢有此心哉精神恍迫言語無叙伏惟容照特䧏處分不勝幸甚在告與崔冡宰别更嵗籥台斗在瞻素恃愛隆敢罄愚悃惟垂聴焉倫自蚤嵗即乖調攝心血錯經過聴庸醫以為積熱累服苦寒積成痼冷離火上炎坎水下漏精元日涸去年被命縁道尋醫到都茍安入秋赴任觸冒暑淫遂成痁瘧虚耗日甚百病駸加頭目昬暈痔痼成漏臂膊酸輭執鞭揮筆亦不能乆今春以還左股骨節濕痛拜跪起伏動難為禮間甞發作須扶乃行天地鬼神鑒臨在上非敢有冒偽之私以取欺罔之罪也獨以病源隠微動口羞澁天性伉直尤恐忤人扶衰力憊不倦酬應浮議流聞恐誤台聴未䝉開允行移南部徑自上請審如所傳遞道迂逺動經嵗年爰自在告俸給皂𨽻悉行辭遣非惟病轉危篤而藥食之奉饔飱之給無所從出勢難乆留且稽諸古方詢諸耆夀咸謂病根已深惟得投閒内觀凝神保和然後可愈用是吐露血誠上干天聴倘䝉賜下伏望鈞慈即賜開允免行勘覆暫令少休以保殘喘少俟痊可隨即赴部以備任使不勝幸甚與李賔之别忽半載自别去内損日甚元氣日耗延及四肢痺痛甚苦舉動因乞歸養茍延餘息圖終報稱直夫來時卜日就道衆曰俟報禮也迺止事委直夫終之而乃悠悠夫為人謀而必忠聖門教人之大方曽子傳道之實功也記語者次有子以孝弟行扵家忠信及扵人合内外之道也人已有二道豈有人已哉忠扵為已而不忠扵為人衆人之通病也直夫豈不忠扵為人者哉此道之不明耳夫豈直夫之過也固吾之罪也曽子吾不得而知矣傳曽子之道者非伯淳乎伯淳所至雖僮僕亦終其事况朋友乎直夫之定交扵余者亦既數月矣而此道不明扵其心吾罪可得逭也不耘已之田而耘人之田吾豈敢哉直夫豈以干人者喪已耶夫茍賢也則干人而進之可也况干退者獨不可乎聞直夫已託足下矣直夫託足下猶吾託直夫也足下忠扵為人者其事必終矣脱猶未也其往終焉速以文來引踵以俟倫頓首與劉用光倫白用光足下向承過論處皂𨽻事吾聞之喜而不寐矣吾弟此論雖權一時之宜未盡合聖賢之道然以今視之可謂蟬蜕汙濁之中而脱然自新者也吾惡得而不喜哉然吾猶有説焉豈不信吾弟之過也懼為衆是之所讙也夫一事之非與十人談之非之者一而是之者九聞者率從其是而違其非者以非者少而是者多也今此事也一二人談之一二人以為是三五人談之三五人以為是數十百人談之數十百人無不以為是間有知其非者亦垢面縮喙扵其間不敢一毫自異者懼為衆是之所讙也衆人皆以為是而吾弟獨以為非此吾之所以喜而且懼也吾弟明扵知非而果扵遷善必有以實吾之喜而虚吾之懼矣且君子處事當視義理為是非不當視人情世故以為是非也此事古無有也祖宗之時亦無有也有自近代始吾嘗見東里先生三朝聖諭録載此事是東里時始有也頋佐之為都御史也東里薦之也一日有言頋賣放皂𨽻者宣宗皇帝召士竒問曰頋佐有此事否為大臣而不檢如此何以長風憲哉卿何為薦此人也士竒對曰此事有之近仕者禄不足雖臣亦然非獨頋也噫東里誤也重禄以養士不能使好于而家時人斯其辜東里之見也誠憂禄不足乎今日之天下固唐虞三代之天下也以堯舜禹湯文武之道輔其君則天下之大且家給而人足况仕者之禄乎八口之家百畝之田五畝之宅生之有道用之有節老者衣帛食肉少者免乎饑寒而又以保助乎其鄰里親戚况據四海之富哉大臣以道事君當何所取法耶一事不合乎道或貽四海之憂而遺千百年之患為人謀國不𢎞經逺之猷而茍且一時近小之利此三代以下所以無善治也東里得君行政如此其専且乆也而見不出此何也昔髙允事元魏百官俸不足尤以清脩苦節先之東里縱不能以唐虞三代之大臣自期豈可復居髙允之下乎其見不出此何也然其初猶未如此之甚也利源一開末流無所不至以今視之則倍蓰什百扵其初矣其椎骨剥髓以病天下之民命蠧士心而虧國體汙衊一代之治化而遺羞千載者未有甚扵此也君子所以惡夫作俑者此也脱以為士無常産以官為家仰事俯育之資無所扵出則如吾弟之所處其亦庶乎其可也今士夫之嗜利無恥者貪多務得旁求巧取皆以為吾之分當然正猶李赤被厠鬼身入穢汙過者莫不掩鼻彼方揚揚然自以為鈞天帝都而莫之覺也然秉彛義理之良心吾弟勉為之同志之士安知不有彚興者乎是雖不能頓革一代之積弊而為吾徒者庶乎少免汙穢之辱也則吾弟之所及者多矣善待其生者以百年為千載千載之事在此舉也吾弟勉之復胡提學書斯民也三代之所以直道而行也不觀扵今人乎目之視耳之聴口鼻之臭味手足之持行固三代之民也而獨此心異扵三代之民乎何其才之古今之相違也是豈學者之罪哉師之不以其人覺之不以其道耳天之生此民也使先知覺後知使先覺覺後覺古之覺人者覺之以禮義今之覺人者覺之以利欲古之為教也方其幼也覺以小學而行藝立及其長也覺以大學而道徳明今之為教也父之扵子兄之扵弟師之扵弟子其所以覺之者方其幼也詩律聲對及其長也則科舉爵禄而已此外無以為也欲人才之逮扵古也難矣今欲革故鼎新必如明道熈寧之論而後可而行之必以其時必不得已焉如伊川之看詳晦菴之私議取其不戾扵法不駭扵俗者時而行之使禮義之教日淑扵其心若修扵身也孝弟忠信㢘恥禮義行扵家與鄉也冠㛰喪祭睦婣任䘏則待以異類或彰之扵旌善或禄之扵廩餼或貢之扵南官或興之扵鄉薦其或超然物外韜光晦影潛修密造則必旁搜博訪䧏禮崇徳君子之為善也夫豈求知扵人哉而作人之道吾當然也若其悖扵是者姑惟教之教之不改則出之然徒法不能以自行未聞立不得人之法也孔子曰為政在人周子曰師道立則善人多其機軸轉移又在執事取舍之間而已倫自家食聞執事歸謂人曰嶺南髙士有陳公甫倫謹識之其後公甫道成徳尊名聞天下自執事發之聞公甫之風而興者何時矩林緝熈輩執事又能張而大之所在學校有若而人拔頴連茹鶴鳴子和則風動而化成矣易徳元陳秉常光恵湖西觀其為人皆知重内而輕外已大而物小相與嘖嘖稱嘆不已曰自有提學作人之功未有先如執事者也宋之人才如孫泰山張横渠李泰伯輩皆自仲淹作之而湖學之盛甲扵東南是時洛學未興而諸公見趣已非漢唐所及程朱以還道學大明士君子幼學壯行醉夢終身而不知返夫豈其心異扵三代之民哉覺之不以其道下觀者無所從而入耳治天下無他道風而已伯夷下恵以匹夫奮百世之上而興百世之下况秉化衡軸皇極有能奮庸四方不風動乎扵治天下何有執事有志當世故為執事陳之伏惟亮察與周時可書吾子得第後夏友來問何居曰居給事御史則辭居翰林他官則不辭以給事御史其任重耶辭也是也以翰林他官其任輕也不辭也非也辭讓之心人皆有之先王因人心而制禮也登䧏辭焉作止辭焉飲食辭焉交際餽遺無不辭焉榮以爵大者不辭可乎古之人有不辭者矣抱闗擊柝乘田委吏也尊者辭也卑者不辭也翰林之官卑耶不辭非也君子之辭也非偽也禮也全吾禮所以直吾道也不辭而冒受則道枉矣枉已者未有能直人者也孟子曰孔子進以禮退以義所以直吾道也子路論為國而其言不讓夫子哂之况直居其位而不讓乎先王以禮讓為國其化之成也公卿大夫讓扵朝父子兄弟讓扵家士讓扵庠序朋友親婣讓扵黨里耕者讓畔行者讓路故曰以禮讓為國乎何有今將行道以化天下不先之以讓何也登䧏作止飲食不辭焉人皆以為非也榮以爵而不辭焉人不以為非也非其小而不非其大何也今之辭者何宜乎辭内而居外辭尊而居卑辭朝著而居州邑其宜者也所以安生民而利社稷也所以正人心而善風俗也所以繼孔孟程朱之道而範來學也昔范宣子讓其下皆讓宣子一國士也而况天下乎吾初第時衆以例格吾辭南回嫌扵辭至是在告不能辭今日汙吾榜而福不及斯民吾之罪也君固吾也君其捄之予日望之書先府君事畧寄陳石齋先君姓羅氏修大其字也别號大山宋忠臣水心先生七世孫始祖諱寅辟五季亂自豫章徙永豐至先府君十八世矣羅氏在宋由科第登仕銜者數十人多以節義著聞水心先生開禮松野先生士鼎餘頑先生士俊滄洲先生時翁其章章者也先君天性孝友兄弟三人二弟早世語及嗚咽不已曰命有如某乎大父善耕先生好義崇文先君奉承惟謹無不得其懽心視異出弟如同氣指其子謂倫曰以養以教汝之責也鄉黨宗族服其衷公咸取宜焉折過發頳色退省必自愧服或欺取其資産曰物豈有常主乎家人拾遺曰吾命窮也可居他人有耶竟求其主給之家政以傳長兄惟權量必自謹好早起鷄鳴必具巾櫛夜獨行不懼晩益貧啜粥飲水裕如客至必罄倒而去謂所知曰吾家世忠孝今有後矣異日必大吾門吾貧且老何恃以為樂乎恃有此耳俗尚風水説以福禍胥此出長兄頗通之私告曰某隂宅某陽宅合堪輿家慎勿洩則曰使此地果能福人耶吾可獨有哉走告曰吾兒不妄汝遂有之嵗壬午明年值春官謂不肖孤曰星家謂吾限出寅當阨汝苐去死生命也不去汝能續乃命乎泣請曰兒去禄仕矣先君曰吾不汝止苐汝欲為之吾恐有不可得者吾知之矣明年春正月先君果棄養且易簀謂長兄曰母以異教汙我吾心事天知之縱有地獄吾死不當入矣又三年丙戌不肖孤果及第皆如先君言嗚呼痛哉先君心天日也宜得引考者乃不禄焉嗚呼痛哉遺影在堂敢希叙賛幽明光矣奉曹州李冡宰書倫在家食已聞大司馬王公公度及公之名比釋褐南宫王公已引疾去位縹然如威鳯之在雲漢也公時都憲臺倫在諸生公獨能以禮下之公卿不下士乆矣非有髙世之度絶人之見其能然與既而倫入翰林憂世之志見公必吐公未嘗不首肯而心服也未幾倫黜泉南雖雲泥萬里而心未嘗不在公左右居一年䝉恩賜還夕扵杉闗夢公有退休之祥比聞公已宰銓衡私謂不驗未及語公比來南都夢如初告陳廷彦曰李公其去位乎何其祥形吾夢也未幾公果去位夫公之進退繋扵吾之夢寐如此是豈偶然耶古之大臣身居畎畝而心在社稷公尚益杜門講學修其身齊其家敦化扵其鄉而風被扵天下以禆皇化之未周則身雖退而道益進跡雖隠而名益彰天下之士之望不虚矣若以進退為欣戚固非公之志亦非倫之敢望扵公也公尚朂哉復翁宗海書凡同年四海兄弟也有賢而秀者如吾兄焉則同道同心又非獨同年已也若倫之蠢且愚者則同年而已其道固未敢同也吾兄乃不忘而念之倫敢忘吾兄哉自别建陽中道疾驅聞家兄見背歸已嵗除不遑寢食襄大事也大事既襄已揮淚就道急王命也小呉離家倉卒遣回四月造朝九月赴任十月在告候問錢帥念已北上未及奉書非敢忘也所忘者忘其志扵終養耳吾兄之志不移耶固吾之所樂道也夫仕為親榮將以行其道也道時可行也一官之授必抗章而力辭進以禮也一言不合即奉身以求去退以義也非固為是以要君也不如是則枉道矣枉道則辱身以及親矣道時乎不可行也則山林而已矣畎畝而已矣必不得已而為親也則抱闗擊柝而已矣乘田委吏而已矣君子豈樂貧賤而惡尊富哉立乎人之本朝而道不行則辱身以及親矣古之君子榮親以禮義今之君子榮親以爵禄進士入仕不為給事必為御史不為御史必為主事媚竈乞墦恬不為恥曰吾以榮親其或守一州令一縣則戚焉以悲曰其如吾親何給事御史誠美官也然不得其職則禍蒼生而誤社稷辱親甚矣州官縣令官誠卑也視抱闗擊柝則尊矣一得其職則流芳百世其親之榮視彼何如也吾初第時欲授卑職以遂初心而二三同志恐成亢激力沮閤之其流弊至汙吾榜而毒天下吾之罪也近欲遂初志而百病浸加矣然初志猶未巳也同年中有砥柱頽波者乎固天下之大幸也𢎞中將北上昌澤已南求其以吾言告之與謝元吉書凡治已必先治心心者舟之柁也欲正其舟而不正其柁可乎治人亦然不先治其心則一病去一病生矣氣質有偏則有病偏扵剛者病躁急病褊狭病粗疎因其病而克之可也躁急者克之以詳緩褊狹者克之以寛容粗疎者克之以謹審然後可也然非心存焉則已熄而復然已抑而復長病證雖退病根尚在安在其為可也吾非剛者有剛者病嘗試騐之粗疎平時居多躁急褊狹則因怒而後見焉情之發也怒為難制方其來也突如焚如震如乘時而應之則有不勝其悔者矣必堅忍而力制之候其䧏伏静定而後徐而應焉則不中不逺其悔寡矣吾弟有吾之所無不可有吾之所有如有吾之所有則一日子而亥一嵗春而冬一生少而老持守此心如過獨木橋如御逸馬如俯懸崖如見大賔而對上帝使主心常存客氣聴命則病根自除而病證不形矣如是用功方為第一流人也若徒務制其外而不從事扵其中譬操萬斛之舟扵長江大河遇狂颶巨浪舍柁而惟篙櫓是仗焉吾見其危矣願相與圖之除其病根其病證則具存扵别紙與陳直夫書倫頓首直夫大孝賢弟吾初聞令先君遺命計非五十金不可因為一切之計盖亦古之道焉召徳懋慮之不至初不計足下有疋馬椽屋也其求之人亦與衆計之豈敢濫取以汙足下哉使無所處邪則行求四方以成父志可也使有所處邪則如管寧陸贄一無所受可也今有所處甚善也孔陽早来道吾弟求銘而父猶吾父也吾豈敢辭哉但其禁方嚴猶自犯之則是猶盟也口血未乾而已叛去矣二人言之而未信猶見棄扵聖賢况一人之身而所為猶發瘧然焉用此人文哉故禁例未開雖同父之賢晦菴猶不為也孔陽謂求徳懋仲昭此三人者固不得而讓也然亦只直叙名姓邑里如司馬公論極是不必過文吾當與觀焉聞節約家禮此法良是大本在飲食男女此豈待僕之言哉嫌疑之際猶不可不慎也以敷五能行况吾弟素清約堅忍者有不能哉然亦不可太過致傷生以累老母古人所謂身自執事者面垢而已此可以為法苫蓆雖去地稍髙不可傷濕氣務必漆堅𦵏法亦須講求不可臨時無措伯恭居喪授徒子静極以為非今日使子靜在恐亦不敢以為非也勉之顯親之道在此而已少有跛躄則天地雖大吾恐無容身處矣己丑三月十二日信筆又𦵏禮須心中了了到下手處方成得不然或貽終身之悔矣向背只依山川自然形勢免惑野師浮議居喪雜儀只依家禮參㸔儀禮禮記自小祥大祥一依之飲食自量强進不可因而致病貽老母憂須避嫌疑不可自信而已古人之受汙者多以此人或以是汙之亦無路分説也慎之以治心為先心正百行皆正矣非程朱書不必泛㸔盖無許多精力又恐惑人也柔克以剛偽克以誠怠克以勤慢克以敬須先正容體倫告直夫又所作哀辭甚淺意不佳孔陽知得下了多少工夫方到吾平日全不用心然不必以此誤正的工夫詩文不如人無害也鼎升也要向善但恐見得局促可為問金華廖先生動静此公却儘髙自家進善須無足處有足便小了臧否人物此是一件不好勾當稱善須是美事然必見得透恐為偽人所罔但不可求備耳且居喪言語不與平日同朝仲相㑹為致聲焉聞周可大來僉事吾友也倫又言與劉素彬書倫白素彬八哥昔書與劉某必從如轉丸矣此非獨劉某之罪亦吾黨之罪也大抵習俗之溺人如醉者之酣扵酒寐者之酣扵夢也所貴乎君子者醉而能醒寐而能覺也吾嘗猛省焉生三十九年矣無一日不在醉夢中也此無他醉而寐之者多醒而寤之者少也不知吾弟之醉且夢今醒已寤且否乎吾固賴吾弟醒我而覺之也習俗之醉夢人非獨一樣富貴也凡詩文之必扵工科名之必扵得皆是也自今以往科名之得失文詩之工拙皆洗淨而痛决之不使亂吾之念慮一意從事聖賢之學研精義理檢㸃身心必至扵成人而後已學詩文而至不過為詩人文人而已學科舉而至不過為官人而已學吾道而至則可以為聖人可以為賢人詩文科舉之學固有工之而不至求之而不得者也若夫道在吾身豈有求之而不得哉而世未有工而求之者醉夢扵彼而不覺寤乎此也今士夫中稍有繩趨尺步者則羣聚而讙之曰此道學也其中無定守者未有不隨而化矣噫目之視耳之聴手之持足之行吾聖賢也饑之食渇之飲冬之裘夏之葛宫室之居吾聖賢也喜怒好惡日用種種吾無不聖賢也獨吾之心不可以聖賢哉所以為之不必刪述定作如孔子之折衷羣聖以垂憲萬世也不過求諸吾心致謹扵動静語黙衣服飲食父子君臣夫婦長幼朋友以至辭受取舍仕止乆速無不合乎聖賢已行之成法而已豈有工之而不至求之而不得者哉孔子曰有徳者必有言孟子曰修天爵而人爵從之道徳既修名實既著則言語不求工而自工爵禄不求至而自至若徒以文章詩律足以自立則揚雄李白皆可以為聖人而爵位科名則世之宰相狀元何限其一時之富貴氣燄雖足以歆動鄉閭而奔走天下之鄙夫庸士卒與草木禽獸同一泯滅澌盡而無聞其恃以存者若吾鄉之劉丞相董參政者適足以貽不令之名為子孫鄉閭之辱也何足道哉公安純篤有志惜其不能撇地自見耳相見間可以此意道之與門人書足下從吾㳺乆矣然所志一科第耳此有命也可必得哉便使得之不過鄉人稱為官人而已一時之貴耳有若求之即得上可以為聖人次可以為賢人又其次不失為君子貴扵百世而不泯者則不知求此無他溺扵聞見習俗之卑陋而已求之道無它反諸吾心自念慮之微達事為之著無一不合聖賢已然之成法是矣入自小學近思録始如廣東陳公甫者其人也喬夀資質好只被科舉壓了頭不知近能擺脱得否若不以得失置胷中則應舉也未甚害與吾㳺者善類甚多只在門者少耳相見者其以吾言告之一峯文集巻八
