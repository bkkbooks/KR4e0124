body:
  text: 一峯集别集類五明提要臣等謹案一峯集十巻明羅倫撰倫字彜正别號一峯江西永豐人成化丙戌進士第一授修撰釋褐甫三月以疏劾大學士李賢謫泉州市舶副提舉明年詔還復原官改南京供職尋以疾辭歸退居金牛山授徒講學以終事跡具明史本傳倫與陳獻章稱石交然獻章以超悟為宗而倫篤守宋儒之途轍所學則殊明儒學案云倫剛介絶俗生平不作合同之語不為軟巽之行凍餒幾於死亡而無足以動其中庶可謂之無欲今覽其文剛毅之氣形於楮墨詩亦磊砢不凡雖執意過堅時或失於迂濶又喜排叠先儒傳註成語少淘汰之功或失於繁冗然亦多心得之言非外强中乾者比也後載夢稿二巻記夢之詞至三百餘首隠約幻渺幾莫測其用意所在亦文集中罕見之體以其人足重故得附本集以傳今亦姑仍舊本録之焉乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六一峯文集目録别集類五明巻一䇿䟽狀巻二序上巻三序下巻四記上巻五記中巻六記下巻七傳跋墓誌謡文哀辭説銘祭文巻八書上巻九書下巻十詩巻十一詩巻十二詩巻十三詩巻十四歌
