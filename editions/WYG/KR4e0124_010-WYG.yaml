body:
  text: 一峯文集巻十明羅倫撰五言古詩湖西八景次陳石齋韻太極丸春鄉名太極何山象太極也天城環周三百里象外兩儀也中峯忽出平地峯麓迴抱廣袤百畝象中太極也書院居之一丸三百里兩儀位太極誰從羲皇前畫此無量易白日煥天章萬古永不蝕吾亦欲無言𤣥天本幽黙翠𤣥幽玩光霽巖東去太極書院十里許東儀之麓也别號翠𤣥洞天洞髙明圓廣下容千夫深不可測逰者秉燭丹房繡壁竒形異狀耳目未有東南巖壑最勝未有先扵此者金鼇開一竇乃透𤣥雲麓一入洞天逰火龍銜玉燭仙都象衛嚴永夜不得宿仰視但鴻蒙瀛海駕蟠木金鼇霽雪太極東山髙踞雲漢若巨鼇横海隆冬初寒未雪先白已霽旬月浩然猶故東極蟠金鼇寒通雪山白祝融鞭火龍六月銷不得曽上金鼇頭已在崑崙側只恐金鼇飛白玉横天勒玉冕晴雲太極南山羅絡竒詭此峯尊嚴若端冕垂旒暑夏亢陽雲巾其頂霖雨時應土人仰之以為雨候坤厚載神秀雨暘時若之沛然澤下土乃與天公疑朝隮已膚寸熯旱方此時虹霓慎勿見羣黎生苦饑大旒垂玉太極北山水心之主山也山腹靈湫濛泉注湧飛流千仭如垂玉然大旒自何許太乙元精傾此水下無敵上與銀河并一入衆生口萬刼塵心清萬刼塵心清萬刼消心兵飛轝横翠太極西山髙望金鼇翠屏萬仭一碧横空世傳飛仙駐轝其上仙人此息駕太極開鴻㝠如何紫盖力敢與崑崙爭蔽虧三萬里晝夜移天行紫氣滿雲漢可望不可名一峯來秀一峯在太極為中峯在書院為西峯在水心為南峯水心太極北山之麓吾廬居之向一峯巋然其南故曰來秀太虚忽突兀孤碧自天拄完完太極鄉浩浩陽春塢萬象羅兩儀俯首環内竚撫掌無極翁昨夜聞天語三峽迴清三峽太極水口山也第一龍堂峽第二龍湫峽第三下瀧峽盤回百里溪流其中百里蟠天城天河下縈互羣龍沕淵潛衆蛟輕使負源通崑崙丘影接扶桑樹日暮聞棹歌武夷是何處逰太極丸春次容彦昭二首天心開太極天脚垂碧草草根雲峯青萬壁拱蓬島島中一丸春自此風光好撫掌無極翁蒼天未曽老又太極開蒼㝠天心非草草四山突中峯翠環擁瓊島一丸三百里萬象各妍好中有長春人獨抱春風老逰翠𤣥幽玩二首紫薇開洞天拚此𤣥黄擘天人好珍竒玉府寳蔵塞君居南山南我居北山北爾汝兩忘形相㸔非物色又玉堂囊青山母乃巨靈擘羣仙燕清都一壺春拍塞紫氣來青牛窈然忘南北指㸃極虚無太𤣥本無色贈易徳元陳秉常次陳石齋朝辭白沙雪夜卧西湖月湖天月在水烱然清爽接吾家富薫天大造委此業棹歌揚中流速爾進歸檝聞趙允用北行偶寄病夫懶讀書只愛華胥境一榻松風清北窓清晝永合眼見周公山童驚不醒君今旅途逰莫戀邯鄲枕卧龍巖次容彦昭夙昔慕至寳尋此蜿蜒蟠逶迤到龍門落手驪珠寒掌中見明月眼底無琅玕飛潛各有㑹與爾隆中㸔送何喬夀歸旴江何生旴江來魯秀媚寥宇孔門二三子參也吾與汝一片金牛雲萬傾西湖水去去勿復道𤣥天黙無語馬龍瑞芝堂詠馬家真龍種西極來流沙毓此𤣥氣精千載成靈華應圖光瑞日鴻祉熈無涯浩歌靈芝辭為我懐漢家寄梁徳剛南海李徳孚已從白沙老西江梁徳剛枉愛青山好徳剛發長笑青山莫吾惱猿鶴爾勿驚吾亦歸來早四皓圖為饒雯峯題天地有此山直到此翁好皓髪驚龍顔險語正穹昊後車來飛熊何如渭濵老俛仰幾嬴劉朝夕屢榮槁白雲照空山霞外跡如掃至今山上芝翳翳荒秋草和陳白沙二首水雲媚一窩去天九萬五饑腸冰玉清飽嚼雲月苦掉頭懶應客多謝巢與許客去掩柴扉随引鷄豚數仰面㸔行雲藹藹翳層宇庭柯鳥聲和喚醒夢中語又君年四十八我年四十五百年幾㑹面念此長恨苦金臺首相見各委霞外許擁懐素心人動輒屈指數賁然三子來歡聲撼茅宇瀧濵是曹溪他雨對牀語松雲為易徳元父世衡題崢嶸白雲東松樹幾千尺曽經秦漢來萬古横一碧黒風捲青山白晝飛霹靂須臾洗層霄見此太古色茅簷清露繁研硃㸃周易讀太白詩太白横西天萬古色不改至人孕元化風豪驚百代青天騎白龍傲蕩弄雲海太白邀我來招手六合外太白與我言為我開天在拾得白日還迷途杳無礙題陳僉憲粹之和四皓圖二首秦坑氣爇天商山色方好一鹿走寰中孤鳯鳴秋昊多謝赤松徒設網羅此老片語回天心一氣嘘萬槁遂令箕箒妾敢把漢宫掃噫嘻隆凖公作事何潦草又箕潁去已遙山林復誰好亦有采芝翁皓髪照蒼昊嗣漢配彼天赤手藉此老東隣亥字人獨伴霜木槁野雉懐鴆心火龍宜電掃何乃迷先幾人彘横秋草思親堂為建昌王垣賦青青澗畔松不為霜雪衰鑿鑿澗中石不為流水移胡為白髪人忽若朝露晞長夜去𡨕㝠兒心寕不悲泣血不到地滴著身上衣衣當有時弊兒悲無已時兒身匪金石不死將何為生當長相思死當長相隨思親堂為建昌閻明賦仰觀天蒼蒼俯視地茫茫天地亦何極人命如朝霜靈椿忽已摧萱草凌北堂慈烏反哺心悲思結中膓夜夜吐哀音涕涙沾我裳圓景淡無色浮雲慘不揚􅃵牆終乃身參閔同翺翔孤芳振千載黄泉耿幽光題界江李文光八景繼陳公甫作石齋天下士落筆浩縱横江山欲改色星斗芒寒明界江忽在手萬里隨君行龍眠乆黄土此畫天無精想當盤礴時半夜雷霆驚依依古槐栁不謝東風榮紫烟生瞑色霽月涵秋清宛宛牧童起翳翳漁燈青摩訶亂吾伊夜静如聞聲舍弟廣東來念子江湖英唾壺歌欲缺玉笥嶸蒼㝠贈容彦昭次陳石齋傳呼走柴門有客邁行只衣冠不駭俗語言多近裏可是白沙來乃渾化查滓白沙霞外客兄弟遄與處伯兄遣君來此意良何以肯為廟堂尊而迺山林取何由見汝兄汝弟見可矣詩好兒童傳誼髙朋舊喜我非青囊徒聊爾嬉雲水憑君具隻眼一照三萬里用揚龜山此日不再得韻送馬生歸南海𤣥黄浩無極滄溟忽枯桑况乃么麽生浮雲度虚蒼聚散倐忽間惜此分隂光方寸渺六合太極丸隂陽氣機乘出入寂感無邉方存亡繋摻舍泰山逺毫芒冰淵視臨履安此終然臧利劍一入腹慾火肺肝戕雲子委塵泥至寳珍粃糠襟裾衣牛馬四大空昻蔵包羞含遺臭焉能復流芳咨爾媚學子有欲斯無剛及時醒大夢晝夜馳徬徨仁宅固云廣義路亦已長居由聖所與曠舍成荒莊馬生南海來玉質披天章脱跡露軒冕㳺心聲教場謙受若虛谷忘悔同牽羊顓師學干禄顔回誠坐忘毫釐謬千里先幾宜自强寒雪立未消朔風上歸航脊梁爾鐡硬一擔挑綱常仰視白日舊萬古何當忘負兹彼綿力䀌然我心傷行邁勵無斁罔念聖作狂夀劉菊莊天台老僊伯云是菊莊翁朱顔映華髪碧眼開方瞳淡蕩㺯雲海飄飄隨西風東籬下白菊暗滿黄花叢夕歸餐落英為我好顔容世事懶開口薄俗爭樊籠黄金生羽翼飛入蓬萊宫蒼生亦何罪遭此搥炰兇天命且不畏况乃悲人窮肝肺苦焦裂耳目昭昬聾悠然遂獨往長嘯巖扉中金丹煉玉質曽與安期逢金牛卜仁里杖屨頻春風諸昆總愛客情深非貌恭盤飱稱豐儉芋栗呼兒童淹留未忍去引劍摩蒼穹清芬散蘭雪髙綵凌烟虹鯨鯢不敢動蚊蠆若為鋒把此共君往前山雲數重得酒輙復醉但恨糟牀空不學張子房長饑從赤松㝠㝠撫六合造化無全功男兒生世間猥瑣非英雄四言古詩存徳堂為西溪何純賦并引見山先生忠于宋吾祖武岡府君之同道也太虚先生隠于元吾祖松野先生滄洲先生之同道也羅與何世同道者余故賦之扵維見山赫赫武功不顯其忠武崗攸同允文太虚滄洲維則炳文之徳昭我南國見山之族太虚之孫纉戎列祖積徳彌敦式我後昆詩不有言徳輶如毛民鮮克舉之維何氏世舉之誰其風之作頌嫓之維彛正甫與之右見山四章一章二章章四句三章章五句四章章七句一峯文集巻十
