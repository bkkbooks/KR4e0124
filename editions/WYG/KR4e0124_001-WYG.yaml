body:
  text: 一峯文集巻一明羅倫撰廷試䇿皇帝制曰朕惟古昔帝王之為治也其道亦多端矣然而有綱焉有目焉必大綱正而萬目舉可也若唐虞之治大綱固無不正矣不知萬目亦盡舉與三代之隆其法䆮備宜乎大綱正而萬目舉也可歴指其實而言與説者謂漢大綱正唐萬目舉宋大綱正萬目未盡舉不知未正者何綱未舉者何目與已正已舉之綱目可得而悉言與我祖宗之為治也大綱無不正萬目無不舉固無異扵古昔帝王之治矣亦可得而詳言與朕嗣承大統夙夜惓惓惟欲正大綱而舉萬目使人倫明扵上風俗厚扵下百姓富庶而無失所之憂四夷賓服而無梗化之患薄海内外熈然太和可以増光祖宗可以匹休帝王果何行而可必有其要諸士子學以待用其扵古今治道講之熟矣請明著于篇毋泛毋略朕将親覧焉臣對臣聞居天下之大位必致天下之大治致天下之大治必正天下之大本正天下之大本必務天下之大學堯舜禹湯文武之位天下之大位也堯舜禹湯文武之治天下之大治也堯舜禹湯文武之心天下之大本也堯舜禹湯文武之學天下之大學也有其學然後能正其心有其心然後能致其治有其治然後能保其位治也者帝王保位之良圖心也者帝王出治之大本學也者又帝王正心之要道也古先聖王知其然是以堯學扵君疇舜學扵務成昭禹學扵西王國湯學扵成子伯文王學於鉸時子武王學於虢叔其所以精一此學維持此心者無不至也故徳澤加扵當時名聲垂扵後世功髙天下名並日月而不可及自漢而唐自唐而宋其間英君誼辟非不欲致治如唐虞三代志士仁人非不欲致君為二帝三王然寥寥千載未有一二庶幾乎此者或君有可學之資有欲學之志而不遇其臣如髙祖之扵蕭曹太宗之扵房杜神宗之於安石是非其君之罪也或臣有匡國之才有格君之學而不遇其君如賈董之扵漢陸贄之扵唐二程朱子之扵宋是非其臣之罪也此君臣相遇自古以為難而有志之士所以扼腕憤嘆而不能自已也此漢所以止扵漢唐所以止扵唐宋所以止扵宋而不能唐虞三代者此也臣毎見前史見君有向學慕道之心而臣不能成之則悲其為臣臣有匡國致君之學而君不能用之則悲其為君陛下繼祖宗列聖之位即堯舜禹湯文武之位也稟天縱聰眀之資即堯舜禹湯文武之資也治已至矣猶以為未至徳已盛矣猶以為未盛迺萬機之暇進臣等于廷降賜清問首詢唐虞三代下逮漢唐宋諸君惓惓欲正大綱舉萬目以眀人倫以厚風俗以富庶百姓以賓服屬國以増光祖宗匹休帝王臣有以知陛下此心即堯舜禹湯文武之心也陛下之有此心非特臣之幸也實宗廟社稷之幸天下生靈之幸也臣敢不以堯舜禹湯文武之所學者為陛下勉哉昔范祖禹上帝學八巻以為自古治日常少亂日常多推原其故由人主不學也朱熹將入對或曰正心誠意之學上所厭聞熹曰某平生所學在此若有所回䕶是欺君也陛下有志扵唐虞三代之治而無漢唐宋諸君之失固無不學之心亦非厭聞正心誠意之説者臣敢不以平生之所學者告陛下而自䧟扵欺君之罪哉使愚臣扵此犬馬之誠有未盡芻蕘之言有或隠上負朝廷下負所學臣恐後之悲今者無異扵今之悲昔也臣請因聖問而畢言之陛下試垂聴焉臣聞道之大原出扵天是道也極扵至大而無外入扵至小而無内語其大也則為父子為君臣為夫婦為長幼朋友之倫若網之有綱所以根柢乎人心紀綱乎世道乃天地之常經所謂為治之大綱也語其小也則為禮樂為刑政為制度文為之具若綱之有目所以扶植乎三綱經緯乎國體乃古今之通誼所謂為治之萬目也是道之綱非吾心主宰之則無自而正是道之目非吾心維持之則無自而舉此心也者又所以主於身而為正大綱舉萬目之根本也心雖主宰乎是綱非學則有所惑綱何從而正心雖維持乎是目非學則有所蔽目何從而舉此學也者又所以正其心而為正大綱舉萬目之根本也大綱不正固不可以言治萬目不舉亦非盡善之道也故古昔帝王之治其道雖多端然必大綱既正而萬目兼舉若堯之肇唐舜之起虞禹之創夏湯之建商文武之造周皆不能外乎此也在堯之時親睦九族以廣愛敬之恩釐降二女以正閨門之禮館甥二室以厚朋友之倫堯之大綱無不正也在舜之時底豫瞽叟而父子之位定克諧傲象而兄弟之化成刑于二女而閨門之儀肅舜之大綱無不正也欽若昊天敬授人時命羲和以秩東作命羲叔以秩南訛命和仲以平西成命和叔以在朔易命鯀以治洪水命四岳以明揚側陋允釐百工咸熈庶績萬目之舉扵堯何如也察璣衡以齊七政舉祀禮而朝諸侯命四岳以明四目達四聰命十二牧以脩内治服逺人命禹以宅百揆命契以敷五教命臯陶以明五刑命伯夷后䕫以作禮樂命龍作納言四方風動庶政惟和萬目之舉扵舜何如也唐虞之大綱無不正萬目無不舉如此豈徒然乎本扵堯舜之心惟務大學以正其大本也不寳淫泆不視玩好而允執其中堯之學也罔逰于佚罔淫于樂而允迪厥徳舜之學也使唐虞之君不事乎此則學有未至而大本不立矣綱何自而正目何自而舉哉其在禹也典常之率由彛倫之攸叙其在湯也舊服之載纉人紀之肇脩其在文武也麟趾以厚公族棠棣以燕兄弟鹿鳴以饗羣臣樛木思齊以嚴閫教故其子孫或敬承繼禹之道或布徳服禹之跡或率乃祖攸行或鑒先王成憲或篤叙正父或對揚光命或率徳以盖前人之愆或脱簪以輔中興之治此三代之所以正大綱也其養民也夏以貢商以助周以徹焉其教民也夏曰校殷曰序周曰庠焉其制刑也夏有禹刑殷有湯刑周訓祥刑焉其建官也夏商官倍亦克用又周人六典阜成兆民焉其作樂也禹作大夏湯作大濩武作大武焉其正朔也夏建寅商建丑周建子焉其習尚也夏尚忠商尚質周尚文焉三代之大綱無不正萬目無不舉如此豈徒然乎本扵禹湯文武之心惟務大學以正其大本也祗台徳先不自滿假懋昭大徳不邇聲色禹湯之學也不盤逰田緝熈敬止不作無益克慎明徳文武之學也使禹湯文武不從事乎此則學有未至而大本不立矣綱何自而正目何自而舉哉此堯舜禹湯文武惟能務天下之大學以正天下之大本所以能致天下之大治三代而下漢唐宋諸君雖有天下之大位而不能務天下之大學所以天下之大治卒不能致也漢就髙祖言之如發義帝之喪戮丁公之叛庶乎明君臣之義髙四皓之名割肌膚之愛庶乎全父子之恩立白馬之盟定同姓之封庶乎廣昆弟之愛故繼世之君子不敢叛其父弟不敢制其兄婦不敢駕其夫臣不敢専其君豈不由髙祖之作則哉此其大綱可謂正也然其養民也阡陌之壊未乆而井田之制不復其教民也坑焚之祻未乆而學校之制不復郡縣之設未乆而封建之制不復五禮六樂之廢未乆而禮樂之制不復此其萬目未盡舉也况兄弟不容兆扵􅃵頡之錫封夫人同席兆扵戚姬之見寵大將見殺兆扵韓彭之葅醢先儒謂漢大綱正以臣觀之漢之大綱亦未能盡正如唐虞三代也漢非惟萬目未盡舉而大綱亦未盡正以其或不事扵詩書或溺扵黄老或雜扵刑名或荒扵土木神仙而聖學也雜聖學既雜則大本不立何怪其大綱之未盡正萬目之未盡舉哉唐就太宗言之脅父臣虜逼奪神器父子之親何在推刃同氣蹀血禁門兄弟之義何在納巢刺妃媚武才人閨門之禮何在故繼世之君子攝兵叛其父臣攝兵叛其君婦駕其夫兄戕其弟豈不由太宗之作俑哉此其大綱可謂不正也然設府衞之法彷彿古人寓兵于農之意設覆奏以審刑彷彿古人欽䘏之意此其萬目可謂能舉也然法令之行比之先王未純也田疇之制比之先王未備也學校之教比之先王未盛也禮樂之具比之先王未脩也先儒謂唐萬目舉以臣觀之唐之萬目亦未能盡舉如唐虞三代也唐非惟大綱不正而萬目亦未盡舉如此以其或蔽扵異端或荒扵逰畋或錮扵女色或甘扵小人而聖學也怠聖學既怠則大本不立何怪其大綱之未盡正萬目之未盡舉哉宋就太祖言之其厚兄弟也金匱之書千古不磨神器之重一朝脱屣其厚勲舊也杯酒解柄終全勲名雪夜再幸不改殊恩其待臣下也鞭扑不行扵殿陛罵辱不及扵公卿其嚴閫範也内言不出扵外私恩不害扵公故繼世之君持盈守成家庭之間雖不能匹休乎麟趾之盛也而撡戈之事則未聞閨門之内雖不能齊美乎闗雎之化也而聚麀之恥則未有此其大綱亦云正也然制度頗因五代之舊不能復先王之制勸課農桑美則美矣視三代養民之制何如脩廣學校盛則盛矣視三代學校之制何如禮樂紛諸儒之喙視三代制禮樂之遺意何如兵財由朝廷之制視三代制兵財之遺法何如以至贓吏之戒不嚴敗軍之法不立設官之制太冗任子之恩太濫此其萬目亦未盡舉也先儒謂宋大綱亦正萬目未盡舉以臣觀之黄袍加身未免來人之公議燭影避席未免起人之疑心徳昭之死未免不厭夫衆心郭后之事未免有疵扵盛徳則宋之萬目固不舉矣而其大綱亦豈盡正乎宋之諸君見扵行事如此雖曰夜分讀書未免徒侈乎虚名雖曰炎暑談經未免不闗乎實踐聖學既無其實則大本不立矣其大綱之未盡正萬目之未盡舉又何怪其然哉漢唐宋所以不能致唐虞三代之治皆由大學不講大本不立故也我太祖髙皇帝龍飛淮甸混一區宇心堯舜禹湯文武之心而大本以立學堯舜禹湯文武之學而大學以明故以其大綱之正言之觀其祭畢便殿泣下不止遣祭皇陵哀感不勝則我太祖之聖孝一虞舜之大孝周武王之達孝也觀其剖符錫壤建封諸王上衞國家下安生民則我太祖之親睦一虞舜之敦叙九族周武王之時庸展親也觀其君臣同逰之言則與唐虞之都俞吁咈商周之左右篤棐同一揆也觀其申明五常之誥則與唐虞之敦典庸禮商周之建中建極同一揆也大綱之正有不如唐虞三代者乎以萬目之舉言之則法井給民之言互知丁業之戒與古人重農之意相出入也學校教民之制鄉飲勵俗之禮與古人立教之意相表裏也内設六卿以總治天下外設布政司以分理郡邑内設都察院以肅朝廷之紀綱外設按察司以為四方之耳目則其制官之意庶幾乎古人六卿九牧相倡和也兵部帥府相繼扵内而將帥無偏重之勢布按都司相制扵外而藩鎮無専恣之患則其制兵之意庶幾乎古人司徒司馬相統屬也命牛諒以制禮則斟酌先王之典以還中國之舊命陶凱以制樂則務宣和平之意而屏䙝狎之習萬目之舉有不如唐虞三代者乎列聖相承心太祖之心學太祖之學聖徳日新而無不正之綱聖化日廣而無不舉之目然法乆則弊自生世乆則俗自降故人倫有不明風俗有不厚而我祖宗之綱目漸以倫斁百姓有不富屬國有不服而我祖宗之綱目漸以乖張陛下嗣承大統于兹三年夙夜惓惓惟此之慮陛下此心即堯之競競舜之業業禹之孜孜湯之慄慄文王之翼翼武王之無貳之心也然自即位以來躬行大孝以先天下已有意扵明人倫而人倫至今猶未明斥去邪佞禁制奢侈已有意於厚風俗而風俗至今猶未厚躬畊籍田蠲免租税已有意扵富庶百姓而百姓至今猶未富庶簡練將帥嚴飭邉備已有意扵賔服屬國而夷狄至今猶未賓服陛下有堯舜禹湯文武之心而不能致堯舜禹湯文武之治意者陛下扵堯舜禹湯文武之學有未至乎何其心之惓惓而效之邈邈也臣請為陛下熟言之以陛下望治之切求治之篤必憤發于中憂形于色而惓惓之誠益有所不能已也夫天下之事未有不行扵上而行扵朝廷者也未有不行扵朝廷而行扵天下者也以人倫言之今公卿大臣雖軒墀之内有霄壤之隔是非不及扵面諭則腹心無所託而下情不得以上通可否惟出扵内批則耳目有所蔽而上心不得以下究何有乎君臣相親之義也陛下誠能體腹心手足之義畧崇髙貴重之勢召見不時咨訪非一使願輸忠悃者得以獻其誠務為蔽欺者無以施其詐則君臣之化行扵天下而無有不厚也閭閻小民忍心害理生則私妻育子别藉異財曽禮義之不知死則食稻衣錦火𦵏水瘞曽禽獸之不若何有乎父子相愛之恩也陛下誠能望陵興哀慕之悲慈養勤定省之誠公卿守終制之典士夫嚴匿服之禁則父子之化行扵下而無有不親也隔形骸而分秦越弟或戕其兄同門户而設藩籬幼或賊其長何有乎兄弟之愛也陛下誠能厚同氣之恩廣友于之愛嚴犯上之律敦敬長之風則兄弟之化行扵下而無有不愛也妾媵無數庶人僭公侯之分婚娶論財嘉禮啟貪鄙之風何有乎夫婦之道也陛下誠能則闗雎之化正宫闈之禮申明婚嫁之式定著妾媵之數則夫婦之化行扵下而無有不正也所貪者利禄誰同心而相濟所附者權勢誰同道而相益落穽下石者紛如貽書爭諫者寂若何有乎朋友之交也陛下誠能親君子之朋逺小人之黨燭擠陷之奸奬恊恭之正則朋友之化行扵下而無有不善也人倫之明自扵上非務學不能知臣願陛下惓惓聖學以正大本急求所以明倫之道則人倫庶乎可明無異扵唐虞三代也以風俗言之朱扉一開燕鵲駢集諛佞詭随者名之曰變通緘黙自便者目之曰忠厚直言正色者非之曰矯激持心操莭者刺之曰干名此士夫之風喪也陛下誠能塞奔競之門杜謟諛之口奬名節之士張正直之氣則士夫之風振矣庶人帝服娼優后飾雕梁畫棟惟恐其不華珍饈綺食惟恐其不豐錦綉金玉惟恐其不多姝色麗音惟恐其不足此奢侈之風盛也陛下誠能躬節儉之實抑浮靡之費重僭踰之罪定上下之等則奢侈之風降矣典學校之教者尸虛位而無實行由科貢之途者飾虛譽而乏實才此學校之風衰也陛下誠能重師儒之任使無實行者不得以濫叨嚴科貢之選使無實才者不得以幸進則學校之風興矣珠宫梵宇照耀雲漢髠首黄冠充斥道路此道佛之風熾也陛下誠能監梁武宋宗之失斥禍福報應之論惟崇乎正道毋惑扵邪説則道佛之風熄矣苞苴一入賤可使貴賄賂一通滯可使達黷貨載歸里閭稱慶琴鶴自隨妻子怨讟此貪黷之風盛也陛下誠能綜覈名實督行勸懲亷介者必彰而無隠貪墨者必誅而無赦則貪黷之風止矣風俗之厚自扵上非務學不能知臣願陛下惓惓聖學以正大本急求所以厚風俗之道則風俗庶乎可厚無異扵唐虞三代也以言乎百姓之失所則徵求極扵錙銖而漏巵扵寵倖之費苛歛至扵毛髪而尾閭扵異端之奉此吾民之困扵賦歛者可恤也征舸貢艦動連千夫工匠輿臺延及數户此吾民之困扵征徭者可恤也田連阡陌利累羊羔家雞圏豕惟其所啖此吾民之困扵豪家巨室者可恤也嚢帛籯金飫鮮醉醲市虎門妖恣其所欲此吾民之困扵貪官黠胥者可恤也刦掠踐蹂雞犬一空脅持抑逼肝腦塗地此吾民之困扵兵戈盜賊者可恤也父食其子夫鬻其妻壯者散扵四方老稚轉乎溝壑此吾民之困扵饑饉流離者可恤也百姓之失所固可恤矣然恤之有其道焉大要在扵重守令急務在扵節財賦守令者民之父母守令不重則好民之所惡惡民之所好豪猾由此而横盜賊由此而起財用者民之命脈財用不節則以一而科百因十而歛千賦歛由此而苛征徭由此而濫欲重守令在扵慎選科貢疏理胄監嚴勵風紀精立銓法欲節財賦在扵簡閲軍士沙汰冗官杜抑私愛斥絶異端科貢既慎則専圖僥倖者不得以幸進胄監既理則茍延嵗月者不得以幸選風紀既嚴則貪濁有狀者不得以幸免銓法既精則文理不達者不得以幸用政績不聞者不得以幸遷而守令自重矣軍士既閲則老弱無能者不得以幸食冗官既汰則備員充位者不得以幸禄私愛既杜則貴戚近習之屬不得以幸賜異端既斥則佛老邪怪之徒不得以幸干而財用自節矣何患百姓之不富庶哉百姓之富庶自扵上非務學不能知臣願陛下惓惓聖學以正大本急求所以富庶之道則百姓庶乎可富而無異扵唐虞三代也以言乎軍政之宜修則河套難復羌黠扵西變詐之不測侵掠之不常驅之不足扵兵守之不足扵食此西方之邊事可慮也阻山川以為固結流民以為援鬼出神沒蜂屯蟻聚此荆襄之諸冦可慮也丹崖千仞青壁萬重攻之則據險守之則廢時此兩廣之諸冦可慮也團聚山砦流俘鄉邑我進則彼去我退則彼來此川蜀之諸冦可慮也夷狄之梗化固可慮矣然服之有其道焉大要在扵脩内治布恩信急務在扵擇將帥足兵食内治不脩則根本不固恩信不立則人心不服將帥非人則敵人不畏士卒不附兵食不足則士氣不振衆心不守欲脩内治在扵戒逸樂足民用任君子退小人欲布恩信在扵宥脅從綏降欵欲得將帥在扵收人望専委任戒欺罔欲足兵食在扵廣屯田増土兵逸樂既絶則主心日正民用既足則邦本日固君子既用則羣䇿日陳小人既退則奸弊日銷脅從既宥則叛亂日懐降欵既綏則歸附日衆人望既收則將才日至委任既専則將士日奮欺罔既戒則賞罰日明屯田既廣則儲蓄日富土兵既増則兵力日振何慮屬國之不賓服哉夷狄之賔服自扵上非務學不能知臣願陛下惓惓聖學以正大本急求所以賓服之道則屬國庶乎可服而無異扵唐虞三代也嗟乎陛下惓惓扵唐虞三代之治而臣惓惓勉陛下以唐虞三代之學者誠以大綱之未正臣不憂也人倫之不明風俗之不厚臣不憂也百姓之未富庶夷狄之不賓服臣不憂也臣所憂者陛下之大本雖已正矣或不能如堯舜禹湯文武之光明陛下之大學雖已講矣或不能如堯舜禹湯文武之精一陛下由臣之言持惓惓圖治之心致惓惓為學之力如堯舜如禹湯如文武則天理日明人欲日消妖艷之色淫哇之聲不足以蕩此心便辟側媚之言不足以蠱此心神怪佛老異端之説不足以惑此心沉湎荒淫盤逰之事不足以荒此心華麗珍怪竒玩之物不足以侈此心土木刑名征伐之類不足以雜此心而大本立矣大本既立由是大綱可正萬目可舉人倫由是而可明風俗由是而可厚百姓由是而可富庶夷狄由是而可賔服薄海内外由是而可熈然太和宗廟由是而可以永安神器由是而可以永保聖夀由是而可以永延祖宗列聖由是而可以増光二帝三王由是而可以匹休而漢唐宋諸君不足以望陛下之下風也若大本不立則雖疲精憊神以求正夫大綱舉夫萬目以遂數者之效而快陛下之心亦將徒為文具而天下之事無一可為者矣此臣所以欲陛下從事扵學也然臣之所謂學者非稽同合異以為博也非鈎深致逺以為竒也非縭章繪句以為美也臣之所謂學者即大學之道也是學也即堯舜禹湯文武之所學者也其目有八而各有其要平天下治國齊家之要在扵脩身脩身之要在扵正心誠意正心誠意之要在扵致知格物宋儒衍繹其義以進告其君齊家之要有四曰重妃匹嚴内治定國本教戚屬脩身之要有二曰謹言行正威儀誠意正心之要有二曰崇敬畏戒逸欲格物致知之要有四曰明道術辨人才審治體察人情是書也乃先聖之心法萬古之元龜制治之良圖保邦之大道陛下必惓惓扵此晝而誦之夜而思之親近儒臣質問疑義毋徒事虚文毋徒應故事毋徒聞之扵耳而不識之扵心毋徒聴之扵人而不復之扵已毋徒能之扵始而或忽之扵終毋徒講之扵百辟雲集之時而即棄之扵宫閫深嚴之地毋以朝夕而有間毋以寒暑而有輟或摘其要語而列之屏幃或參以祖訓而銘之座右考之扵經證之扵史如某事也古人以之而治以之而安以之而興以之而夀即惕然以省曰吾今日之所行有合扵此者乎如某事也古人以之而亂以之而危以之而亡以之而夭即惕然以省曰吾今日之所為有類扵此者乎念念在此此念之外無它念事事在此此事之外無他事如是然後可謂之惓惓也如是然後所存必正念所出必正言所行必正道所親必正人如是然後身無有不脩家無有不齊國無有不治天下無有不平也嗟乎人主之心未嘗不好治而惡亂也好安而惡危也好盛而惡衰也好夀而惡夭也然治常少亂常多安常少危常多盛常少衰常多夀常少夭常多往往違其所好蹈其所惡夫豈其本心哉以不能惓惓扵學而陷扵不知故也如人之療病未甞不欲其生而卒至扵死者亦豈其本心哉以方書不熟而用藥不精故也方今天下之勢如人受病非不枵然且大形猶人也内自心腹五臓外達四肢百骸無一毛一髪不受病者識者以為寒心而庸醫委之曰安病者不悟其非和之曰吾無病也昔扁鵲見齊桓侯曰君有疾不治將深桓侯曰寡人無疾如是者三扁鵲望見桓侯而走後五日桓侯病作召扁鵲扁鵲已逃去臣願陛下以本心為元氣以賢臣為明醫以古聖賢經史祖宗寳訓所載之言為古方為藥石懼病之將深而預治之信任明醫熟閲古方深察脈理精擇藥石節嗜慾慎防䕶日調理其元氣急求病根之所在而剗除之則元氣日固扵内邪氣不攻扵外則百病自消天年自固何憂夀不如堯舜不如禹湯不如文武者乎及今猶可為也及今不為臣恐扁鵲望之而走矣雖噬臍無及也唐虞三代與我祖宗列聖之大綱無不正萬目無不舉元氣本固客邪難入病無自而生也漢唐宋之或大綱正而萬目不舉或萬目舉而大綱不正元氣未固客邪易奸隨病而施藥者也自唐虞而三代自三代而漢唐宋用是道則治不用是道則亂用是道則安不用是道則危用是道則盛不用是道則衰用是道則夀不用是道則夭用是道則延長不用是道則短促然則是道也乃世道治亂之所繫也社稷安危之所闗也風化盛衰之所由也人主夭夀之所本也國祚長短之所在也陛下可不大儆扵心乎易曰正其心萬事理差之毫釐繆以千里董仲舒告武帝曰尊其所聞則光明矣行其所知則髙大矣髙大光明不在乎他惟在乎加之意而已臣願陛下加意扵臣之言毋如武帝不加意扵仲舒之言也蘇軾對仁宗曰天下無事則公卿之言輕如鴻毛天下有事則匹夫之言重如丘山今天下不可謂無事矣臣願陛下不視臣言如鴻毛而視臣言如丘山則天下幸甚生民幸甚臣俯拾蒭蕘上塵天聴不勝戰慄之至臣謹對奏疏翰林院脩撰臣羅倫謹奏為扶植綱常事臣聞朝廷援楊溥故事起復李賢者臣才識庸下學問粗淺頃承天問賜對大廷猥䝉聖恩親置首選毎自感勵思酬奬遇凡聖學大要君道急務朝廷闕失紀綱廢弛官吏貪酷生靈愁苦風俗弊壊士氣委靡兵戈擾攘饑饉薦臻提其綱領疏其節目狀其情實探其根源為萬言書獻于陛下以舒天下之望以酬陛下之恩頋筮仕未乆諳練未深而又廟堂大臣百僚庶寀必有憂臣之所深憂言臣之所欲言行臣之所欲行臣以疎逺驟進之人恐蹈冒言越職之罪是以心雖懐憂口不敢言口雖欲言時未暇及此臣之罪也亦臣之分也近者李賢遭喪之時朝廷下起復之命臣竊謂李賢大臣起復大事綱常所闗風化所繫天下所瞻後世所監左右侍從給舍臺官有知義理不頋流俗必陳正論以扶綱常是用緘黙因循至今言雖若迂所闗甚大事雖若緩所繫甚切由前數事臣既未暇陳由此一事臣又未敢論是乃偷合茍容之徒非有忠君愛國之心固非陛下求臣之本心亦非愚臣報陛下之夙願也雖越職忤義君子所嫌未同而言聖人不與然先王立制時政有失庶人工藝猶得匡諫況臣備員近侍䝉恩深重扶植綱常臣之志也披寫悃憤臣之忠也惟陛下亮之伏讀聖䇿有曰朕夙夜惓惓欲正大綱舉萬目使人倫明扵上風俗厚扵下陛下是言真可為國家扶綱常天地立民極萬世開太平者也然欲正大綱莫先扵明人倫厚風俗欲明人倫厚風俗莫先扵孝孝者天之經也地之義也國而非此不可以為國家而非此不可以為家人而非此則禽獸矣中華而非此則夷狄矣故先王制禮子有父母之喪君命三年不過其門所以教人孝也古者求忠臣必扵孝子之門誠以居家孝故忠可移扵君為人臣者未有不孝扵親而能忠扵君者也為人君者未有不教其臣以孝而能得其臣之忠者也昔子夏問三年之喪金革之事無避禮與孔子曰魯公伯禽有為而為之也今以三年之喪從其例者吾弗知也陛下扵李賢以金革之事起復之歟則賢所未聞也以國家大臣起復之歟則禮所未有也似與先王制禮之意不同也似與孔子之言不類也似與陛下䇿臣之初意不合也以故事大臣當起復歟則為君者當以先王之禮教其臣為臣者當據先王之禮事其君臣不暇逺舉請以宋言之仁宗嘗以故事起復富弼矣弼之辭曰何必遵故事以遂前代之非但當據禮經以行今日之是仁宗卒從其請孝宗嘗以故事起復劉珙矣珙之辭曰身在草土之中國無門庭之冦難冒金革之名以私利禄之實孝宗卒允其辭此二君者未甞拘當代之故事以强起其臣此二臣者未嘗循當代之故事以茍從其君故功澤加扵當時名聲垂扵後世史筆書之以為盛事士夫誦之以為美談此無它君能教其臣以孝臣有孝可移以忠扵君也自是而後無復禮義史嵩之欲援例起復為丞相王黻起復為執政陳宜中起復為宰相賈似道起復為平章此數君者未嘗不以當代之故事起其臣此數臣者未甞不以當代之故事從其君然生靈以之而困天下以之而亂社稷以之而傾貽禍扵當時遺臭扵後世此無它君不教其臣以孝臣無孝可移以忠其君也詩曰殷監不逺在夏后之世臣願陛下以宋為鑒使賢盡孝扵親為萬世之大臣陛下以禮處賢為萬世之大君此臣之願也亦賢之分也以賢身任天下四方多虞而起復之與則仁宗之時契丹桀驁未為無虞也孝宗之時金人盛强未為無事也陛下必欲賢任天下之事不専門内之私則賢身不可起口則可言宜降温詔俾如劉珙不以一身之戚而忘天下之憂使賢扵天下之事知之則必言言之則必盡陛下扵賢之言聞之則必行行之則必力則賢雖不起復猶起復也使賢扵天下之事知之而不言言之而有隠陛下扵賢之言聞之而不行行之而不力則賢雖起復猶不起復也陛下無謂廟堂無賢臣庶官無賢士君盂也臣水也㿻圓則水隨以圓㿻方則水隨以方君好諫則臣隨以直君好諛則臣隨以佞臣直則忤㫖多忤㫖多則惡心生惡心生則禄不可保身不可安矣誰肯不保其禄不愛其身乎臣佞則順㫖多順㫖多則愛心生愛心生則寵愈可固位愈可安矣誰肯不固其寵不安其位乎陛下誠能扵退朝之暇清閑之燕畧崇髙貴重之勢親直諒博洽之士開懐放納䧏禮尊延講聖學之大要明君道之急務詢政事之得失察生民之利病訪人才之賢否考古今之治亂諏風俗之盛衰咨邉防之緩急舍一己之見而以衆人之見為見舍一己之知而以衆人之知為知順㫖之言則察而逐之使貢諛保寵者無以自容忤㫖之言則容而受之使輸忠為國者得以自盡羣䇿畢陳衆賢並用則賢所欲言者人亦能言之又何必違先王之禮經拘先朝之故事損大臣之名節虧聖明之清化而後天下可治哉朝廷舉措大臣出處天下觀之史筆書之清議雖不行扵朝廷天下以為何如公論雖不行扵今日後世以為何如誠不可不懼也誠不可不慎也夫賢之起復尤諉之曰負天下之重任應先朝之故事比年以來朝廷以奪情為常典縉紳以起復為美名食稻衣錦之徒接踵廟堂據禮守經之士寂寥無聞不知此人扵天下之重任何所闗耶此事扵先朝之故事何所據耶先朝自楊溥之外未聞起復某人為某官也今起復之官何如此之多耶以其髙謀逺慮足以定天下之大議耶何未見其發也以其折衝禦侮足以定天下之大難耶何未見其能也以其直節勁氣足以勵天下之士習耶何未見其有也以其深仁厚澤足以浹天下之民心耶何未見其行也以其忠言讜論足以禆朝政之闕失耶何未見其敢也陛下何取扵斯人而起復之哉意其平昔之計不過阿媚權勢豫為己地及遭通喪之時則必曲為諛説上䝉天聴不曰此人辦事理可奪情則曰此其故事例當起復既遂奸計畧為虚辭一不俞允歡然就位未有堅請如富弼懇辭如劉珙者也名曰奪情實則貪位名曰起復實則戀禄且婦扵舅姑喪亦三年孫扵祖父母禮有期服奪情扵夫初無與其妻起復扵父初無干其子今或館舍如故妻孥不動乃號扵天下曰本欲終喪朝廷不容雖三尺童子臣恐其不信也為人父者所以望其子之報豈擬至扵此哉為人子者所以報其親之心豈忍至扵此哉枉已者未有能直夫人忘親者未有能忠扵君望其直人而先枉已望其忠君而先忘親陛下何取扵斯人而起復之哉何不使之全孝扵家而後移忠扵國哉昔富弼有母喪韓琦言起復非盛世事而富公竟不可奪史嵩之遭父喪太學生羣攻之至數百人而嵩之竟乞終制今大臣起復羣臣不以為議且從而為之辭所以豫為己地也羣臣起復大臣不以為非且從而成其事亦所以豫為己地也大臣既無忌羣臣復何慙羣臣既有例大臣復何辭今之大臣固韓琦富弼之罪人今之羣臣又太學生之罪人也上下成風靡然同流致有公為起復之例私為匿服之計例在溥恩則匿服以受封例在得官則匿服以聴選例在掇科則匿服以應舉例在遷官則匿服以候遷例在求賄則匿服以之任率天下之人為無父之歸臣不忍聖明之世風俗之弊綱常之壊一至扵此也夫愛親之心孩提有之短喪之説下愚恥言況在冠裳之列聞聖賢之道肯扵其親無三年之愛乎特以貪利遂至忘親孔子曰是可忍也孰不可忍也又曰上有好者下必有甚焉者陛下誠能守先王之遺禮遵祖宗之成憲待之以禮義而不縻之以爵禄激之以亷恥而不誘之以名位使積習之弊脱然以除則忠孝之心油然而生向雖忘其親今則為孝子向雖後其君今則為忠臣亦理之所必有勢之所必至也特在乎陛下轉移之間何如耳天子者以孝治天下者也大臣者佐天子以孝治天下者也欲孝行扵天下必先行扵大臣臣願陛下不惑羣議㫁自聖衷取回内臣許令李賢依富弼故事守制依劉珙故事言事其餘已起復者悉令追喪未起復者悉許終制脱有金革之事亦從墨衰之制任國事扵外盡心喪扵内朝廷既正則天下自正大臣既行則天下自效人心天理不可泯滅誰肯甘心為不孝子靦顔為不忠臣乎綱常由是而正人倫由是而明風俗由是而厚士心由是而純紀綱由是而張國勢由是而一矣臣言一出犯者皆忤衆怒羣猜将無不至不曰狂生妄議未諳國體則曰腐儒迂談不逹時宜不曰矯激干名希求進用則曰道理雖是窒礙難行近年以來類為此語阻塞言路折挫士氣臣雖愚昧豈不自知言忤扵人殃及扵己議出扵今禍貽扵後然夙夜皇皇惟恐上負朝廷下負所學取議扵天下貽笑扵後世是以昧死為陛下言之惟陛下矜賜優容使讜言日進曲加保䕶使士氣日振則天下幸甚宗社幸甚俯竭愚忱仰祈天鑒臣謹奏奏狀南京翰林院脩撰臣羅倫謹奏為乞恩養病事臣原籍江西吉安府永豐縣人由成化二年進士出身欽除翰林院修撰五月内為建言事欽蒙調除福建泉州府市舶提舉司副提舉成化四年四月内欽䝉復南京翰林院前職臣一介微賤超受寵榮旋以狂愚罪當誅戮仰賴皇仁曲賜容宥尚加叙用尋輒収録此天地罔極之恩慈父愛子之情不是過也若非草木罔不知恩臣鞠躬盡瘁死而後已以圖報稱萬不能一獨念臣命窮福薄病痰連延元患吐紅誤為積熱屢服寒藥由此虚耗積成内冷自去年力疾赴命日服醫藥暫得茍安及秋之任抵冒熱邪輙發痰瘧到任以後諸症侵加頭目昬暈四肢痺輭形貌雖人精華已竭實難任事叨冒榮禄因扵十月内告南京通政司轉送南京吏部行應天府撥醫調治未見痊可本部勘覆是實扵成化五年二月内移咨吏部定奪縁前病日増加以左股濕痛若不陳懇恐殘軀難保後報無期伏望皇上體上天好生之徳終慈父愛子之情曲為矜憫容臣暫還田里尋醫調治少俟痊愈隨即赴朝以備任使以圖報稱臣不勝悚懼待罪之至為此令義男董鑑謹具親齎奏聞伏候勅㫖一峯文集巻一
