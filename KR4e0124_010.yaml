body:
  text: 一峯文集卷十明羅倫撰五言古詩湖西八景次陳石齋韻太極丸春鄉名太極何山象太極也天城環周三百里象外兩儀也中峯忽出平地峯麓回抱廣袤百畝象中太極也書院居之一丸三百里兩儀位太極誰從羲皇前畫此無量易白日煥天章萬古永不蝕吾亦欲無言玄天本幽默翠玄幽玩光霽巖東去太極書院十里許東儀之麓也别號翠玄洞天洞髙明圓廣下容千夫深不可測逰者秉燭丹房繡壁竒形異狀耳目未有東南巖壑最勝未有先于此者金鼇開一竇乃透玄雲麓一入洞天逰火龍銜玉燭仙都象衛嚴永夜不得宿仰視但鴻蒙瀛海駕蟠木金鼇霽雪太極東山髙踞雲漢若巨鼇橫海隆冬初寒未雪先白已霽旬月浩然猶故東極蟠金鼇寒通雪山白祝融鞭火龍六月銷不得曽上金鼇頭已在崑崙側只恐金鼇飛白玉橫天勒玉冕晴雲太極南山羅絡竒詭此峯尊嚴若端冕垂旒暑夏亢陽雲巾其頂霖雨時應土人仰之以為雨候坤厚載神秀雨暘時若之沛然澤下土乃與天公疑朝隮已膚寸熯旱方此時虹霓慎勿見羣黎生苦飢大旒垂玉太極北山水心之主山也山腹靈湫濛泉注湧飛流千仭如垂玉然大旒自何許太乙元精傾此水下無敵上與銀河并一入衆生口萬劫塵心清萬劫塵心清萬劫消心兵飛輿橫翠太極西山髙望金鼇翠屏萬仭一碧橫空世傳飛仙駐輿其上仙人此息駕太極開鴻冥如何紫蓋力敢與崑崙爭蔽虧三萬里晝夜移天行紫氣滿雲漢可望不可名一峯來秀一峯在太極為中峯在書院為西峯在水心為南峯水心太極北山之麓吾廬居之向一峯巋然其南故曰來秀太虛忽突兀孤碧自天拄完完太極鄉浩浩陽春塢萬象羅兩儀俯首環內佇撫掌無極翁昨夜聞天語三峽回清三峽太極水口山也第一龍堂峽第二龍湫峽第三下瀧峽盤回百里溪流其中百里蟠天城天河下縈互羣龍沕淵潛衆蛟輕使負源通崑崙丘影接扶桑樹日暮聞棹歌武夷是何處逰太極丸春次容彥昭二首天心開太極天腳垂碧草草根雲峯青萬壁拱蓬島島中一丸春自此風光好撫掌無極翁蒼天未曽老又太極開蒼冥天心非草草四山突中峯翠環擁瓊島一丸三百里萬象各妍好中有長春人獨抱春風老逰翠玄幽玩二首紫薇開洞天拚此玄黃擘天人好珍竒玉府寶藏塞君居南山南我居北山北爾汝兩忘形相看非物色又玉堂囊青山母乃巨靈擘羣仙燕清都一壺春拍塞紫氣來青牛窈然忘南北指點極虛無太玄本無色贈易德元陳秉常次陳石齋朝辭白沙雪夜卧西湖月湖天月在水炯然清爽接吾家富薰天大造委此業棹歌揚中流速爾進歸楫聞趙允用北行偶寄病夫懶讀書只愛華胥境一榻松風清北窗清晝永合眼見周公山童驚不醒君今旅途逰莫戀邯鄲枕卧龍巖次容彥昭夙昔慕至寶尋此蜿蜒蟠逶迤到龍門落手驪珠寒掌中見明月眼底無琅玕飛潛各有會與爾隆中看送何喬夀歸旴江何生旴江來魯秀媚寥宇孔門二三子參也吾與汝一片金牛雲萬傾西湖水去去勿復道玄天默無語馬龍瑞芝堂詠馬家真龍種西極來流沙育此玄氣精千載成靈華應圖光瑞日鴻祉熙無涯浩歌靈芝辭為我懷漢家寄梁德剛南海李德孚已從白沙老西江梁德剛枉愛青山好德剛發長笑青山莫吾惱猿鶴爾勿驚吾亦歸來早四皓圖為饒雯峯題天地有此山直到此翁好皓髮驚龍顔險語正穹昊後車來飛熊何如渭濵老俯仰幾嬴劉朝夕屢榮稿白雲照空山霞外迹如掃至今山上芝翳翳荒秋草和陳白沙二首水雲媚一窩去天九萬五飢腸冰玉清飽嚼雲月苦掉頭懶應客多謝巢與許客去掩柴扉隨引雞豚數仰面看行雲藹藹翳層宇庭柯鳥聲和喚醒夢中語又君年四十八我年四十五百年幾會面念此長恨苦金臺首相見各委霞外許擁懷素心人動輒屈指數賁然三子來歡聲撼茅宇瀧濵是曹溪他雨對牀語松雲為易德元父世衡題崢嶸白雲東松樹幾千尺曽經秦漢來萬古橫一碧黑風捲青山白晝飛霹靂須臾洗層霄見此太古色茅簷清露繁研硃點周易讀太白詩太白橫西天萬古色不改至人孕元化風豪驚百代青天騎白龍傲蕩弄雲海太白邀我來招手六合外太白與我言為我開天在拾得白日還迷途杳無礙題陳僉憲粹之和四皓圖二首秦坑氣爇天商山色方好一鹿走寰中孤鳯鳴秋昊多謝赤松徒設網羅此老片語回天心一氣噓萬稿遂令箕帚妾敢把漢宫掃噫嘻隆凖公作事何潦草又箕潁去已遙山林復誰好亦有采芝翁皓髮照蒼昊嗣漢配彼天赤手藉此老東鄰亥字人獨伴霜木稿野雉懷鴆心火龍宜電掃何乃迷先幾人彘橫秋草思親堂為建昌王垣賦青青澗畔松不為霜雪衰鑿鑿澗中石不為流水移胡為白髮人忽若朝露晞長夜去𡨕冥兒心寧不悲泣血不到地滴著身上衣衣當有時弊兒悲無已時兒身匪金石不死將何為生當長相思死當長相隨思親堂為建昌閻明賦仰觀天蒼蒼俯視地茫茫天地亦何極人命如朝霜靈椿忽已摧萱草凌北堂慈烏反哺心悲思結中腸夜夜吐哀音涕淚沾我裳圓景淡無色浮雲慘不揚羹牆終乃身參閔同翺翔孤芳振千載黃泉耿幽光題界江李文光八景繼陳公甫作石齋天下士落筆浩縱橫江山欲改色星斗芒寒明界江忽在手萬里隨君行龍眠久黃土此畫天無精想當盤礴時半夜雷霆驚依依古槐栁不謝東風榮紫煙生瞑色霽月涵秋清宛宛牧童起翳翳漁燈青摩訶亂吾伊夜靜如聞聲舍弟廣東來念子江湖英唾壺歌欲缺玉笥嶸蒼冥贈容彥昭次陳石齋傳呼走柴門有客邁行只衣冠不駭俗語言多近裏可是白沙來乃渾化查滓白沙霞外客兄弟遄與處伯兄遣君來此意良何以肯為廟堂尊而乃山林取何由見汝兄汝弟見可矣詩好兒童傳誼髙朋舊喜我非青囊徒聊爾嬉雲水憑君具隻眼一照三萬里用揚龜山此日不再得韻送馬生歸南海玄黃浩無極滄溟忽枯桑况乃么麼生浮雲度虛蒼聚散倐忽間惜此分隂光方寸渺六合太極丸隂陽氣機乘出入寂感無邉方存亡繫摻舍泰山逺毫芒冰淵視臨履安此終然臧利劍一入腹欲火肺肝戕雲子委塵泥至寶珍粃粳襟裾衣牛馬四大空昻藏包羞含遺臭焉能復流芳咨爾媚學子有欲斯無剛及時醒大夢晝夜馳倣徨仁宅固云廣義路亦已長居由聖所與曠舍成荒莊馬生南海來玉質披天章脫迹露軒冕遊心聲教場謙受若虛谷忘悔同牽羊顓師學干祿顔回誠坐忘毫釐謬千里先幾宜自強寒雪立未消朔風上歸航脊梁爾鐡硬一擔挑綱常仰視白日舊萬古何當忘負兹彼綿力䀌然我心傷行邁勵無斁罔念聖作狂夀劉菊莊天台老仙伯云是菊莊翁朱顔映華髮碧眼開方瞳淡蕩㺯雲海飄飄隨西風東籬下白菊暗滿黃花叢夕歸餐落英為我好顔容世事懶開口薄俗爭樊籠黃金生羽翼飛入蓬萊宫蒼生亦何罪遭此捶炮凶天命且不畏况乃悲人窮肝肺苦焦裂耳目昭昏聾悠然遂獨往長嘯巖扉中金丹煉玉質曽與安期逢金牛卜仁里杖屨頻春風諸昆總愛客情深非貌恭盤飱稱豐儉芋栗呼兒童淹留未忍去引劍摩蒼穹清芬散蘭雪髙綵凌煙虹鯨鯢不敢動蚊蠆若為鋒把此共君往前山雲數重得酒輒復醉但恨糟牀空不學張子房長飢從赤松冥冥撫六合造化無全功男兒生世間猥瑣非英雄四言古詩存德堂為西溪何純賦并引見山先生忠于宋吾祖武岡府君之同道也太虛先生隱于元吾祖松野先生滄洲先生之同道也羅與何世同道者余故賦之于維見山赫赫武功不顯其忠武岡攸同允文太虛滄洲維則炳文之德昭我南國見山之族太虛之孫纘戎列祖積德彌敦式我後昆詩不有言德輶如毛民鮮克舉之維何氏世舉之誰其風之作頌嫓之維彛正甫與之右見山四章一章二章章四句三章章五句四章章七句一峯文集卷十
