body:
  text: 一峯文集卷九明羅倫撰書奉謝大韶先生書傳太守來已具書達左右凡丈夫立身自有法度以百年為千載之計此豈待他人言之而後知哉求諸已而已矣胡忠簡早年名節雖與日月爭光可也後其友李彌遜謂曰人生亦不解事事可稱只一兩節好便好胡後喪名失節此言有以入之也人可無朋友之助哉吾所望于先生者非但忠簡而已先生之自立宜何如也比聞治屋髙允為相居茅舍溫公為相居土室當二公之時貴戚大官髙門甲第金碧輝映照耀日月摩切雲漢者何限而今安在哉明仲好議論恐賢者之自立不徒在于議論也時復相見以吾言示之可發一笑呵復張都憲書道中草札塵瀆明聰宜棄水火乃賜珍襲益重愧赧倫私竊念執事之于倫猶春風之于草也草不謝榮于春風春風亦不自知其為草之榮也何以為知已報㦲孔子曰不患無位患所以立執事之自立宜何如也以幼之所學為壯之所行上致安于社禝下被澤于生民奮于百世之上而風乎百世之下然後可也今之學者幸生程朱之後矣舍程朱而不師猶梓匠輪輿舍規矩而為方圓也朱子嘗使浙東矣其言曰今日壞了這箇寬字故其為政多主之以嚴而濟之以寬今紀綱日弛風俗日漓官吏日貪土豪日橫盜賊日蕃民生日益凋弊天變于上地變于下有識寒心皆寬之所致也易大畜曰不家食吉利涉大川謂其能濟天下之險也執事以濟險之才當濟險之任宜臨餐輟食撫枕忘寐思以濟天下之險可也昔諸葛武侯治蜀開誠心布公道集衆思廣忠益諸有忠慮于國但勤攻吾之闕大哉武侯乎執事近師朱子逺師武侯則險可濟而功可成矣余友章德懋議論頗有源委似負經濟之略布衣陳剩夫閩中髙士也以此二人者俯而詢之未必無分毫之助也仕者為通隱者為髙皆非中庸之道視道之行否何如爾行藏欲合時請看牀頭易敢為執事頌之與明三叔書倫頓首蕭校尉來得十二月書反復數四拳拳欲改酒過吾所深喜也然過之當改豈獨酒哉吾所望者固不獨此也過之在人聖人且不能無况衆人哉君子不貴于無過而貴于改過聖人亦人也過而改之至于無過則吾亦聖人而已夫日用之間一動一靜一語一默一飲一食一喜一怒一嚬一笑一辭一受一取一豫一行一止一進一退自一念之微至萬事之著自一身之近至天下之大有一毫不合乎天理之當然而違乎聖賢之成法皆過也改之而至于無然後為聖學之全功也相去數千里過與否吾不得而見之然因言以驗其心則過之當改者恐非獨酒也曰矢改酒過自今以往道可不修德可不崇看近思録實有益其意是矣然别求好書以切科舉又以家貧為憂則所謂修道崇德者恐未嘗實用其功而近思録實有益者姑以應之于口而實未嘗有益于心也正猶昔之熟于酒不自知其過于醉也夫得深則誘小內重則外輕是以飽乎仁義不願膏粱令聞廣譽不願衣繡顔回陋巷原憲環堵夷齊餓于西山閔損辭于汶上皆有得乎此也近世大儒有下第者其言曰今秋幸不為考官所取得與弟姪研磨義理猶舍荆棘而達康莊猶去野店而居安宅修道崇德之君子固如是也今乃汲汲科舉之得而以家貧為憂則其念慮之差與世之醉夢富貴者何異又非特一語默喜怒嚬笑之過而已若以家貧親老未免此途以階祿仕固聖賢之所不棄但不可豫以得失置胸中耳至欲取各處小録以廣見聞此又惑之甚也科舉文體本自卑弱正昌黎韓子所謂無待學而能者今日小録又不過一時鄉舉引援故舊頭腦冬烘者以為之耳其披靡文氣支離義理蠱惑士心益又甚矣何乃欲視而效之耶不過徇時好而急于得耳昔劉幾輩為文過竒詭未有如今日腐爛軟熟之甚也歐陽公且深惡而痛斥之而嘉祐士風為之一變吾今力不能變顧乃使則而效之又歐公之罪人也特地猛省作急回頭不然終身酒不濡唇亦醉夢了此一生矣復丘學正書人生行樂耳須富貴何時古之達者也倫夙慕斯人而顛沛一出昔淵明之出為饑所驅為倫之驅者獨饑已乎此長者所知也已而速反初服抱痾幽谷及此星周八矣進無益于國退無益于已惟思選名山探幽谷枕流潄石卧雲餐霞以終此餘年他無所願也昔北走燕南走閩周遊萬里隻眼已具未有若吾邦山水之竒而東南巖壑最勝自古未有發其幽光者其無待于今日乎良辰美景尋我同好疏食菜羹芒鞋藜杖披䝉茸踞虎豹登虬龍遇㑹意處快飲數觴浩歌一曲大書翠壁之地所復如初以樂吾餘日不亦可乎去年一出正欲了此而所知親故未亮素懷烹豚炮羔醉飽連日爽氣才騰塵襟已塞轅已南而復北席未暖而即行敢故違長者之命乎為是故也乃厪厚禮稽顙拜嘉顔汗沛如伏惟亮察復進賢吕大尹書王方之㑹厚之至也禮也堂食之分厚之至也義也孔子曰君子義以為上倫欲買義田周宗族知義之可為不知力之不可為也執事聞之分堂食以助焉非有尚義之心其能然乎吾聞之君子視人猶已以義處已不以義處人非君子之道也孟子曰非其義也非其道也一介不以與人一介不以取諸人堂食之助在執事不可與在僕不可取也君子之道無他義利之間而已學之不講未有不以利為義者今時之皂𨽻堂食以利為義者也食以堂名退食于公之需也非一人可得而私也在執事亦不可取也然則何所用與用備義倉周吾民之急者出乎民者反乎民也君子故曰義也執事欲為君子與行吾言而已矣執事亮之復保寧李太守書倫白太守李君辱書惠以懷賢事屬倫記之甚盛舉也僕敢不祗命獨其中有可辨者不得而默焉夫古者國祀賢于西學鄉先生歿祭于社皆以勸也此為治之大本也舍是而求治猶倒植而求茂矣後世此意不講上之責于下下之應乎上者簿書期㑹之間而已欲求善治得乎乃君獨有此舉必非從事虛文以邀一時之譽者也其志可尚矣獨其所謂賢者則有可疑焉君殆未之考也夫古之賢而列于祀者必其道德之尊名節之著事功之隆足以為後世之勸者也徒有名位者不得而與焉此聖人之法也按堯叟堯咨並舉進士第一堯佐亦登甲榜堯叟仕宋真宗位至宰輔契丹入冦請幸成都當時若非冦準社稷危矣其後又傳經義附㑹天書致天下爭言祥瑞卒壞一代治體而宋以此亡其為人如此而可以為賢乎堯咨雖無可考然入為學士出補名藩功不概見乃精于弧矢自號小由基致母擊之金魚墜地則其不賢亦可見矣獨堯佐治郡所至有聞雖韓魏公言其非輔弼才相業無大可觀然朱子録其言行列宋之名臣則兄弟中之賢者此殆庶幾也三公之賢否章章如是今乃概以為賢而懷之又從而祀之可乎若以其爵位科名足為是邦之重也則如堯叟堯咨者皆不忠不孝之人丁謂王欽若之流也其一世之富貴泯滅澌盡適足以貽不令之名而重為是邦之辱也何取以為勸哉若以為修前人之廢典則彼吳昭夫者獨以將相名其堂而閻蒼舒之記其語詞輕重之間亦未嘗概以為賢也惜其不能辨而正之耳自今日觀之則彼二子者亦見人富貴而動念垂涎者也惡可重踵其失乎三公之子孫傳在頴汝間未知是邦有否也若以為廢而去之或傷孝子慈孫之心則禮有之先祖無是善而子孫撰之是誣其祖也所以百世不能改也子孫且不可誣其祖况為守土之官而誣其邦之先臣乎且太守舉事以大公至正定後世之勸懲子孫固不得而與也余嘗過吕惠卿蔡京之邦矣問其子孫無一認以為祖者至其邦人亦羞道之堯叟之邦人與為其子孫者獨無是心哉質之禮義無一可者君其從吾計與當撤二公之像沉之于江専祀文惠更三陳為文惠書院其懷賢者祗以懷文惠之賢也二公雖不能從父母之教而其父母固以忠孝教之矣别于文惠祠後為正堂像秦公燕國而祀之使是邦之人為子者知必從父母之教而為父母者亦知所以教其子也則善矣昔鼻亭祀象千有餘嵗薛伯髙由刑部出刺道州即撤其屋墟其地栁子厚稱其得化人之理楚俗尚鬼且久伯髙一旦去之明者稱快至今况此事自君起之自君廢之固易易也新一代之耳目定百世之是非在此舉也君其無疑僕尚當執筆為君記之與府縣言上中户書倫嘗聞程子曰一命之士茍存心于愛物于人必有所濟王荆公行青苗門人故舊遺書邵子欲投劾去邵子曰寬一分則民受一分之賜投劾去何益也仁者用心固如是乎倫素性剛褊好論世事自卧病山中杜門却掃凡有干謁非獨公事至于文字若非其人皆拒之而弗答也乃今而有言焉何也孟子曰惻隱之心人皆有之朱子曰凡民有患難勢可言于官則為言之不可言則多方救護之吾邑之民困于苛斂其患甚矣豫無力以救之惡得已于言耶古之徵者三君子用其一緩其二今日有秋糧之征有夏稅之征有上中户之征用其五用其六矣欲民之不流離而去為盜也難矣為民父母行政何忍至于此也諸征姑勿論以上中户言之吾幼時猶未有也祖宗之時未有此法也各布政司未有此例也作俑者何人乎始者一里或一二名今一里有十數名者一家有兩三名者一都有百十名者聞諸人云合縣二千六百名椽則曰一千四百八十名吁何其多也詢之旁縣無如是之多也徵諸往時無如是之多也度諸事勢亦無如是之多也吾鄉八九兩都素號重難永樂以來雜役悉免今不下二百名矣所征人户逃絶者有之無糧者有之軍匠者有之秀才者有之鰥寡孤獨者有之欲憑元報以盡征之可乎若曰戶有虛絶田無逃亡此可施之于經界既正之時不可施之于賦藝之日何也民田畝數升官田畝數斗下甲人户原佃官田寒暑之衣食不給橫豪之剝削無已官府之征求無藝乃以官作民鬻于他主田居富屋糧坐下户况里書作弊飛泒詭寄一區虛糧有至數百石者一里有至數十石者一家有至數石者欲執糧以定征可乎吾見多矣凡有科差吏胥舞文里老受託以上而為下以下而為上田連阡陌者諸科不與室如懸罄者無差不至可痛也可悲也今所征人戶賣屋者有矣賣田者有矣賣牛者有矣賣子女者有矣脫婦人之簮珥者有矣敲撲之下何求不足寃號之聲上徹于天人事既乖天道不順苦雨連月米珠薪桂官吏里胥旁午鄉曲雞犬不寧為民父母行政何忍至于此也若求販于糧里已貱虛糧已貱鹽糧又貱中户貱如是其多也民有所不堪矣然則何為而可也吾聞紙價數萬四十六縣出之一縣一千則四萬六千矣縣加五百則六萬矣吾縣以一千五百為率除已征若干尚缺若干未征若干其逃亡死絶軍户生員貧難下户悉應蠲免外其餘人户多則朋合少則獨征足一千五百之數則已矣事難懸度其損益又在執事裁之也主于不傷吾仁民之心而已若據元申之數務求取盈以媚上司之意而失下民之望恐仁者之用心不如是獨執事未知其情耳使知之也其有不從乎或曰其如上司何豫應之曰公卿大臣其天人耶抑生于人間也方其困于閭閻遊于學校擊節伊周髙談孔孟其志何如哉一旦得行其道其不能為吾民之福乎民者邦之本也財者民之命也傷其財則傷其命傷其命則傷其本矣朝廷建官分職所以固其本也諸公其肯傷邦家之本而不能為吾民之福乎鄭俠布衣也見民苦于新法為流民圖以進况名在從臣之列者吾當披肝瀝膽以與爾百姓請命諸公宜無不從者信筆遽書不覺滿紙與族叔謙益先生書倫與叔父幼並艱苦今倫幸叔父不幸者豈盡才力不足哉是蓋有命焉貴之由乎命者固不可必得矣有若求之必得非命之可制者人自不求耳是故士有布褐蓬茅而光榮百世者亦有重侯纍印而汙衊千載者此修其貴于已者而彼徒得于人者為貴也貴于已者孟子之所謂良貴吾心本然之善也善之所進有髙下人亦隨其有而貴之人心秉彛之至公也不必逺引以吾家觀之松崖先生端厚柔慤一家一鄉之善士也一家一鄉之人貴之雪菴先生清心寡欲修德謹行吳司業稱其以道尊天下楊少師稱其為江西一人劉子欽稱其心地無愧程朱名公巨卿遊其門者異日頌其德美莫不齎咨涕洟下至閭里野夫婦人亦莫不喜道其姓字此一國之善士也故一國之人貴之水心滄洲松野餘頑以至士迪先生或提孤旅赴難勤王視死如歸或慷慨激奮謀復宋社而大志無成或棄官髙蹈自比殷頑或上書相府乞存宋祀而屢聘不屈或妙年英發博綜羣集而終身不仕當時名人如文丞相趙孟濚吳草廬劉須溪周翠庭歐陽道或師之或友之或製服哭之無不推而尊之雖丁末造道不能大行于天下而孤忠清節昭耀千古至于今為烈此庶幾天下之善士也故天下之人貴之是數君子者或肥遁巖谷或沉晦下僚所立耿耿子孫至今賴焉况以聖賢之道自立者乎叔父未可以為不幸也在自勉而已矣倫雖幸至此地使徒以得于人者可恃而少變其未達之所守則上辱祖宗下纍子孫也必矣其幸者又所以為不幸之甚者也詩曰聿修厥德毋忝爾祖叔父以之戒族人書列位叔父列位兄長别後想得安康倫别無他囑為人祖宗父兄者惟願有好子弟所謂好子弟者非好田宅好衣服好官爵一時誇耀閭里者也謂有好名節與日月爭光與山嶽爭重與霄壤爭久足以安國家足以風四夷足以奠蒼生足以垂後世如汴宋之歐陽修如南渡之文丞相者是也若只求飽暖習勢利如前所云則所謂惡子弟非好子弟也此等子弟在家未仕也足以辱祖宗殃子孫害身家出而仕也足以汙朝廷禍天下負後世甚至子孫有不敢認如宋之蔡京秦檜此豈父兄祖宗之所願哉想其勢熖官爵富貴豈止如今日鄉里中一二前輩也而今日安在哉然所謂好子弟者亦在父兄子姪成就之耳人才之盛鄉黨為最然非父兄敗之則子孫喪之取譏天下貽笑後世甚可惡也載之史書使後世之明君賢主輕棄南人未必不由此也吾願叔父聽之子姪戒之共慫成我做天地間一箇完人蓋未有治國不由齊家家不齊而求治國無此理也何謂齊家不爭田地不占山林不尚鬬爭不肆强梁不敗鄉里不凌宗族不擾官府不尚奢侈弟讓其兄姪讓其叔婦敬其夫奴恭其主只要認得一忍字一讓字便齊得家也其要在子弟讀書興禮讓若不聽吾言譬如爭一畝田占一畝住基兩邉不讓或致人命或告官府或集親戚所損甚大若以此費置買前物所費幾倍若曰住基無賣此又愚也其所以為此計者不過遺自已之子耳父母之心愛子孫一也今奪吾父母之子以與自已之子甚非吾父母之心也父母雖不在逆其心則逆天理矣安知吾子孫不如今日之爭哉凡事皆此類也而此事尤切故特言之今後若有田地等物不明只許自家明白不許擾及官府我若不仕尤當守此言也其餘取債之屬民甚貧窮可憫自已少用一分便積得一分德奴僕放橫不可放起自今以後無片言隻字經動府縣方好不然外人指議此人要做好人不能齊家世間安有此等好人哉由此得禍不可知也兼我在此國事日在心懷仲淹做秀才時便以天下為己任况今日乎進退得失有義有命吾心視之已如孤雲野鶴脫灑無繫自古壞事皆是愛官職底人弄得狼狽了脫使根本不安枝葉自能保乎戒之戒之若使我以區區官勢來齊家不以禮義相告便成下等人了但中間有等無知子弟與不才奴僕弄出事來則須治之以官耳叔父須戒之慎勿以吾言為迂也與張廷芳今之進士上者期給事次者期御史又次者期主事得之則哆然不勝其大視同年亦漠然也其視州官縣令若鵒鸞之視腐鼠唯恐汙其喙矣一或得之則魂耗魄喪對妻子涕泗橫流薾然不勝其小矣視彼三職者恍九地之視九天也至有垢面婢膝昏夜乞哀以求免者矣噫弊也極矣君子之仕也將以行其道也道有所隱淟涊媕婀以保祿持寵者雖尊為王公貴為卿相君子視之陸海中一塵也何給事御史為乎哉茍在我也雖晨門封人乘田委吏千古之下仰餘光而望下風者若景星鳯凰之不可及也況州官縣令哉今之近民而得行其道者莫如令其次莫如守同年近補外者不旬月間佳聞四達視彼之居三職而寂焉無聞者固已一金一泥矣况進此而上乎吾子其無以彼之自大者自大而以已之小者自大云與劉顯仁僕聞賢才出國將昌子孫才族將大所謂才者非必科名爵位之謂也今劉氏之子孫盛矣然必期以久大之業然後可也吾丈非不知之然行或有不逮非真知也今為士者殺之使為穿窬有不可得者知之真也一日不死須做一日是目下便立定跟腳以此律身以此教子便不枉一生矣吾丈達者故及之又顯仁先生知已自吉水别回思僕之罪大矣所見多不明所論多不正所行多不當所貴乎友者以其有助已也君之助僕者多矣而余之助君者何如哉何待君之薄也此僕之罪所以大也君圓通廓落練達老成何有僕之助哉然友道固如是也若徒資助于君而無一言以為君助是故非君望僕之心也朋友之倫豈宜如是之薄哉異日恐無以見聖賢于地下也凡吾之所欲言者皆君之所已知也皆聖賢之所已行也皆天下士讀書者所共知也而天下之人卒未見有行之者何也溺于流俗而不自知也今天下之俗士不登科登科不給事御史給事御史不方伯連帥方伯連帥不侍從六卿侍從六卿不師保閣下不已也求而得之者非徒自以為榮天下之人狐媚而鼠趨之矣求而不得者非徒自以為辱雖親戚朋友皆笑其迂濶而鄙其無能也凡其求而得之者皆自以為大智然自君子觀之則卒自陷于大愚而不自知也何也流俗雖不美而天下未嘗無正人天下未嘗無正論此固人心之所以不死而天道之所以扶持斯世者也斯人也雖自以為大智而卒無以服天下正人之心卒無以得天下正論之歸近則貽羞于一世逺則遺臭于後世正士羞與同朝鄉人恥于同里逺裔子孫恥以為祖卒與草木禽獸同一泯滅澌盡而後已此其自以為大智非大愚而何哉原其立心之初豈期至于此哉特溺于耳目見聞流俗之非而至此也且人之所以求富貴為身與口而已子與孫而已身之所衣者寒不過一裘暑不過一葛口之所食者肉不過一豆米不過一升酒不過一壺子孫終非我所能謀而保其有也而一念之非遂至如此非大愚而何哉君達人誠不至此也昔禹之戒舜曰毋若丹朱傲毋慢逰舜豈丹朱慢逰者哉特禹之戒舜當如此也君豈至此哉特僕之告君當如此也孔子曰進以禮退以義自秦漢以來此義不明于天下千數百年號為儒者多無完人為此義不明故也至宋程朱數大儒出相與講明力行其守難進之禮則一官之授必抗章而力辭其秉易退之義則一言不合即奉身以求去當時公卿士夫多已從化故宋之治俗幾乎三代者數君之力也惜乎人主惑于小人之邪說故大儒之效不見于時而宋之治終不能等三代者此故也今日祖宗養士百年吾等至此豈不自愛其身哉自踵至頂皆朝廷之所有也但于聖賢之道有虧恐非養士者之初心矣吾榜中號為得人然卓卓者無幾其中豈無人哉但恐溺于流俗而不肯自拔也近聞有求免作縣者其穢德已四聞矣龔黃卓魯非人哉顧無志也無志則師保閣下亦祗以如吾之前言而已况給事御史哉昔伯玉行年五十知非吾謂明日死今日知非亦可僕非多矣君無忘助我也君勉之入德自近思録始陳獻章先生今第一流人也可近之令弟員外先生叱謝師覽無錢君可助之更病事千萬維持使無後顧之憂蓋元患吐紅服多寒藥隨成自遺虛怯而今則時頭痛手足痿痺曽出回手已不能馬鞭蓋勞便受風也而今已成狼狽回家調治一二年便來煩公卒調護之與何惟一足下欲為好人乎當以國家為心生靈為念聖賢為師孔孟程朱之道力行之而已欲為好官乎則如此而已足下豈徒欲為好官者哉與鄭御史為御史大本當以明道為法而隨時措之床頭易曽振塵否與夏止菴憲副書凡寬則百敝皆生嚴則可理雖處一家或教鄉校十數人亦須嚴况司一道長萬夫乎吾嘗以此告相知者皆未有信而行之何也凡上有好者下必有甚焉今貪官甚于盜劫皆欲止盜盜愈止而愈有先生買田金牛而好義之家如張邦俊願施百石羅俊極毛英懋皆欲出三十石此豈有所强哉下觀而化也止菴記及寧縣文猶未暇成姑俟入山方可了也一峯文集卷九
