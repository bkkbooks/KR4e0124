body:
  text: 一峯文集巻十一明羅倫撰五言絶句題饒雯峯山水四首混沌太古色江山烟霧中草堂無俗客日日來春風二年抛造化外氣入烟霞間夕陽林下路白髪照青山三素琴本無絃白雲本無心虚舟在野外知他浮與沉四層隂閉六合萬徑無行蹤老翁不僵手一絲繋春風題饒松坡畫四首青山不解語流水豈知音仰面發長嘯蒼蒼對此心二雲移山不動客去水相隨髙卧南窓意羲皇祗自知三一棹歸何處柴桑是我家莫言嫌一飽籬下有黄花四笠下眼似海驢背肩如山雪月品題徧翻笑天工慳山水小景老屋青山下孤舟淺水邉黄昬魚飯飽榻却矮篷眠月梅廣寒夜突兀疎影自天横嫦娥不敢睡合眼夢魂驚題陳粹之龍北斗司元柄南湫亦化工若無天在手泉下不相容題毛英懋春夏秋冬小畫曙氣薫雲壑香風戀草堂小舟輕一葉恰好受風光夏髙閤不受暑翛然午夢涼棹歌何處起清吹落滄浪秋秋水清無底幽然凈我心片鴻天宇順落日放船吟冬滕六寒無恙山河信手封老翁無住著隨意繫江風和緝熈薌城謾興低頭㸔明月仰面貪歸鳥庭前白露下已濕青鞋了寄梁徳剛歸自南雍笑殺南園老秦淮醉幾秋歸來無一語酣劍㸔吾鈎題蘭與饒裕翠袖舞春暉光風聖得知夜深渾不寐玉露㸃羅衣又春動雲丘筆幽蘭映雪窓一峯纔拂手六合散天香題竹與蕭球玉英臺下路半夜舞青鸞龍孫眠不得疎影上䦨干題族叔潤屋先生鵲圖昨夜下天河南飛路幾多歸來無一語無奈月明何晩翠樓長簿消晨烟返照啼幽鳥飄然過片雲寒山青了了蘭春意自天來靈均氣未回山童呼不醒飛上楚王臺又紫心蒼玉珮初散玉皇家昨夜瑤臺月憐君未欲斜虎白日君當道山前子婦悲秋原烟草裏誰復問狐狸緑扇碧雲從天來清風落君手老龍睡初醒恍惚無何有題饒雯峯鴈時序炎涼異南來又北歸乾坤三百里惟爾識天機陳舜明泰齋秋候天如水風清月正明浮雲㫁一㸃長望泰階平題松與溧水袁濟人心是浮雲一日幾變易吾友山下松此心已如石夢日晏歌黄鵠時清茹紫芝君心天下獨天意獨君知初四日夢東井回天地西奎應古今已無生與死况復説浮沉二十九日夢立誠北斗佳人在東風信此君㸔他天意思深得月精神二十二日玉笥夢闗山一隻鴈霄漢兩三峯借問門前水依然萬折東丙午十月初三日夢鐡騎鎖東風殘花野興濃玉梅猶在此消息自天通五言律詩和林緝熈正密堂寂歴驚猿定幽軒月到時江山空翠在肝肺老天窺甲子消明鏡泥塗渾素絲可堪藤簟冷香露滿薔薇易菴李令譽同學郡庠别二十載見予金牛驚喜交集敬酬元倡昨夜茅堂裏匡牀共語時君心江月得吾意岫雲知歡極盃無算交深道愈夷宦情渾欲割畎畝真吾師和緝熈示弟之作示諸生寒餓添疎懶輕肥誤俊英人心爭水火造物劇孩嬰自在閒中睡倉皇紙上名分明眼前事聊復醉還醒劉氏孟禎迎暉樓天道此中和江樓曙氣多浮雲消海岱病眼對山河年老流光易春酣放口歌茅簷寒餓乆愛爾數相過讀書樓為門生張麟賦溪山深隠處一逕漸通幽六合同吾宇南州獨此樓浮雲連海動河漢自天流髙枕丹霞上春風笑未休挽掲竹菴竹菴忘此老伏臘走比隣碧草他生夢黄花化後身石田孤鶴瘦烟水五湖貧却憶經行處西風淚滿巾南村别墅為饒松坡題吾愛南村好頻過處士家白雲留客住濁酒隔牆賖隂壑蔵春雪清溪洗暮霞自今來往慣薇蕨早生芽答陳公甫青天回白首霞外送㝠鴻沙界無窮樹霜空見此松君王留一劍老病息孤蓬試問雲臺趣農談信野翁公甫感秋有吟因寄章徳懋莊孔昜及倫三人用次其韻大地秋風動萬竅無定音山河孤鶴夢風雨一龍吟青眼有此客白雲何處心思君令人老華髪一千尋佛嶺三首元兵李恒追及文山神石墜隘道阻先君武岡公被執鞏信戰于東固死之即此地也宋運方當絶人心未死何䧏王納欵日義士揮天戈鞏信支東固文山節五坡君㸔草木氣猶自壯山河二秦賈先亡國文山可奈何自憐天下詔誰奮魯陽戈生死勤三后忠誠動五坡髙風不可見名落舊山河三追塵特地起孤憤奈天何翠玉樓前淚黄雲塞下戈二龍爭北野孤鶴夢東坡却憶樊籠外乘槎欲泛河􅚱頭次陳秉常萬里崑崙小蒼茫快此登層雲開赤脚隂壑動𤣥靈練石嫌天漏尋花愛國馨青山來戀我應識草堂情兩暉樓次容彦昭樓舊名迎暉夢改兩暉畫棟飛雲表鴻名落夢間大明開晝夜光霽動天山髙枕元龍卧横江一鶴還老夫幽興熟為爾一開顔光霽巖次容彦昭太極開天府清虚此一堂幾迴桑海變不及廣寒香萬象懸金谷羣仙醉玉牀蓬壺深咫尺生被碧山囊府教巖次容彦昭先君武岡公名開禮字正甫宋進士授武岡軍教授徳祐元兵南渡辟知永豐縣從文山起義勤王空坑之敗大罵不屈囚吉州獄八日不食而死文山北行制服哭祭之事在宋史巖在婁原洞幽巖東迴紆明瑩公嘗幽棲于此土人以其官名之金身不可㫁鐡心應易酸風吹浮雲去吾與南山安頟頟蒼天在瀟瀟白日寒横流當砥柱迴却黄河乾扇和巖次容彦昭如何深厚底蔵得一壺春朔雪不到地春風長被人天陶吾輩老花好自家新聞道山靈語知予樂是真又陽和在深谷無秋旦旦春山魑憎過客巖燕喜來人風㰱瓊芝脆天清玉宇新桃花逐流水去住任天真水心書院次容彦昭逰子來何之來之水心亭同流混清濁髙思入𤣥青病菊東籬醉幽蘭陋室馨石齊頻入夢經緯兩㝠㝠書崇仁萬玉山僧房廖欽止處登瀛洲達此寺三十里王道荒東漢山名自太康璣衡斟北斗雷雨動西方客夢雲隨鶴禪心月在牀登瀛三十里前路滿風光和林緝熈逰玉笥山并序玉笥山大秀宫道家號法樂洞天竒秀旁流南海布夜林緝熈雲水名岳從羅浮春于山中道士許清源頋留乃開青囊約徙宫于天王閤結羅浮菴于閤後最竒處時從行者黄時憲王忠肅許良楫陳苻用符用候秋落手此菴云野仙臨玉笥引袖拂天星侍立雙童小㸔山隻眼明洞雲含雨潤鶴夢帶烟醒自嘆羅浮客春杯溢四溟送饒經歴還金谿問病來金嶂髙談徹玉闗何人無白髪吾道有青山雲水流行處漁樵問答間孤舟今夜别明月共君還瀧濵次容彦昭二首南海三君子來問瀧岡居山髙日月小樹古虬龍紆暮年得一飽衰力尚三餘寄言白沙老倦翼且棲梧又别業來何處瀧岡水竹居江山容我老朱紫信誰紆南海三君過西窓兩月餘劇談中夜起香露滴髙梧毛氏西園次容彦昭毛氏西園好溪南未有之參横虎出夜松暝鶴歸遲病骨青藜杖秋香短竹籬小窓孤榻在合眼見巢夷送梅鼎歸鉛山歸路鉛山縣梅花萬樹春青天元屬我白髪肯饒人道徳㸔前輩冰淵戰此身寄書長不達傳與故鄉親定賴丕初宿金牛夢意氣運回千載何人朕兆先天花搖鳯舞雲錦擺龍眠垂統開來學沿源得不傳東風又周道四海正懸懸送王生歸家王家兄弟好吾道在南安禮樂開三極隂陽渾一丸春深冰自水人去雪猶寒天末涼風起浮雲正好㸔清風洞次容彦昭問爾來何際來從象帝先后靈噫紫府和氣蕩光天骨冷龍眠處魂清鶴夢邉古今渾不息君子自乾乾翠華巖次容彦昭皇天開洞府自我馬蹄忙春漏黄金界雲和翠玉房寳山隂火動𤣥竇紫霞香回首無何上神功接混茫和林緝熈過劉宅韻舉舉扶胥子雲樓日幾層野人回碧眼赤子問青燈山盡天無礙春歸夢有憑㝠鴻㸔杳杳遮莫頋虞罾送劉師覽分教沅陵塞外傳金口沙頭醉玉巵青山宜我病明月憶君思江漢清秋潤沅湘白日飛廟堂登稷契雲壑隠巢夷江山一覽亭一目空南極飛梯上紫烟幾鬟孤照外匹練落霞邉江漢心宗海嵩華氣擁天魯城春眼後此地亦悠然一横亭有客在南溟文章氣已㝠何人㸔北斗稚子指東星下釣綸方定燒茶夢未醒湘雲今我是曽上妙髙亭文鄉書舍吾道貞元日文鄉氣又春乾坤三萬里江漢一完人山氣通雲谷泉聲是泗濵大虚皆我屋明月可芳隣蒼雪亭蒼顔未覺老古心誰與同風雪不改色山林惟此翁吾憐造化意乃在山谷中盤桓成浩嘆萬壑生清風九月夢南師翻孔孟西客鏤唐虞秋月梧桐夢春風故舊書陽回天有信雲動海成虚試問圭峯老乾坤幾乘除天上人間吾廬依北斗人道是東山雲卧星槎穏天中帝柱閒路由黄道表人在紫薇間誰捧三竿日凌烟夢未還小蓬萊引袖拂蓬萊飛雲九曲臺火當三殿去山送七星來洞府春如海秋空夜不埃白衣如邂逅沈醉菊花杯九曲飛雲羅浮在天上指㸃是𤣥微九曲雲中去三天日下飛紫薇迴閤道清露濕仙衣世路羊腸險人間悶不知言志歸路玉花驄行人大華東龍頭驚昨夢馬足信東風天上開三省江南問一峯養雛成大鶴種子得髙松十九日夢秋風為誰急秋草為誰深吾道通天地人心自古今誤疑梅是雪不道菊成金昨日東籬下山樽滿滿斟夢吟浮香塢塢舊名大山可里許陋巷居之丙子鄉薦後庚辰辛巳間晩道其中覺一所有香叔父修益曰山中必有香草也先府君然之既而香漸廣丙戌登大廷南遷得歸異香滿塢晩則薫室繼生諸子比已寂然乙未春陳公甫門人容彦昭易徳元陳秉常夕于塢中因及其事欲定名而未得其夕夢曰浮香塢異香浮上界春到紫薇家人道誰從定天心未有涯野風依客興丹露對流霞可是長春境蓬萊萬嵗花夢吟異奏亭予家龍池之上浮香在池東異奏亭在池西亭名異奏何也乙酉赴南宫予出三門外張宣輝後至奔告曰適間龍池西北鼓聲鏜然木板響答以族右其樂别也竟不見人此何祥乎先兄陽和先生曰此山英靈送吾弟往矣何以人為予目止之行至西崗聞金銅聲以廵司官在岡外也既而亦無浮香塢既定三君曰盍圖此以對其夕夢曰異奏亭君行孚天地君心動鬼神大名中日月吳樂播韶鈞阿閤猶儀鳯西郊未出麟如何湖上曲長奏洞庭春夢定春堂吟壬辰橒生先夢人報其母曰五魂無主中和動氣動中和萬古春繼曰一定萬古春乙未夢曰似君不老可無憐夫媍同春一萬年無限雲霞皆落手定春堂上繡香煙既定其塢曰浮香亭曰異奏堂曰定春館曰同春云皆乙未夏夢也東風無著手却向草堂來大化留鈞座光天落夀杯有雲皆載兩無地不栽梅餘慶吾家厚元君未鑿坏夢同春館吟日日是春風吾家大化同一誠孚犬馬五教及兒童水暖魚魚出泥融燕燕通度江春色滿花栁各青紅十二日夢文岡阡吟文岡之阡曽大父元六府君大父善耕府君季大父永四府君阡也天順癸未春試燕臺夢歸謁阡石門三重甕巻如城左右閽人髙齊于門倫慨然歐陽之阡既名瀧岡此合名龍岡乎傍白衣人曰龍岡不若文岡倫曰何謂文也白衣指一山曰此非文峯乎但見一峯蒼翠出門髙秀刺天舊名椒園因易其名曰文岡虚無曽指㸃三老已蓬萊春意回函丈天光落上台大明萬怪伏文秀一峯来無限風光好南山進夀杯入道門爾等由吾道須先自洗心雪消春動草月上夜鳴琴杏脚書壇古雲根石室深幾人能到此白髪忽千尋五言排律古潭為劉禮作賦秋江有古潭開自無極先飛流掛北斗靈源通上天陽潛含渾渾隂閉入𤣥𤣥深淺滄桑外浮沈宇宙邉洞明空地底虚大貯天圓日月含黄道星辰泳紫躔脈通青嶂骨文爛玉霄箋河漢清無敵滄溟勢欲連鏡平飛組練珠抱睡蜿蜒馬飲河圖出龜呈洛數全嫁蟾橋度鵲入鳥鏡窺鸞河伯羞夸大秦鞭浪欲填夀籌逢海屋仙樂洞庭絃雪艇寒無恙星槎夜欲編一虚空礙滯萬象訝森駢孕秀生豪傑髙門得世賢忽逢江上老疑是水中仙湛一心源寂瀾翻舌本懸詩懐傾浩蕩道體見淵泉濁激塵滓散㝠窺混沌穿暮春陪㸃浴清夜共熹沿淡薄交情古光明夜氣鮮靈均曽種芷茂叔為栽蓮白髪欺明月愁心散紫烟羊裘霞外釣漁笛月中舷嚴瀨名髙斗愚溪唾積淵隨波豈吾事浮海竟誰縁機外鷗三㸃間中鷺一拳榻篷來鶴夢歌棹動龍眠世態隨陽鴈塵根脱殻蟬濯纓呼孺子鼓枻鬭嬋娟海若低偷眼馮夷醉拍肩談𤣥驚鬼膽話妙破天權夙好羅浮客呼來不上船菜園寛似海醉筆大扵掾運泰肥三極歌傳滿大千傍花眉展秀見酒口流涎樂水心元癖尋山意亦便正冠來入社潤筆不須錢治世三生佛閑官一味禪著書深閉户共爾磨兠堅雯峯山水吟并引旴山水竒也雯峯山水又旴之竒也太守饒公秉鑑卜别墅于此焉倫過而悦之裴佪不去者三日公癖于山水倫之癖有甚扵公者扵戲自風水之説興人怠扵為善矣山川亘宇宙人事之迭往迭來者何足恃也雖然尼丘孕孔嵩岳降申扶輿清淑之氣其鍾在人固矣惟善則得之饒氏之子孫其勉之吾見其大矣造化鍾神秀雯峯好山水人道崑崙來起止三萬里其根盤廣莫枝葉布寰宇恒碣維北門皇都天帝主在徳不在險古道吾有取是邦固雄壯竒秀實在此天功巧雕琢無乃役神鬼萬馬雪中奔羣鶴自天翥蜿蜒翔蛟龍蹲踞降虎兕玉堂端筆鋒寳殿開斧扆武侯八陣圖李靖六華壘疏鑿神禹功積聚伏波米衆竒雜前陳眼手驚頋指太守好事者伊此開别墅野師方云云道眼自許許病夫一經過極口歎不已竒寳委道傍盲者宜弗視良驥非伯樂鹽車竟垂耳太守聞予言一夜喜不寐予為大守説風水何足恃聊此娛吾生百年能有幾貧賤我輩安富貴子孫喜富貴足良圖在此不在彼我昔登東山周爰觀闕里荒哉曲阜城離離滿禾黍巍巍魯東家天地與終始後來希聖徒亦有朱夫子四海幾滄桑兩家大華峙先民重積徳徳積福乃趾云何晉唐後邪説爇天起青囊不自課金函與誰啟有術勿自福况福它人只何當焚其書一洗青山恥由來積徳門光嶽鍾英偉君家尚勉旃螽斯蟄麟趾孔朱有遺訓曽楊休掛齒一峯文集巻十一
