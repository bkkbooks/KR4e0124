body:
  text: 一峯集别集類五明提要臣等謹案一峯集十卷明羅倫撰倫字彜正别號一峯江西永豐人成化丙戌進士第一授修撰釋褐甫三月以疏劾大學士李賢謫泉州市舶副提舉明年詔還復原官改南京供職尋以疾辭歸退居金牛山授徒講學以終事跡具明史本傳倫與陳獻章稱石交然獻章以超悟為宗而倫篤守宋儒之途轍所學則殊明儒學案云倫剛介絶俗生平不作合同之語不為軟巽之行凍餒幾於死亡而無足以動其中庶可謂之無欲今覽其文剛毅之氣形於楮墨詩亦磊砢不凡雖執意過堅時或失於迂濶又喜排叠先儒傳注成語少淘汰之功或失於繁冗然亦多心得之言非外强中乾者比也後載夢稿二卷記夢之詞至三百餘首隱約幻渺幾莫測其用意所在亦文集中罕見之體以其人足重故得附本集以傳今亦姑仍舊本録之焉乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六一峯文集目録别集類五明卷一䇿疏狀卷二序上卷三序下卷四記上卷五記中卷六記下卷七傳跋墓志謡文哀辭說銘祭文卷八書上卷九書下卷十詩卷十一詩卷十二詩卷十三詩卷十四歌
